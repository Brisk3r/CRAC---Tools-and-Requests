<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3 Menu Builder | CRAC Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.5/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', 'Outfit', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; }
        
        .print-font { font-family: 'Outfit', sans-serif; }
        
        @page { size: A3 portrait; margin: 0; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .a3-canvas { 
                width: 297mm !important;
                height: 420mm !important;
                margin: 0 !important; 
                padding: 0 !important;
                box-shadow: none !important; 
                border: none !important; 
                page-break-after: always; 
                page-break-inside: avoid; 
                transform: none !important; 
            }
        }
        
        .a3-canvas {
            width: 297mm;
            height: 420mm;
            background: white !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #0f172a !important; /* Always dark text for print preview */
            transform-origin: top center;
        }

        /* Responsive preview scaling for screen sizes to prevent layout shift and overflow */
        @media (min-width: 1440px) {
            .a3-canvas { transform: scale(0.75); margin-bottom: -280px; }
        }
        @media (max-width: 1439px) and (min-width: 1280px) {
            .a3-canvas { transform: scale(0.65); margin-bottom: -380px; }
        }
        @media (max-width: 1279px) and (min-width: 1024px) {
            .a3-canvas { transform: scale(0.55); margin-bottom: -480px; }
        }
        @media (max-width: 1023px) and (min-width: 768px) {
            .a3-canvas { transform: scale(0.5); margin-bottom: -520px; }
        }
        @media (max-width: 767px) {
            .a3-canvas { transform: scale(0.32); margin-bottom: -720px; }
        }

        .brand-asset { position: absolute; pointer-events: none; z-index: 0; }

        /* Content Z-index */
        .menu-content {
            position: relative;
            z-index: 10;
            padding: 15mm 20mm;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Layout Grid */
        .menu-grid {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        /* Lists */
        .category-header {
            font-size: 32pt;
            font-weight: 900;
            color: #004593;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 5px solid #004593;
            padding-bottom: 2mm;
            margin-bottom: 4mm;
            text-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 5px rgba(255,255,255,1);
        }

        .menu-item { margin-bottom: 3mm; }
        .menu-item-row { display: flex; justify-content: space-between; align-items: baseline; }
        .menu-item-name { font-size: 20pt; font-weight: 800; color: #0f172a; text-transform: uppercase; text-shadow: 0 0 10px rgba(255,255,255,0.9); }
        .menu-item-price { font-size: 20pt; font-weight: 900; color: #004593; text-shadow: 0 0 10px rgba(255,255,255,0.9); }
        .menu-item-dots { flex-grow: 1; border-bottom: 3px dotted #cbd5e1; margin: 0 5mm; position: relative; top: -5pt; }
        .menu-item-desc { font-size: 12pt; font-weight: 600; color: #64748b; margin-top: 1pt; text-transform: uppercase; letter-spacing: 0.05em; text-shadow: 0 0 8px rgba(255,255,255,0.9); }

        .menu-item-compact { display: flex; justify-content: space-between; font-size: 14pt; font-weight: 600; color: #64748b; margin-top: 1pt; text-transform: uppercase; letter-spacing: 0.05em; text-shadow: 0 0 8px rgba(255,255,255,0.9); }
        .menu-item-compact-price { color: #004593; font-weight: 800; }

        /* Graphic Ice Creams Section - Full Page Mode */
        .ice-cream-grid-full {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15mm 10mm;
            margin: auto;
            justify-content: center;
            align-content: center;
            flex-grow: 1;
        }

        .ice-cream-card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ice-cream-img-wrapper {
            width: 60mm;
            height: 60mm;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6mm;
            overflow: hidden;
            position: relative;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,69,147,0.1);
        }

        .ice-cream-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1);
        }

        .ice-cream-price-tag {
            background: #004593;
            color: white;
            font-size: 24pt;
            font-weight: 900;
            padding: 3mm 8mm;
            border-radius: 20mm;
            margin-top: -15mm;
            position: relative;
            z-index: 20;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .ice-cream-name {
            font-size: 18pt;
            font-weight: 900;
            color: #0f172a;
            text-transform: uppercase;
            margin-top: 5mm;
            line-height: 1.1;
        }

        /* Sidebar UI */
        .sidebar-input {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            width: 100%;
            outline: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .sidebar-input:focus { border-color: #004593; background: white; }

        .mobile-warning {
            display: none;
            background: #fff7ed;
            border-bottom: 2px solid #fed7aa;
            padding: 1rem;
            text-align: center;
            font-weight: 700;
            color: #9a3412;
            z-index: 100;
        }

        @media (max-width: 1024px) {
            .mobile-warning { display: block; }
        }
        
        .list-edit-input {
            background: transparent;
            border: 1px solid transparent;
            outline: none;
            width: 100%;
        }
        .list-edit-input:focus {
            background: white;
            border-color: #e2e8f0;
            border-radius: 4px;
            padding: 0 4px;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const defaultDrinks = [
            { id: 1, name: 'Cans', price: '$3.00', desc: '', isCompact: false },
            { id: 2, name: 'Water', price: '$3.00', desc: '', isCompact: false },
            { id: 3, name: 'Slushy', price: '$4.00', desc: '', isCompact: false },
            { id: 4, name: 'Pump Water', price: '$4.50', desc: '', isCompact: false },
            { id: 5, name: 'Bottles', price: '$5.00', desc: '', isCompact: false },
            { id: 6, name: 'Powerade', price: '$5.50', desc: '', isCompact: false }
        ];

        const defaultFood = [
            { id: 7, name: 'Spinach Cheese Roll', price: '$4.50', desc: '', isCompact: false },
            { id: 8, name: 'Hot Chips Cup', price: '$3.00', desc: '', isCompact: false },
            { id: 9, name: 'Sausage Roll', price: '$4.50', desc: '', isCompact: false },
            { id: 10, name: 'Pie', price: '$5.00', desc: 'Served with Tomato, BBQ or Gravy', isCompact: false }
        ];

        const defaultCoffee = [
            { id: 11, name: 'Regular', price: '$4.50', desc: '', isCompact: false },
            { id: 12, name: 'Large', price: '$5.00', desc: '', isCompact: false },
            { id: 13, name: 'Iced Coffee', price: '$5.50', desc: '', isCompact: false },
            { id: 14, name: 'Alt Milk', price: '+$0.50', desc: '', isCompact: true },
            { id: 15, name: 'Extra Shot', price: '+$1.00', desc: '', isCompact: true }
        ];

        const presetIceCreams = [
            "Lemonade Icy Pole", "Paddle Pop", "Calippo", "Splice", 
            "Cyclone", "Milo", "Golden Gaytime", "Maxibon", "Magnum"
        ];

        const App = () => {
            const [drinks, setDrinks] = useState(defaultDrinks);
            const [food, setFood] = useState(defaultFood);
            const [coffee, setCoffee] = useState(defaultCoffee);
            const [iceCreams, setIceCreams] = useState([]);
            
            const [activeTab, setActiveTab] = useState('list');
            const [previewMode, setPreviewMode] = useState('text');
            
            const [newCat, setNewCat] = useState('drinks');
            const [newName, setNewName] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newDesc, setNewDesc] = useState('');

            const [isSearching, setIsSearching] = useState(false);
            const [searchResults, setSearchResults] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [graphicPrice, setGraphicPrice] = useState('$3.50');
            const [graphicName, setGraphicName] = useState('');
            const [manualImgUrl, setManualImgUrl] = useState('');

            const addItem = () => {
                if(!newName || !newPrice) return;
                const item = { id: Date.now(), name: newName, price: newPrice, desc: newDesc, isCompact: false };
                if(newCat === 'drinks') setDrinks([...drinks, item]);
                if(newCat === 'food') setFood([...food, item]);
                if(newCat === 'coffee') setCoffee([...coffee, item]);
                setNewName(''); setNewPrice(''); setNewDesc('');
            };

            const updateItem = (cat, id, field, value) => {
                const updater = (arr) => arr.map(i => i.id === id ? { ...i, [field]: value } : i);
                if(cat === 'drinks') setDrinks(updater(drinks));
                if(cat === 'food') setFood(updater(food));
                if(cat === 'coffee') setCoffee(updater(coffee));
            };

            const removeList = (cat, id) => {
                if(cat === 'drinks') setDrinks(drinks.filter(i => i.id !== id));
                if(cat === 'food') setFood(food.filter(i => i.id !== id));
                if(cat === 'coffee') setCoffee(coffee.filter(i => i.id !== id));
            };

            const duplicateItem = (cat, item) => {
                const newItem = { ...item, id: Date.now() + Math.random() };
                if(cat === 'drinks') setDrinks([...drinks, newItem]);
                if(cat === 'food') setFood([...food, newItem]);
                if(cat === 'coffee') setCoffee([...coffee, newItem]);
            };

            const moveItem = (cat, id, direction) => {
                const arr = cat === 'drinks' ? drinks : cat === 'food' ? food : coffee;
                const index = arr.findIndex(i => i.id === id);
                if (index < 0) return;
                if (direction === 'up' && index === 0) return;
                if (direction === 'down' && index === arr.length - 1) return;
                
                const newArr = [...arr];
                const temp = newArr[index];
                newArr[index] = newArr[index + (direction === 'up' ? -1 : 1)];
                newArr[index + (direction === 'up' ? -1 : 1)] = temp;

                if(cat === 'drinks') setDrinks(newArr);
                if(cat === 'food') setFood(newArr);
                if(cat === 'coffee') setCoffee(newArr);
            };

            const searchUnsplash = async (query) => {
                if(!query) return;
                setIsSearching(true);
                try {
                    const res = await fetch(`https://api.unsplash.com/search/photos?page=1&query=${encodeURIComponent(query + ' ice cream popsicle transparent background')}&client_id=p-k2T_L0Y-8-C3mR8-9-B2u_I-8-B-0-A-1`);
                    const data = await res.json();
                    setSearchResults(data.results || []);
                } catch (e) {
                    setSearchResults([{ urls: { regular: 'https://images.unsplash.com/photo-1501443762994-82bd5dace89a?w=800' } }]);
                }
                setIsSearching(false);
            };

            const addGraphic = (imgUrl) => {
                if(iceCreams.length >= 12) return alert("Maximum 12 graphics fit on the page.");
                setIceCreams([...iceCreams, { id: Date.now(), name: graphicName || searchQuery, price: graphicPrice, img: imgUrl }]);
                setSearchResults([]);
                setGraphicName('');
            };

            useEffect(() => {
                if (activeTab === 'graphics') setPreviewMode('graphic');
                else setPreviewMode('text');
            }, [activeTab]);

            return (
                <div className="flex h-screen w-full overflow-hidden print:block print:h-auto print:overflow-visible transition-colors duration-300">
                    {/* Left Sidebar */}
                    <div className="no-print w-96 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 shadow-xl z-50 flex flex-col flex-shrink-0">
                        <div className="p-6 border-b border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50">
                            <h1 className="font-black text-slate-900 dark:text-white uppercase text-2xl leading-none tracking-tighter">Menu Builder</h1>
                            <p className="text-[10px] text-blue-600 dark:text-blue-400 font-bold uppercase tracking-widest mt-1">A3 Poster Generator</p>
                        </div>

                        <div className="flex bg-slate-100 dark:bg-slate-800 p-2">
                            <button onClick={()=>setActiveTab('list')} className={`flex-1 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${activeTab === 'list' ? 'bg-white dark:bg-slate-900 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}>Standard List</button>
                            <button onClick={()=>setActiveTab('graphics')} className={`flex-1 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${activeTab === 'graphics' ? 'bg-white dark:bg-slate-900 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}>Graphics</button>
                        </div>

                        <div className="flex-grow overflow-y-auto p-6 space-y-6 custom-scroll">
                            {activeTab === 'list' ? (
                                <div className="space-y-4 animate-in slide-in-from-left-4 duration-300">
                                    <h3 className="font-black uppercase text-[10px] text-slate-400 tracking-widest mb-4">Add Menu Item</h3>
                                    <select value={newCat} onChange={e=>setNewCat(e.target.value)} className="sidebar-input font-bold uppercase">
                                        <option value="drinks">Drinks</option>
                                        <option value="food">Food</option>
                                        <option value="coffee">Coffee</option>
                                    </select>
                                    <input className="sidebar-input uppercase" value={newName} onChange={e=>setNewName(e.target.value.toUpperCase())} placeholder="Item Name" />
                                    <div className="flex gap-2">
                                        <input className="sidebar-input w-1/3" value={newPrice} onChange={e=>setNewPrice(e.target.value)} placeholder="$0.00" />
                                        <input className="sidebar-input w-2/3" value={newDesc} onChange={e=>setNewDesc(e.target.value)} placeholder="Description (Optional)" />
                                    </div>
                                    <button onClick={addItem} className="w-full py-4 bg-blue-600 text-white font-black rounded-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2 shadow-lg active:scale-95 uppercase tracking-widest text-xs">
                                        Add to Menu
                                    </button>

                                    <div className="pt-6 border-t border-slate-100">
                                        <h3 className="font-black uppercase text-[10px] text-slate-400 tracking-widest mb-4">Manage Items (Click to Edit)</h3>
                                        {['drinks', 'food', 'coffee'].map(cat => {
                                            const arr = cat === 'drinks' ? drinks : cat === 'food' ? food : coffee;
                                            if(arr.length === 0) return null;
                                            return (
                                                <div key={cat} className="mb-6">
                                                    <h4 className="text-[10px] font-black text-slate-800 uppercase tracking-widest mb-2 bg-slate-100 px-2 py-1 rounded">{cat}</h4>
                                                    {arr.map(item => (
                                                        <div key={item.id} className="flex justify-between items-center text-xs font-bold text-slate-600 py-1 border-b border-slate-50 group">
                                                            <div className="flex flex-col items-center justify-center bg-slate-100 rounded px-1 py-0.5 mr-1 border border-slate-200">
                                                                <button onClick={() => moveItem(cat, item.id, 'up')} className="text-slate-500 hover:text-blue-600 active:text-blue-800" title="Move Up"><i className="ph-bold ph-caret-up text-[12px]"></i></button>
                                                                <button onClick={() => moveItem(cat, item.id, 'down')} className="text-slate-500 hover:text-blue-600 active:text-blue-800" title="Move Down"><i className="ph-bold ph-caret-down text-[12px]"></i></button>
                                                            </div>
                                                            <div className="flex-1 flex gap-2 items-center">
                                                                <button onClick={() => updateItem(cat, item.id, 'isCompact', !item.isCompact)} className={`p-1 rounded ${item.isCompact ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-400'}`} title="Toggle Compact Mode"><i className="ph-bold ph-arrows-in-line-vertical"></i></button>
                                                                <button onClick={() => duplicateItem(cat, item)} className="p-1 rounded bg-slate-100 text-slate-400 hover:text-blue-600" title="Duplicate Item"><i className="ph-bold ph-copy"></i></button>
                                                                <input value={item.name} onChange={e=>updateItem(cat, item.id, 'name', e.target.value.toUpperCase())} className="list-edit-input w-2/5 uppercase text-slate-700" placeholder="Name" />
                                                                <input value={item.desc} onChange={e=>updateItem(cat, item.id, 'desc', e.target.value)} className="list-edit-input w-2/5 text-slate-500" placeholder="Desc" />
                                                                <input value={item.price} onChange={e=>updateItem(cat, item.id, 'price', e.target.value)} className="list-edit-input w-1/5 text-blue-600" placeholder="$" />
                                                            </div>
                                                            <button onClick={()=>removeList(cat, item.id)} className="text-red-300 hover:text-red-600 px-2 opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph-bold ph-trash"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-4 animate-in slide-in-from-right-4 duration-300">
                                    
                                    <h3 className="font-black uppercase text-[10px] text-slate-400 tracking-widest mb-4 pt-4">Add Graphic via Image URL</h3>
                                    <div className="flex gap-2 mb-4">
                                        <input className="sidebar-input w-2/3" value={manualImgUrl} onChange={e=>setManualImgUrl(e.target.value)} placeholder="Paste image URL here..." />
                                        <button onClick={() => { if(manualImgUrl) { addGraphic(manualImgUrl); setManualImgUrl(''); } }} className="w-1/3 py-2 bg-blue-600 text-white font-black rounded-xl hover:bg-blue-700 transition-all uppercase tracking-widest text-[10px]">
                                            Add URL
                                        </button>
                                    </div>

                                    <h3 className="font-black uppercase text-[10px] text-slate-400 tracking-widest mb-4 pt-4 border-t border-slate-100">Or Search Unsplash Graphics</h3>
                                    <div className="flex gap-2">
                                        <input className="sidebar-input uppercase w-2/3" value={searchQuery} onChange={e=>setSearchQuery(e.target.value.toUpperCase())} placeholder="Search product..." />
                                        <input className="sidebar-input w-1/3" value={graphicPrice} onChange={e=>setGraphicPrice(e.target.value)} placeholder="$Price" />
                                    </div>

                                    <button onClick={() => searchUnsplash(searchQuery)} className="w-full py-3 bg-slate-900 text-white font-black rounded-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-2 shadow-lg active:scale-95 uppercase tracking-widest text-xs">
                                        {isSearching ? <i className="ph-bold ph-spinner animate-spin"></i> : <><i className="ph-bold ph-magnifying-glass"></i> Search Graphics</>}
                                    </button>

                                    <div className="flex flex-wrap gap-1 mt-2">
                                        {presetIceCreams.map(p => (
                                            <button key={p} onClick={() => { setSearchQuery(p.toUpperCase()); searchUnsplash(p); }} className="text-[9px] bg-slate-100 text-slate-500 font-bold px-2 py-1 rounded hover:bg-blue-100 hover:text-blue-600 transition-colors uppercase">{p}</button>
                                        ))}
                                    </div>

                                    {searchResults.length > 0 && (
                                        <div className="grid grid-cols-2 gap-2 p-2 bg-slate-50 border border-slate-200 rounded-xl mt-4">
                                            <div className="col-span-2 flex justify-between items-center mb-1">
                                                <span className="text-[8px] font-black text-slate-400 uppercase">Select Image</span>
                                                <button onClick={() => setSearchResults([])} className="text-slate-400 hover:text-red-500"><i className="ph ph-x text-[10px]"></i></button>
                                            </div>
                                            {searchResults.slice(0, 4).map((r, i) => (
                                                <button key={i} onClick={() => addGraphic(r.urls.regular)} className="aspect-square rounded-lg overflow-hidden border-2 border-transparent hover:border-blue-600 shadow-sm transition-all group relative">
                                                    <img src={r.urls.regular} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                                    <div className="absolute inset-0 bg-blue-600/0 group-hover:bg-blue-600/20 transition-colors flex items-center justify-center"><i className="ph-bold ph-plus text-white opacity-0 group-hover:opacity-100 text-2xl drop-shadow-md"></i></div>
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    <div className="pt-6 border-t border-slate-100">
                                        <h3 className="font-black uppercase text-[10px] text-slate-400 tracking-widest mb-4">Current Graphics ({iceCreams.length}/12)</h3>
                                        <div className="space-y-2">
                                            {iceCreams.map(ic => (
                                                <div key={ic.id} className="flex items-center gap-3 bg-white p-2 rounded-lg border border-slate-200 shadow-sm">
                                                    <img src={ic.img} className="w-8 h-8 rounded-full object-cover border border-slate-100" />
                                                    <div className="flex-1">
                                                        <input value={ic.name} onChange={e => setIceCreams(iceCreams.map(x => x.id === ic.id ? {...x, name: e.target.value.toUpperCase()} : x))} className="list-edit-input text-xs font-black text-slate-900 uppercase" />
                                                        <input value={ic.price} onChange={e => setIceCreams(iceCreams.map(x => x.id === ic.id ? {...x, price: e.target.value} : x))} className="list-edit-input text-[10px] font-bold text-blue-600" />
                                                    </div>
                                                    <button onClick={() => setIceCreams(iceCreams.filter(x => x.id !== ic.id))} className="text-red-400 hover:text-red-600 p-2"><i className="ph-bold ph-trash"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="p-6 bg-slate-50 border-t border-slate-200 space-y-3">
                            <button onClick={() => window.print()} className="w-full py-4 bg-slate-900 text-white font-black rounded-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-2 shadow-xl active:scale-95 uppercase tracking-widest">
                                <i className="ph-bold ph-printer text-xl"></i> Print A3 Poster
                            </button>
                        </div>
                    </div>

                    {/* Right Side: A3 Preview */}
                    <div className="flex-grow overflow-y-auto bg-slate-200 dark:bg-slate-950 p-8 flex flex-col items-center custom-scroll print:p-0 print:block transition-colors duration-300">
                        
                        {/* Toggle controls - No Print */}
                        <div className="no-print bg-white dark:bg-slate-900 p-2 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 mb-6 flex gap-2">
                            <button onClick={()=>setPreviewMode('text')} className={`px-6 py-2 rounded-lg text-sm font-bold uppercase tracking-widest transition-all ${previewMode === 'text' ? 'bg-blue-50 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>Standard Menu Mode</button>
                            <button onClick={()=>setPreviewMode('graphic')} className={`px-6 py-2 rounded-lg text-sm font-bold uppercase tracking-widest transition-all ${previewMode === 'graphic' ? 'bg-blue-50 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>Graphic Treats Mode</button>
                        </div>

                        <div className="a3-canvas relative flex-shrink-0 print-font">
                            
                            {/* Brand Assets */}
                            <img src="./assets/brand-swoop.svg" className="brand-asset" style={{ top: '-10%', left: '-10%', width: '60%', opacity: 0.1, transform: 'rotate(180deg)' }} />
                            <img src="./assets/brand-wave.svg" className="brand-asset" style={{ bottom: '-5%', right: '-25%', width: '90%', opacity: 0.4, filter: 'brightness(0) saturate(100%) invert(18%) sepia(95%) saturate(2335%) hue-rotate(198deg) brightness(91%) contrast(105%)' }} />

                            <div className="menu-content">
                                {/* Header */}
                                <div className="text-center mb-10 relative z-20">
                                    <h1 className="text-7xl font-black text-slate-900 uppercase tracking-tighter mb-2">
                                        {previewMode === 'text' ? 'Menu' : 'Ice Creams'}
                                    </h1>
                                    <p className="text-2xl font-bold text-blue-600 uppercase tracking-[0.2em]">Clarence Regional Aquatic Centre</p>
                                </div>

                                {previewMode === 'text' && (
                                    <div className="menu-grid">
                                        <div>
                                            <h2 className="category-header">Drinks</h2>
                                            {drinks.map(item => (
                                                <div key={item.id} className="menu-item">
                                                    {item.isCompact ? (
                                                        <div className="menu-item-compact">
                                                            <span>{item.name} {item.desc && <span className="text-slate-400 font-normal ml-1">- {item.desc}</span>}</span>
                                                            <span className="menu-item-compact-price">{item.price}</span>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <div className="menu-item-row">
                                                                <span className="menu-item-name">{item.name}</span>
                                                                <span className="menu-item-dots"></span>
                                                                <span className="menu-item-price">{item.price}</span>
                                                            </div>
                                                            {item.desc && <div className="menu-item-desc">{item.desc}</div>}
                                                        </>
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        <div>
                                            <h2 className="category-header">Food</h2>
                                            {food.map(item => (
                                                <div key={item.id} className="menu-item">
                                                    {item.isCompact ? (
                                                        <div className="menu-item-compact">
                                                            <span>{item.name} {item.desc && <span className="text-slate-400 font-normal ml-1">- {item.desc}</span>}</span>
                                                            <span className="menu-item-compact-price">{item.price}</span>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <div className="menu-item-row">
                                                                <span className="menu-item-name">{item.name}</span>
                                                                <span className="menu-item-dots"></span>
                                                                <span className="menu-item-price">{item.price}</span>
                                                            </div>
                                                            {item.desc && <div className="menu-item-desc">{item.desc}</div>}
                                                        </>
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        <div>
                                            <h2 className="category-header">Coffee</h2>
                                            {coffee.map(item => (
                                                <div key={item.id} className="menu-item">
                                                    {item.isCompact ? (
                                                        <div className="menu-item-compact">
                                                            <span>{item.name} {item.desc && <span className="text-slate-400 font-normal ml-1">- {item.desc}</span>}</span>
                                                            <span className="menu-item-compact-price">{item.price}</span>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <div className="menu-item-row">
                                                                <span className="menu-item-name">{item.name}</span>
                                                                <span className="menu-item-dots"></span>
                                                                <span className="menu-item-price">{item.price}</span>
                                                            </div>
                                                            {item.desc && <div className="menu-item-desc">{item.desc}</div>}
                                                        </>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {previewMode === 'graphic' && iceCreams.length > 0 && (
                                    <div className="ice-cream-grid-full relative z-20">
                                        {iceCreams.map(ic => (
                                            <div key={ic.id} className="ice-cream-card">
                                                <div className="ice-cream-img-wrapper">
                                                    <img src={ic.img} className="ice-cream-img" />
                                                </div>
                                                <div className="ice-cream-price-tag">{ic.price}</div>
                                                <div className="ice-cream-name">{ic.name}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {previewMode === 'graphic' && iceCreams.length === 0 && (
                                    <div className="text-center text-slate-400 mt-20 text-2xl font-bold uppercase tracking-widest relative z-20">
                                        Add graphics from the sidebar to populate this menu.
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="./nav.js" data-title="Menu Builder" data-icon="ph-list" data-help="Create and print professional A3 kiosk menus. Add items to categories, customise prices and descriptions, or search/upload product graphics to display visual deals. Click Print A3 Poster to print or save as PDF."></script>
</body>
</html>
