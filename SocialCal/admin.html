<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Auth Styles */
        #authOverlay { transition: all 0.4s ease-in-out; }
        .dashboard-locked { filter: blur(10px); pointer-events: none; user-select: none; }
        
        .fc { font-family: inherit; }
        .fc .fc-toolbar-title { font-weight: 800; color: #1e3a8a; }
        
        .ql-editor { min-height: 200px; line-height: 1.6; }
        .ql-editor h2 { font-size: 1.5rem; font-weight: 800; color: #1e3a8a; margin-top: 1.25rem; }
        .ql-editor h3 { font-size: 1.25rem; font-weight: 700; color: #334155; margin-top: 1rem; }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-slate-50 to-cyan-50 text-slate-800 min-h-screen">

    <div id="authOverlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-blue-900">Admin Login</h2>
                <p class="text-slate-500 text-sm mt-2">Marketing Supervisor access only.</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email Address" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="loginPass" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all transform active:scale-95">Sign In</button>
            </div>
            <p id="authError" class="text-red-500 text-xs mt-4 text-center hidden font-bold"></p>
        </div>
    </div>

    <div id="mainDashboard" class="dashboard-locked max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl ring-1 ring-slate-100 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-cyan-600">Marketing Admin</h1>
                <p class="text-sm text-slate-500 font-medium mt-1">Review, format, and approve staff content requests.</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 items-center w-full md:w-auto">
                <button id="runAiBtn" class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2">
                    Run AI Automator
                </button>
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button id="viewGridBtn" class="bg-white px-4 py-2 rounded-lg text-sm font-bold text-blue-700 shadow-sm">Grid View</button>
                    <button id="viewCalBtn" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-500">Calendar</button>
                </div>
                <button id="logoutBtn" class="text-slate-400 hover:text-red-500 text-sm font-bold ml-2">Logout</button>
            </div>
        </div>

        <div class="bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl ring-1 ring-slate-100">
            <div id="requestsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="calendarContainer" class="hidden"><div id="calendar"></div></div>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[95vh] flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50 rounded-t-2xl">
                <h3 id="modalTitle" class="text-2xl font-extrabold text-blue-900">Request Title</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-700 bg-white rounded-full p-1 border">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-grow grid grid-cols-1 lg:grid-cols-5 gap-8">
                <div class="lg:col-span-2 space-y-4">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b pb-2">Staff Request</h4>
                    <div class="bg-slate-50 p-3 rounded-xl border"><span class="block text-[10px] text-slate-500 font-bold uppercase mb-1">Date Needed</span><input type="date" id="editDate" class="bg-transparent font-bold text-blue-800"></div>
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100"><span class="block text-xs font-bold text-blue-600 mb-2 uppercase">Key Info</span><textarea id="editKeyMessage" rows="5" class="w-full bg-white/50 text-sm p-2 rounded focus:bg-white outline-none resize-none"></textarea></div>
                    <div id="ctaBox" class="bg-amber-50 p-3 rounded-xl border border-amber-200"><span class="block text-xs font-bold text-amber-700 mb-1 uppercase">CTA</span><span id="modalCTA" class="text-sm font-bold text-amber-900"></span></div>
                </div>
                <div class="lg:col-span-3 space-y-4 flex flex-col h-full">
                    <div class="flex justify-between items-center border-b pb-2"><h4 class="text-xs font-bold text-blue-600 uppercase">Final Copy Editor</h4><span id="statusIndicator" class="px-2 py-1 text-[10px] font-bold rounded-full text-white bg-slate-500 uppercase">Pending</span></div>
                    <div class="flex-grow flex flex-col"><div id="quillEditor" class="bg-white"></div></div>
                </div>
            </div>
            <div class="p-6 border-t bg-slate-50/50 rounded-b-2xl flex justify-between items-center">
                <button id="deleteBtn" class="text-red-500 hover:text-red-700 font-bold text-sm flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>Delete</button>
                <div class="flex items-center gap-3">
                    <a id="signLinkBtn" target="_blank" class="hidden bg-white border border-slate-300 px-4 py-2 rounded-xl text-sm font-bold items-center gap-2">Create Printable Sign</a>
                    <button id="saveDraftBtn" class="bg-white border text-slate-700 px-5 py-2.5 rounded-xl font-bold text-sm">Save Pending</button>
                    <button id="approveBtn" class="bg-gradient-to-r from-emerald-500 to-emerald-400 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-emerald-500/30">Approve & Publish</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-AwiFvSq3_AuDVZE5l1Pn4oAIfZTFmOM",
            authDomain: "opsf---comms-task-tracker.firebaseapp.com",
            projectId: "opsf---comms-task-tracker",
            storageBucket: "opsf---comms-task-tracker.firebasestorage.app",
            messagingSenderId: "489224390639",
            appId: "1:489224390639:web:c5da72d0dc302d8332581a",
            measurementId: "G-CBJK0070Z1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentEditingId = null;
        let globalRequestsArray = [];
        let firestoreUnsubscribe = null;

        // Initialize Quill
        const quill = new Quill('#quillEditor', {
            theme: 'snow',
            modules: { toolbar: [['bold', 'italic', 'underline'], [{ 'header': [1, 2, 3, false] }], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['link', 'clean']] }
        });

        // Initialize Calendar
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            height: 'auto',
            eventClick: (info) => openModal(info.event.id, globalRequestsArray.find(r => r.id === info.event.id))
        });
        calendar.render();

        // --- AUTH LOGIC ---
        const authOverlay = document.getElementById('authOverlay');
        const mainDashboard = document.getElementById('mainDashboard');
        const authError = document.getElementById('authError');

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                authError.innerText = "Access Denied: Check credentials.";
                authError.classList.remove('hidden');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authOverlay.classList.add('hidden');
                mainDashboard.classList.remove('dashboard-locked');
                startFirestoreListener();
            } else {
                authOverlay.classList.remove('hidden');
                mainDashboard.classList.add('dashboard-locked');
                if (firestoreUnsubscribe) firestoreUnsubscribe();
            }
        });

        // --- DATABASE LOGIC ---
        function startFirestoreListener() {
            const requestsCol = collection(db, 'requests');
            firestoreUnsubscribe = onSnapshot(requestsCol, (snapshot) => {
                const gridView = document.getElementById('requestsGrid');
                gridView.innerHTML = '';
                calendar.removeAllEvents();
                let pCount = 0, aCount = 0;
                
                globalRequestsArray = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                globalRequestsArray.forEach(data => {
                    data.status === 'Approved' ? aCount++ : pCount++;
                    calendar.addEvent({ id: data.id, title: data.title, start: data.date, color: data.status === 'Approved' ? '#10b981' : '#94a3b8' });
                    
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-2xl border shadow-md hover:shadow-xl transition-all hover:-translate-y-1 cursor-pointer";
                    card.innerHTML = `
                        <div class="flex justify-between mb-4"><span class="px-2 py-1 text-[10px] font-bold rounded border ${data.status === 'Approved' ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-50 text-slate-500'} uppercase">${data.status}</span><span class="text-[10px] font-bold text-slate-400">${data.date}</span></div>
                        <h3 class="font-extrabold text-slate-800 leading-tight mb-4">${data.title}</h3>
                        <button class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 rounded-xl text-xs uppercase tracking-widest">Review Request</button>
                    `;
                    card.onclick = () => openModal(data.id, data);
                    gridView.appendChild(card);
                });
            });
        }

        function openModal(id, data) {
            currentEditingId = id;
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('editDate').value = data.date;
            document.getElementById('editKeyMessage').value = data.keyMessage;
            document.getElementById('modalCTA').innerText = data.cta || "Check Client Portal";
            
            // Signage Logic with Cleaner
            const signBtn = document.getElementById('signLinkBtn');
            if (data.generateSign) {
                signBtn.classList.remove('hidden'); signBtn.classList.add('flex');
                let h = data.signHeadline || data.title || 'NOTICE';
                let b = data.signBody || data.keyMessage || '';
                h = h.replace(/\*\*/g, '');
                b = b.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                signBtn.href = `https://brisk3r.github.io/CRAC---Tools-and-Requests/NoticeSignGenerator.html?headline=${encodeURIComponent(h)}&body=${encodeURIComponent(b)}`;
            } else { signBtn.classList.add('hidden'); }

            quill.root.innerHTML = data.rewrittenPost || '';
            const statusIndicator = document.getElementById('statusIndicator');
            statusIndicator.innerText = data.status;
            statusIndicator.className = `px-2 py-1 text-[10px] font-bold rounded-full text-white uppercase ${data.status === 'Approved' ? 'bg-emerald-500' : 'bg-slate-500'}`;
            document.getElementById('adminModal').classList.remove('hidden');
        }

        // Action Handlers
        const saveAction = async (status) => {
            if(!currentEditingId) return;
            await updateDoc(doc(db, "requests", currentEditingId), {
                status: status,
                rewrittenPost: quill.root.innerHTML,
                date: document.getElementById('editDate').value,
                keyMessage: document.getElementById('editKeyMessage').value
            });
            document.getElementById('adminModal').classList.add('hidden');
        };

        document.getElementById('approveBtn').onclick = () => saveAction('Approved');
        document.getElementById('saveDraftBtn').onclick = () => saveAction('Pending');
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('adminModal').classList.add('hidden');
        document.getElementById('runAiBtn').onclick = () => fetch("https://script.google.com/macros/s/AKfycbyZ4_rxgM24WPwqbx_HHFFkKOjfkA907L03QvgarkzG29ZFQ7FGmEPLl1IAbHcM0sg8/exec", {mode: 'no-cors'});
    </script>
</body>
</html>
