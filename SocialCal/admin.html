<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Admin Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    
    <!-- Quill.js - Robust Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        #authOverlay { transition: all 0.4s ease-in-out; }
        .dashboard-locked { filter: blur(15px); pointer-events: none; }
        
        /* Full Robust Editor Styles */
        .ql-toolbar.ql-snow { border: 1px solid #e2e8f0; border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; background-color: #f8fafc; }
        .ql-container.ql-snow { border: 1px solid #e2e8f0; border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; font-family: inherit; }
        .ql-editor { min-height: 350px; color: #1e293b; line-height: 1.6; font-size: 0.95rem; }
        .ql-editor p { margin-bottom: 0.75rem; }
        .ql-editor h2 { font-size: 1.5rem; font-weight: 800; color: #1e3a8a; margin-top: 1.25rem; }
        .ql-editor strong { font-weight: 700; color: #1e3a8a; }

        .fc { font-family: inherit; }
        .fc .fc-toolbar-title { font-weight: 800; color: #1e3a8a; }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-slate-50 to-cyan-50 text-slate-800 min-h-screen">

    <!-- Auth Layer -->
    <div id="authOverlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-3xl font-extrabold text-blue-900">Admin Access</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email Address" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                <input type="password" id="loginPass" placeholder="Password" class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                <button id="loginBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all hover:bg-blue-700">Sign In</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="dashboard-locked max-w-7xl mx-auto p-4 md:p-8">
        <div class="bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl ring-1 ring-slate-100 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-cyan-600">Marketing Admin</h1>
                    <span id="userBadge" class="hidden px-2 py-1 bg-blue-50 text-blue-600 rounded-md text-[10px] font-bold border border-blue-100 uppercase tracking-widest"></span>
                </div>
                <p class="text-sm text-slate-500 font-medium">Review and finalise drafted content.</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 items-center w-full md:w-auto">
                <div class="relative">
                    <button id="processMenuBtn" class="bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg shadow-cyan-500/20 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Process
                        <svg class="w-4 h-4 ml-1 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="processDropdown" class="hidden absolute top-full mt-2 right-0 md:left-0 w-56 bg-white rounded-xl shadow-xl border border-slate-100 z-50 overflow-hidden">
                        <button id="processAutoBtn" class="w-full text-left px-4 py-3 text-sm font-bold text-slate-700 hover:bg-slate-50 border-b flex items-center gap-3">
                            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            Auto (Background)
                        </button>
                        <button id="processManualBtn" class="w-full text-left px-4 py-3 text-sm font-bold text-slate-700 hover:bg-slate-50 flex items-center gap-3">
                            <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                            Manual (One-by-One)
                        </button>
                    </div>
                </div>
                <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                    <button id="viewGridBtn" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-700 transition-all">Grid</button>
                    <button id="viewCalBtn" class="bg-white px-4 py-2 rounded-lg text-sm font-bold text-blue-700 shadow-sm transition-all">Calendar</button>
                </div>
                <button id="addNewBtn" class="bg-white text-blue-600 border border-blue-100 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm hover:bg-blue-50 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New
                </button>
                <button id="logoutBtn" class="text-slate-400 hover:text-red-500 text-[10px] font-black uppercase tracking-widest ml-2 transition-colors">Logout</button>
            </div>
        </div>

        <div class="bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl ring-1 ring-slate-100 min-h-[60vh]">
            <div id="requestsGrid" class="hidden flex flex-col gap-4">
                <div class="col-span-full text-center py-20 text-slate-400 animate-pulse font-bold tracking-widest uppercase text-xs">Syncing Database...</div>
            </div>
            <div id="calendarContainer"><div id="calendar"></div></div>
        </div>
    </div>

    <!-- Robust Edit Modal -->
    <div id="adminModal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-6xl w-full max-h-[95vh] flex flex-col transform transition-all">
            <!-- Modal Header -->
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50 rounded-t-2xl">
                <div>
                    <h3 id="modalTitle" class="text-2xl font-extrabold text-blue-900 leading-tight">Request</h3>
                    <p id="modalStaffInfo" class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">Submitted by <span id="staffNameDisplay" class="text-blue-600">Name</span></p>
                </div>
                <div class="flex items-center gap-4">
                    <span id="queueCounter" class="hidden px-3 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-lg border border-emerald-200"></span>
                    <button id="closeModalBtn" class="text-slate-400 hover:text-slate-700 bg-white rounded-full p-1 border shadow-sm transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
            
            <div class="p-6 overflow-y-auto flex-grow grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Left Sidebar: The Brief -->
                <div class="lg:col-span-4 space-y-4">
                    <div class="flex justify-between items-center border-b pb-2">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">The Brief</h4>
                        <span id="statusIndicator" class="px-2 py-0.5 text-[9px] font-black rounded-full text-white uppercase bg-slate-500">Pending</span>
                    </div>

                    <div id="briefFields" class="space-y-4">
                        <div class="bg-slate-50 p-3 rounded-xl border">
                            <span class="block text-[9px] text-slate-400 uppercase font-black mb-1">Facility</span>
                            <select id="facilitySelect" class="w-full bg-transparent font-bold text-slate-700 text-sm outline-none">
                                <option value="Clarence Regional Aquatic Centre">Clarence Regional (CRAC)</option>
                                <option value="Yamba Community Pool">Yamba Community Pool</option>
                            </select>
                        </div>

                        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                            <span class="block text-[9px] font-black text-blue-600 uppercase mb-1">Primary Category</span>
                            <select id="categorySelect" class="w-full bg-transparent font-bold text-blue-900 text-sm outline-none">
                                <option value="Maintenance Closure">Maintenance / Closure</option>
                                <option value="Swim School Intensive">Swim School / Intensives</option>
                                <option value="Squad Training">Squad / Training Update</option>
                                <option value="Lane Availability">Lane Availability / Public Swim</option>
                                <option value="Community Event">Event / BBQ / Fun Day</option>
                                <option value="Staff Spotlight">Staff Spotlight / Hiring</option>
                                <option value="Health Fitness">Health & Fitness / Aqua</option>
                            </select>
                        </div>

                        <div class="bg-slate-50 p-3 rounded-xl border">
                            <div class="flex justify-between items-center mb-1">
                                <span class="block text-[9px] text-slate-400 uppercase font-black">Specific Topic</span>
                                <button id="suggestBtn" class="text-[9px] font-black text-blue-600 hover:text-blue-800 uppercase flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    Suggest
                                </button>
                            </div>
                            <input type="text" id="editTitle" class="w-full bg-transparent font-bold text-slate-800 text-sm outline-none" placeholder="e.g. Pump repair on Main Pool">
                        </div>

                        <div class="bg-slate-50 p-3 rounded-xl border">
                            <span class="block text-[9px] text-slate-400 uppercase font-black mb-1">Date Needed</span>
                            <input type="date" id="editDate" class="w-full bg-transparent font-bold text-slate-800 text-sm outline-none">
                        </div>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <label class="block text-[9px] font-black text-blue-600 uppercase mb-2">Raw Message Details (Facts Only)</label>
                        <textarea id="editKeyMessage" rows="6" placeholder="Paste dates, times, and specific instructions here..." class="w-full bg-white/50 text-sm p-3 rounded-lg border border-blue-100 focus:bg-white outline-none resize-none leading-relaxed text-slate-700"></textarea>
                    </div>

                    <div id="assetBox" class="bg-indigo-50 p-4 rounded-xl border border-indigo-200 hidden">
                        <a id="modalAssetLink" href="#" target="_blank" class="inline-flex w-full justify-center bg-indigo-600 text-white text-xs font-bold py-3 rounded-lg shadow-sm items-center gap-2 hover:bg-indigo-700 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            View Attached Asset
                        </a>
                    </div>
                </div>

                <!-- Right Sidebar: Robust Editor & Signage -->
                <div class="lg:col-span-8 flex flex-col h-full space-y-4">
                    <div class="flex items-center justify-between border-b pb-2">
                        <div class="flex gap-4">
                            <button id="tabSocial" class="channel-tab active text-[10px] font-black text-blue-600 border-b-2 border-blue-600 pb-2 uppercase tracking-widest">Social Media</button>
                            <button id="tabNews" class="channel-tab text-[10px] font-black text-slate-400 pb-2 uppercase tracking-widest hover:text-pink-500 transition-colors">Newsletter</button>
                            <button id="tabWeb" class="channel-tab text-[10px] font-black text-slate-400 pb-2 uppercase tracking-widest hover:text-emerald-500 transition-colors">Website Alert</button>
                        </div>
                        <button id="rerunAiBtn" class="text-slate-400 hover:text-blue-600 transition-all flex items-center gap-1.5 px-2 py-1 rounded-md hover:bg-blue-50 group" title="Re-run AI Drafting">
                            <span id="rerunStatus" class="text-[9px] font-black uppercase hidden group-hover:inline">Regenerate</span>
                            <svg class="w-4 h-4 group-hover:animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </button>
                    </div>
                    
                    <div class="flex-grow flex flex-col min-h-[450px] space-y-4">
                        <div id="quillEditor" class="bg-white rounded-xl shadow-inner"></div>
                        
                        <!-- Signage Control Panel -->
                        <div id="signageControls" class="bg-slate-100 p-4 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="md:col-span-3 border-b border-slate-200 pb-2 mb-1 flex justify-between items-center">
                                <h5 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Signage Tool Parameters</h5>
                                <a id="signLinkBtn" target="_blank" class="hidden bg-white border border-slate-300 text-slate-700 px-3 py-1 rounded-lg text-[9px] font-bold items-center gap-1.5 shadow-sm transition-all uppercase hover:bg-slate-50">
                                    <svg class="w-3 h-3 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2-2h6a2 2 0 002-2v-4a2 2 0 012-2H5a2 2 0 012 2v4a2 2 0 002 2m2-2h2m-4-3h4"></path></svg>
                                    Launch Sign Tool
                                </a>
                            </div>
                            <div class="md:col-span-1">
                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Headline</label>
                                <input type="text" id="signHeadline" class="w-full p-2 text-xs border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700" placeholder="e.g. POOL CLOSURE">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Sign Body Summary</label>
                                <input type="text" id="signBody" class="w-full p-2 text-xs border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-slate-700" placeholder="A short 1-2 sentence version for signage...">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer Actions -->
            <div class="p-6 border-t bg-slate-50/50 rounded-b-2xl flex justify-between items-center">
                <button id="deleteBtn" class="text-red-500 hover:text-red-700 font-bold text-xs uppercase tracking-widest flex items-center gap-2 px-4 py-2 hover:bg-red-50 rounded-xl transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Delete
                </button>
                <div class="flex items-center gap-3">
                    <button id="saveDraftBtn" class="bg-white border text-slate-700 px-6 py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all">Save Draft</button>
                    <button id="approveBtn" class="bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-700 text-white px-10 py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg transform hover:-translate-y-0.5 transition-all">Approve & Publish</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase & Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-AwiFvSq3_AuDVZE5l1Pn4oAIfZTFmOM",
            authDomain: "opsf---comms-task-tracker.firebaseapp.com",
            projectId: "opsf---comms-task-tracker",
            storageBucket: "opsf---comms-task-tracker.firebasestorage.app",
            messagingSenderId: "489224390639",
            appId: "1:489224390639:web:c5da72d0dc302d8332581a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentEditingId = null;
        let globalRequestsArray = [];
        let isManualReviewMode = false;
        let pendingReviewQueue = [];
        let currentTab = 'Social';
        let channelDrafts = { Social: '', Newsletter: '', Website: '' };

        // Robust Quill Editor Toolbar
        const quill = new Quill('#quillEditor', {
            theme: 'snow',
            placeholder: 'Drafted content will appear here after processing...',
            modules: { 
                toolbar: [
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'header': [2, 3, false] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'clean']
                ] 
            }
        });

        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            height: 'auto',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
            eventClick: (info) => {
                if (info.event.extendedProps.isGap) {
                    openModal(null, { date: info.event.startStr });
                } else {
                    openModal(info.event.id, globalRequestsArray.find(r => r.id === info.event.id));
                }
            },
            datesSet: () => updateGapHighlights()
        });
        calendar.render();

        // Multi-Channel Tab Switching
        const tabs = {
            Social: document.getElementById('tabSocial'),
            Newsletter: document.getElementById('tabNews'),
            Website: document.getElementById('tabWeb')
        };

        Object.keys(tabs).forEach(key => {
            tabs[key].addEventListener('click', () => switchTab(key));
        });

        function switchTab(target, skipSave = false) {
            // Save current editor content to local state unless skipping (e.g. initial load)
            if (!skipSave) channelDrafts[currentTab] = quill.root.innerHTML;

            // Update UI
            Object.keys(tabs).forEach(key => {
                const isActive = key === target;
                tabs[key].classList.toggle('active', isActive);
                if (isActive) {
                    tabs[key].classList.remove('text-slate-400');
                    tabs[key].classList.add('border-b-2');
                    if (key === 'Social') tabs[key].classList.add('text-blue-600', 'border-blue-600');
                    if (key === 'Newsletter') tabs[key].classList.add('text-pink-600', 'border-pink-600');
                    if (key === 'Website') tabs[key].classList.add('text-emerald-600', 'border-emerald-600');
                } else {
                    tabs[key].classList.remove('border-b-2', 'text-blue-600', 'text-pink-600', 'text-emerald-600', 'border-blue-600', 'border-pink-600', 'border-emerald-600');
                    tabs[key].classList.add('text-slate-400');
                }
            });

            currentTab = target;
            quill.root.innerHTML = channelDrafts[target] || '';
        }

        // Auth
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value); } 
            catch (err) { alert("Access Denied."); }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('dashboard-locked');
                document.getElementById('userBadge').innerText = user.email;
                document.getElementById('userBadge').classList.remove('hidden');
                startFirestoreListener();
            } else {
                document.getElementById('authOverlay').classList.remove('hidden');
                document.getElementById('mainDashboard').classList.add('dashboard-locked');
            }
        });

        function startFirestoreListener() {
            onSnapshot(collection(db, 'requests'), (snapshot) => {
                const gridView = document.getElementById('requestsGrid');
                gridView.innerHTML = '';
                calendar.removeAllEvents();
                globalRequestsArray = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Live Update Open Modal if data changes
                if (currentEditingId) {
                    const freshData = globalRequestsArray.find(r => r.id === currentEditingId);
                    if (freshData && !isManualReviewMode) { // Don't interrupt manual review flow
                        channelDrafts = {
                            Social: freshData.rewrittenPost || '',
                            Newsletter: freshData.rewrittenNewsletter || '',
                            Website: freshData.rewrittenWebsite || ''
                        };
                        quill.root.innerHTML = channelDrafts[currentTab] || '';
                    }
                }

                globalRequestsArray.sort((a, b) => (a.status === 'Pending' ? -1 : 1) || new Date(a.date) - new Date(b.date));
                globalRequestsArray.forEach(data => {
                    const isApproved = data.status === 'Approved';
                    calendar.addEvent({ id: data.id, title: data.title, start: data.date, color: isApproved ? '#10b981' : '#94a3b8' });
                    
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl border border-slate-100 shadow-md hover:shadow-xl transition-all cursor-pointer group flex flex-col overflow-hidden";
                    
                    // Thumbnail Logic
                    const thumbContent = data.assetUrl 
                        ? `<img src="${data.assetUrl}" class="w-full h-32 object-cover bg-slate-100">`
                        : `<div class="w-full h-32 bg-slate-50 flex items-center justify-center border-b border-slate-100 group-hover:bg-blue-50 transition-colors">
                             <svg class="w-8 h-8 text-slate-200 group-hover:text-blue-200 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                           </div>`;

                    card.innerHTML = `
                        ${thumbContent}
                        <div class="p-5 flex-grow">
                            <div class="flex justify-between items-start mb-3">
                                <span class="px-2 py-0.5 text-[8px] font-black rounded-md border uppercase tracking-wider ${isApproved ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-slate-50 text-slate-400 border-slate-100'}">${data.status}</span>
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tight">${data.date}</span>
                            </div>
                            <h3 class="font-extrabold text-slate-800 leading-tight mb-4 text-sm line-clamp-2 min-h-[2.5rem] group-hover:text-blue-600 transition-colors">${data.title}</h3>
                            <div class="flex items-center justify-between mt-auto">
                                <div class="flex gap-1.5 items-center">
                                    <span class="px-1.5 py-0.5 bg-blue-50 text-blue-600 rounded text-[8px] font-black uppercase tracking-widest border border-blue-100">${data.facility && data.facility.includes('Clarence') ? 'CRAC' : 'Yamba'}</span>
                                    <div class="flex gap-1 ml-1 border-l pl-2 border-slate-100">
                                        ${data.channels?.includes('Social') ? `<svg class="w-3 h-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg>` : ''}
                                        ${data.channels?.includes('Newsletter') ? `<svg class="w-3 h-3 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>` : ''}
                                        ${data.channels?.includes('Website') ? `<svg class="w-3 h-3 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>` : ''}
                                    </div>
                                </div>
                                <svg class="w-4 h-4 text-slate-300 group-hover:text-blue-500 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    `;
                    card.onclick = () => openModal(data.id, data);
                    gridView.appendChild(card);
                });
                updateGapHighlights();
            });
        }

        function updateGapHighlights() {
            // Remove old gap events
            calendar.getEvents().forEach(ev => { if (ev.extendedProps.isGap) ev.remove(); });
            
            const view = calendar.view;
            const start = view.activeStart;
            const end = view.activeEnd;
            let curr = new Date(start);
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const datesWithEvents = new Set(globalRequestsArray.map(r => r.date));
            
            while (curr < end) {
                const dStr = curr.toISOString().split('T')[0];
                if (!datesWithEvents.has(dStr) && curr >= today) {
                    calendar.addEvent({
                        title: 'GAP',
                        start: dStr,
                        display: 'background',
                        backgroundColor: '#fff7ed', // amber-50
                        extendedProps: { isGap: true }
                    });
                }
                curr.setDate(curr.getDate() + 1);
            }
        }

        function loadNextInQueue() {
            if (pendingReviewQueue.length === 0) {
                isManualReviewMode = false;
                document.getElementById('adminModal').classList.add('hidden');
                document.getElementById('queueCounter').classList.add('hidden');
                return;
            }
            const nextId = pendingReviewQueue.shift();
            const data = globalRequestsArray.find(r => r.id === nextId);
            if (data) {
                document.getElementById('queueCounter').innerText = `${pendingReviewQueue.length + 1} Remaining`;
                document.getElementById('queueCounter').classList.remove('hidden');
                openModal(nextId, data);
            } else loadNextInQueue();
        }

        function openModal(id, data) {
            currentEditingId = id;
            const isNew = id === null;
            
            document.getElementById('modalTitle').innerText = isNew ? "Create New Campaign" : data.title;
            document.getElementById('staffNameDisplay').innerText = isNew ? "Admin Entry" : (data.staffName || "Staff Member");
            document.getElementById('editDate').value = data.date || "";
            
            const facilitySelect = document.getElementById('facilitySelect');
            if (data.facility) {
                facilitySelect.value = data.facility.includes('Clarence') ? 'Clarence Regional Aquatic Centre' : 'Yamba Community Pool';
            } else {
                facilitySelect.value = 'Clarence Regional Aquatic Centre';
            }

            const categorySelect = document.getElementById('categorySelect');
            categorySelect.value = data.category || "General Update";

            document.getElementById('editKeyMessage').value = data.keyMessage || "";
            document.getElementById('editTitle').value = isNew ? "" : data.title;
            
            // Asset Box
            const assetBox = document.getElementById('assetBox');
            if (!isNew && data.assetUrl) {
                document.getElementById('modalAssetLink').href = data.assetUrl;
                assetBox.classList.remove('hidden');
            } else assetBox.classList.add('hidden');
            
            // Signage Bridge Controls
            document.getElementById('signHeadline').value = data.signHeadline || '';
            document.getElementById('signBody').value = data.signBody || '';
            
            const signBtn = document.getElementById('signLinkBtn');
            if (!isNew && data.generateSign) {
                signBtn.classList.remove('hidden'); signBtn.classList.add('flex');
                updateSignLink(data);
            } else signBtn.classList.add('hidden');

            // Initialize multi-channel drafts
            channelDrafts = {
                Social: data.rewrittenPost || '',
                Newsletter: data.rewrittenNewsletter || '',
                Website: data.rewrittenWebsite || ''
            };
            switchTab('Social', true); // Reset to Social tab by default and skip saving previous state
            
            const statusInd = document.getElementById('statusIndicator');
            statusInd.innerText = isNew ? 'Draft' : data.status;
            statusInd.className = `px-2 py-0.5 text-[9px] font-black rounded-full text-white uppercase tracking-tighter ${(!isNew && data.status === 'Approved') ? 'bg-emerald-500' : 'bg-slate-500'}`;
            
            document.getElementById('deleteBtn').classList.toggle('hidden', isNew);
            document.getElementById('adminModal').classList.remove('hidden');
        }

        function updateSignLink(data) {
            let h = document.getElementById('signHeadline').value || data.title || 'NOTICE';
            let b = document.getElementById('signBody').value || data.keyMessage || '';
            h = h.replace(/\*\*/g, '');
            b = b.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            document.getElementById('signLinkBtn').href = `https://brisk3r.github.io/CRAC---Tools-and-Requests/NoticeSignGenerator.html?headline=${encodeURIComponent(h)}&body=${encodeURIComponent(b)}`;
        }

        // Live update sign link when inputs change
        document.getElementById('signHeadline').oninput = () => { if(currentEditingId) updateSignLink(globalRequestsArray.find(r => r.id === currentEditingId)); };
        document.getElementById('signBody').oninput = () => { if(currentEditingId) updateSignLink(globalRequestsArray.find(r => r.id === currentEditingId)); };

        document.getElementById('rerunAiBtn').onclick = async () => {
            if (!currentEditingId) return;
            const btn = document.getElementById('rerunAiBtn');
            const statusText = document.getElementById('rerunStatus');
            
            if (!confirm("Regenerate all drafts for this post? This will overwrite your current edits.")) return;
            
            btn.classList.add('animate-spin', 'text-blue-600');
            statusText.innerText = "Processing...";
            statusText.classList.remove('hidden');

            try {
                // 1. Clear drafts in Firebase to trigger v4.4 Engine
                await updateDoc(doc(db, "requests", currentEditingId), {
                    status: 'Pending',
                    rewrittenPost: '',
                    rewrittenNewsletter: '',
                    rewrittenWebsite: ''
                });

                // 2. Trigger Apps Script
                await fetch("https://script.google.com/macros/s/AKfycbyZ4_rxgM24WPwqbx_HHFFkKOjfkA907L03QvgarkzG29ZFQ7FGmEPLl1IAbHcM0sg8/exec", {mode: 'no-cors'});
                
                // Keep loading state until snapshot listener picks up the change
                setTimeout(() => {
                    btn.classList.remove('animate-spin', 'text-blue-600');
                    statusText.innerText = "Regenerate";
                    statusText.classList.add('hidden');
                }, 8000); // Give AI some time to run before letting the button be clickable again

            } catch (err) {
                console.error(err);
                btn.classList.remove('animate-spin');
                statusText.innerText = "Regenerate";
            }
        };

        const menuBtn = document.getElementById('processMenuBtn');
        const dropdown = document.getElementById('processDropdown');
        menuBtn.onclick = (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); };
        document.addEventListener('click', () => dropdown.classList.add('hidden'));

        document.getElementById('addNewBtn').onclick = () => openModal(null, { date: new Date().toISOString().split('T')[0] });

        document.getElementById('suggestBtn').onclick = () => {
            const suggestions = [
                { title: "Staff Spotlight: Team Member", msg: "Feature a staff member today! Share their favorite part of working at the pool and a fun fact.", cat: "Staff Spotlight" },
                { title: "Water Safety Tip of the Week", msg: "Share a quick tip about supervision or lifejacket safety for the community.", cat: "Community Event" },
                { title: "Facility Maintenance Update", msg: "Give a 'behind the scenes' look at the plant room or pool cleaning to show the work being done.", cat: "Maintenance Closure" },
                { title: "Swim School Progress Reminder", msg: "Encourage parents to check their child's progress in the portal this afternoon.", cat: "Swim School Intensive" },
                { title: "Lap Lane Availability Update", msg: "Remind swimmers about peak lap lane times and the best hours for a quiet swim.", cat: "Lane Availability" }
            ];

            // Heuristic: Pick a category that hasn't been used in the last 3 posts
            const recentCats = globalRequestsArray.slice(0, 3).map(r => r.category);
            const freshSuggestions = suggestions.filter(s => !recentCats.includes(s.cat));
            const pick = freshSuggestions.length > 0 
                ? freshSuggestions[Math.floor(Math.random() * freshSuggestions.length)]
                : suggestions[Math.floor(Math.random() * suggestions.length)];

            document.getElementById('editTitle').value = pick.title;
            document.getElementById('editKeyMessage').value = pick.msg;
            document.getElementById('categorySelect').value = pick.cat;
            // Highlight the suggested fields
            document.getElementById('editTitle').classList.add('bg-blue-50');
            document.getElementById('editKeyMessage').classList.add('bg-blue-50');
            setTimeout(() => {
                document.getElementById('editTitle').classList.remove('bg-blue-50');
                document.getElementById('editKeyMessage').classList.remove('bg-blue-50');
            }, 1000);
        };

        document.getElementById('processAutoBtn').onclick = async () => {
            const btn = document.getElementById('processAutoBtn');
            btn.innerHTML = `<div class="animate-spin h-3 w-3 border-2 border-blue-500 border-t-transparent rounded-full inline-block mr-2"></div> Running...`;
            try {
                await fetch("https://script.google.com/macros/s/AKfycbyZ4_rxgM24WPwqbx_HHFFkKOjfkA907L03QvgarkzG29ZFQ7FGmEPLl1IAbHcM0sg8/exec", {mode: 'no-cors'});
                setTimeout(() => { alert("Background Sequence Triggered."); btn.innerHTML = "Auto (Background)"; }, 2000);
            } catch (err) { btn.innerHTML = "Auto (Background)"; }
        };

        document.getElementById('processManualBtn').onclick = () => {
            const pending = globalRequestsArray.filter(r => r.status === 'Pending');
            if (pending.length === 0) return alert("Nothing to review.");
            pendingReviewQueue = pending.map(r => r.id);
            isManualReviewMode = true;
            loadNextInQueue();
        };

        async function save(status) {
            const btn = status === 'Approved' ? document.getElementById('approveBtn') : document.getElementById('saveDraftBtn');
            const orig = btn.innerText;
            btn.innerText = "...";

            // Save current active tab content to local state before pushing to DB
            channelDrafts[currentTab] = quill.root.innerHTML;
            
            const payload = {
                status: status,
                rewrittenPost: channelDrafts.Social,
                rewrittenNewsletter: channelDrafts.Newsletter,
                rewrittenWebsite: channelDrafts.Website,
                date: document.getElementById('editDate').value,
                keyMessage: document.getElementById('editKeyMessage').value,
                signHeadline: document.getElementById('signHeadline').value,
                signBody: document.getElementById('signBody').value,
                facility: document.getElementById('facilitySelect').value,
                category: document.getElementById('categorySelect').value
            };

            try {
                if (currentEditingId) {
                    await updateDoc(doc(db, "requests", currentEditingId), payload);
                } else {
                    payload.title = document.getElementById('editTitle').value || "New Campaign";
                    payload.staffName = "Admin Entry";
                    payload.timestamp = serverTimestamp();
                    await addDoc(collection(db, "requests"), payload);
                }
                
                btn.innerText = orig;
                if (isManualReviewMode) loadNextInQueue();
                else document.getElementById('adminModal').classList.add('hidden');
            } catch (err) { console.error(err); btn.innerText = orig; }
        }

        document.getElementById('approveBtn').onclick = () => save('Approved');
        document.getElementById('saveDraftBtn').onclick = () => save('Pending');
        document.getElementById('closeModalBtn').onclick = () => { isManualReviewMode = false; document.getElementById('adminModal').classList.add('hidden'); };
        document.getElementById('deleteBtn').onclick = async () => {
            if(confirm("Delete permanently?") && currentEditingId) {
                await deleteDoc(doc(db, "requests", currentEditingId));
                if (isManualReviewMode) loadNextInQueue();
                else document.getElementById('adminModal').classList.add('hidden');
            }
        };

        document.getElementById('viewGridBtn').onclick = () => { 
            document.getElementById('requestsGrid').classList.remove('hidden'); 
            document.getElementById('calendarContainer').classList.add('hidden'); 
            document.getElementById('viewGridBtn').classList.add('bg-white', 'text-blue-700', 'shadow-sm');
            document.getElementById('viewGridBtn').classList.remove('text-slate-500');
            document.getElementById('viewCalBtn').classList.remove('bg-white', 'text-blue-700', 'shadow-sm');
            document.getElementById('viewCalBtn').classList.add('text-slate-500');
        };
        document.getElementById('viewCalBtn').onclick = () => { 
            document.getElementById('requestsGrid').classList.add('hidden'); 
            document.getElementById('calendarContainer').classList.remove('hidden'); 
            document.getElementById('viewCalBtn').classList.add('bg-white', 'text-blue-700', 'shadow-sm');
            document.getElementById('viewCalBtn').classList.remove('text-slate-500');
            document.getElementById('viewGridBtn').classList.remove('bg-white', 'text-blue-700', 'shadow-sm');
            document.getElementById('viewGridBtn').classList.add('text-slate-500');
            calendar.updateSize(); 
        };
        </script>
        <script src="../nav.js" data-title="Comms Admin" data-icon="ph-megaphone-simple"></script>
