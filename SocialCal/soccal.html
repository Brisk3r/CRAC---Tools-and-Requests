<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Request Calendar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FullCalendar CSS & JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fc { font-family: inherit; }
        .fc .fc-toolbar-title { font-weight: 800; color: #1e3a8a; font-size: 1.5rem !important; }
        .fc .fc-button-primary { 
            background-color: #ffffff; border-color: #e2e8f0; color: #475569; 
            text-transform: capitalize; border-radius: 0.75rem; font-weight: 600;
            transition: all 0.2s; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .fc .fc-button-primary:hover { background-color: #f8fafc; color: #0f172a; border-color: #cbd5e1; }
        .fc-day-today { background-color: #f0fdfa !important; }
        .fc-event { border-radius: 6px; border: none; padding: 2px 4px; font-weight: 600; font-size: 0.75rem; cursor: pointer; transition: transform 0.1s;}
        .fc-event:hover { transform: scale(1.02); }
        .fc-list-event:hover td { background-color: #f8fafc !important; cursor: pointer; }
        .fc-list-day-sidetext, .fc-list-day-text { font-weight: 800; color: #1e3a8a; }
        /* Restores spacing and bullets inside the approved content box */
        #modalRewrittenPost p { margin-bottom: 1rem; }
        #modalRewrittenPost p:last-child { margin-bottom: 0; }
        #modalRewrittenPost ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        #modalRewrittenPost ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        #modalRewrittenPost a { color: #2563eb; text-decoration: underline; }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-slate-50 to-cyan-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Updated Request Form Sidebar -->
        <div class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-xl shadow-blue-900/5 ring-1 ring-slate-100 h-fit max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-cyan-600">Submit Content Request</h2>
            <p class="text-sm text-slate-500 mb-8 font-medium">Brief the marketing team on your upcoming post or campaign.</p>
            
            <form id="requestForm" class="space-y-5">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700">Staff Name</label>
                        <input type="text" id="staffName" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 mt-1 focus:bg-white focus:ring-2 focus:ring-cyan-500 transition-all outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700">Date Needed</label>
                        <input type="date" id="requestDate" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 mt-1 focus:bg-white focus:ring-2 focus:ring-cyan-500 transition-all outline-none">
                    </div>
                </div>

                <!-- Updated Field: Theme / Goal -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700">Post Theme or Key Goal</label>
                    <input type="text" id="requestTitle" placeholder="e.g. Increase Term 2 Re-enrolments" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 mt-1 focus:bg-white focus:ring-2 focus:ring-cyan-500 transition-all outline-none">
                </div>

                <div class="border-t border-slate-100 pt-5 mt-2">
                    <label class="block text-sm font-bold text-blue-800 mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Campaign Details
                    </label>
                    
                    <div class="mb-4">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Facility</label>
                        <select id="facility" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 mt-1 focus:bg-white focus:ring-2 focus:ring-cyan-500 transition-all outline-none">
                            <option value="" disabled selected>Select facility...</option>
                            <option value="Clarence Regional Aquatic Centre">Clarence Regional Aquatic Centre (CRAC)</option>
                            <option value="Yamba Community Pool">Yamba Community Pool</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Platform</label>
                            <select id="platform" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 mt-1 focus:bg-white focus:ring-2 focus:ring-cyan-500 transition-all outline-none">
                                <option value="Facebook & Instagram">Facebook & Instagram</option>
                                <option value="Facebook Only">Facebook Only</option>
                                <option value="Instagram Only">Instagram Only</option>
                                <option value="Website Update">Website Update</option>
                                <option value="Newsletter">Newsletter</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Target Audience</label>
                            <select id="audience" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 mt-1 focus:bg-white focus:ring-2 focus:ring-cyan-500 transition-all outline-none">
                                <option value="Families and Parents">Families & Parents</option>
                                <option value="Adult Fitness/Squad Swimmers">Adult Fitness/Squads</option>
                                <option value="Seniors/Aqua Aerobics">Seniors/Aqua Aerobics</option>
                                <option value="General Community">General Community</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Key Information / Message</label>
                        <textarea id="keyMessage" rows="3" required placeholder="Details like specific times, dates or instructor names..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 mt-1 focus:bg-white focus:ring-2 focus:ring-cyan-500 transition-all outline-none resize-none"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Call To Action (CTA)</label>
                        <select id="cta" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 mt-1 focus:bg-white focus:ring-2 focus:ring-cyan-500 transition-all outline-none">
                            <option value="Link to Learn to Swim Portal">Link to Learn to Swim Portal</option>
                            <option value="Check Zone Availability Calendar">Check Zone Availability Calendar</option>
                            <option value="Visit Website for Info">Visit Website for Info</option>
                            <option value="Call the Centre">Call the Centre</option>
                            <option value="Email info@">Email info@...</option>
                            <option value="No Specific CTA">No Specific CTA</option>
                        </select>
                    </div>

                    <!-- New Field: Signage Tick Box -->
                    <div class="flex items-center gap-2 p-3 bg-slate-50 rounded-xl border border-slate-200 mb-2">
                        <input type="checkbox" id="generateSign" class="w-5 h-5 rounded border-slate-300 text-cyan-600 focus:ring-cyan-500 cursor-pointer">
                        <label for="generateSign" class="text-sm font-bold text-slate-700 cursor-pointer select-none">
                            Also make a notice sign for front desk?
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-cyan-500/30 transform hover:-translate-y-0.5 transition-all duration-200 mt-6 flex justify-center items-center gap-2">
                    Submit Request
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
            
            <div id="successMessage" class="hidden mt-6 bg-emerald-50 text-emerald-700 p-4 rounded-xl border border-emerald-200 text-sm font-bold flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                Request submitted successfully!
            </div>
        </div>

        <div class="lg:col-span-2 bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-xl shadow-blue-900/5 ring-1 ring-slate-100 z-0">
            <div id='calendar'></div>
        </div>
    </div>

    <!-- Modal for details -->
    <div id="eventModal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-start bg-slate-50/50 rounded-t-2xl">
                <div>
                    <h3 id="modalTitle" class="text-2xl font-extrabold text-blue-900">Request Title</h3>
                    <div class="flex gap-2 mt-2 flex-wrap">
                        <span id="modalStatus" class="px-2 py-1 text-xs font-bold rounded-full text-white bg-slate-500">Pending</span>
                        <span id="modalFacility" class="px-2 py-1 text-xs font-semibold rounded bg-blue-100 text-blue-800">Facility</span>
                    </div>
                </div>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-700 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6 space-y-4 flex-grow">
                <div class="bg-slate-50 p-4 rounded border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <span class="block text-xs font-semibold text-slate-500 uppercase">Staff Member</span>
                        <span id="modalStaffName" class="text-sm text-slate-800 font-medium">-</span>
                    </div>
                    <div>
                        <span class="block text-xs font-semibold text-slate-500 uppercase">Platform</span>
                        <span id="modalPlatform" class="text-sm text-slate-800 font-medium">-</span>
                    </div>
                    <div class="md:col-span-2">
                        <span class="block text-xs font-semibold text-slate-500 uppercase">Key Message</span>
                        <p id="modalKeyMessage" class="text-sm text-slate-800 mt-1 whitespace-pre-wrap">-</p>
                    </div>
                </div>
                <div class="mt-2">
                    <h4 class="text-sm font-bold text-blue-600 uppercase mb-2">Approved Content</h4>
                    <div id="modalRewrittenPost" class="bg-blue-50 p-4 rounded border border-blue-200 text-sm text-slate-800 italic">
                        Awaiting Admin review...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-AwiFvSq3_AuDVZE5l1Pn4oAIfZTFmOM",
            authDomain: "opsf---comms-task-tracker.firebaseapp.com",
            projectId: "opsf---comms-task-tracker",
            storageBucket: "opsf---comms-task-tracker.firebasestorage.app",
            messagingSenderId: "489224390639",
            appId: "1:489224390639:web:c5da72d0dc302d8332581a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: window.innerWidth < 768 ? 'listMonth' : 'listWeek',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listWeek'
                },
                buttonText: {
                    listWeek: 'Upcoming Week',
                    dayGridMonth: 'Month View'
                },
                events: [],
                eventClick: function(info) {
                    const props = info.event.extendedProps;
                    document.getElementById('modalTitle').innerText = info.event.title.split(' (')[0]; 
                    document.getElementById('modalStaffName').innerText = props.staffName;
                    document.getElementById('modalFacility').innerText = props.facility;
                    document.getElementById('modalPlatform').innerText = props.platform;
                    document.getElementById('modalKeyMessage').innerText = props.keyMessage;
                    
                    const statusBadge = document.getElementById('modalStatus');
                    statusBadge.innerText = props.status;
                    statusBadge.className = `px-2 py-1 text-xs font-bold rounded-full text-white ${props.status === 'Approved' ? 'bg-emerald-500' : 'bg-slate-500'}`;

                    const rewrittenPostEl = document.getElementById('modalRewrittenPost');
                    if (props.status === 'Approved' && props.rewrittenPost) {
                        rewrittenPostEl.innerHTML = props.rewrittenPost;
                        rewrittenPostEl.classList.remove('italic', 'text-slate-500');
                    } else {
                        rewrittenPostEl.innerText = "Awaiting Admin review...";
                        rewrittenPostEl.classList.add('italic', 'text-slate-500');
                    }
                    document.getElementById('eventModal').classList.remove('hidden');
                }
            });
            calendar.render();

            document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('eventModal').classList.add('hidden'));

            const requestsCol = collection(db, 'requests');
            onSnapshot(requestsCol, (snapshot) => {
                calendar.removeAllEvents();
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isCRAC = data.facility && data.facility.includes('Clarence');
                    calendar.addEvent({
                        id: doc.id,
                        title: `${data.title} (${isCRAC ? 'CRAC' : 'Yamba'})`,
                        start: data.date,
                        color: data.status === 'Approved' ? '#10b981' : '#94a3b8',
                        extendedProps: { ...data }
                    });
                });
            });

            document.getElementById('requestForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.disabled = true;

                const requestData = {
                    staffName: document.getElementById('staffName').value,
                    date: document.getElementById('requestDate').value,
                    title: document.getElementById('requestTitle').value, // Used for Theme/Goal
                    facility: document.getElementById('facility').value,
                    platform: document.getElementById('platform').value,
                    audience: document.getElementById('audience').value,
                    keyMessage: document.getElementById('keyMessage').value,
                    cta: document.getElementById('cta').value,
                    generateSign: document.getElementById('generateSign').checked,
                    status: "Pending",
                    timestamp: new Date()
                };

                try {
                    await addDoc(collection(db, "requests"), requestData);
                    document.getElementById('requestForm').reset();
                    document.getElementById('successMessage').classList.remove('hidden');
                    setTimeout(() => document.getElementById('successMessage').classList.add('hidden'), 4000);
                } catch (error) {
                    console.error("Error: ", error);
                } finally {
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
