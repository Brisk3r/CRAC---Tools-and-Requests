<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Request Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-white p-6 rounded-lg shadow-md h-fit">
            <h2 class="text-xl font-bold mb-4 text-blue-900">Submit Request</h2>
            <form id="requestForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Staff Name</label>
                    <input type="text" id="staffName" required class="w-full border rounded p-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Request Title / Campaign</label>
                    <input type="text" id="requestTitle" required class="w-full border rounded p-2 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium">Date Needed</label>
                    <input type="date" id="requestDate" required class="w-full border rounded p-2 mt-1">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">
                    Submit to Admin
                </button>
            </form>
            <div id="successMessage" class="hidden mt-4 text-green-600 font-medium">Request submitted successfully!</div>
        </div>

        <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-md">
            <div id='calendar'></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Replace with your Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyA-AwiFvSq3_AuDVZE5l1Pn4oAIfZTFmOM",
  authDomain: "opsf---comms-task-tracker.firebaseapp.com",
  projectId: "opsf---comms-task-tracker",
  storageBucket: "opsf---comms-task-tracker.firebasestorage.app",
  messagingSenderId: "489224390639",
  appId: "1:489224390639:web:c5da72d0dc302d8332581a",
  measurementId: "G-CBJK0070Z1"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Initialize Calendar
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                events: [] 
            });
            calendar.render();

            // Listen for Firestore Updates in Real-Time
            const requestsCol = collection(db, 'requests');
            onSnapshot(requestsCol, (snapshot) => {
                calendar.removeAllEvents();
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    // Set color based on status to avoid confusion
                    const eventColor = data.status === 'Approved' ? '#10b981' : '#64748b'; // Green for approved, Slate Gray for pending
                    
                    calendar.addEvent({
                        id: doc.id,
                        title: `${data.title} (${data.status})`,
                        start: data.date,
                        color: eventColor
                    });
                });
            });

            // Handle Form Submission
            document.getElementById('requestForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('staffName').value;
                const title = document.getElementById('requestTitle').value;
                const date = document.getElementById('requestDate').value;

                try {
                    await addDoc(collection(db, "requests"), {
                        staffName: name,
                        title: title,
                        date: date,
                        status: "Pending",
                        timestamp: new Date()
                    });
                    document.getElementById('requestForm').reset();
                    document.getElementById('successMessage').classList.remove('hidden');
                    setTimeout(() => document.getElementById('successMessage').classList.add('hidden'), 3000);
                } catch (error) {
                    console.error("Error adding document: ", error);
                }
            });
        });
    </script>
</body>
</html>
