<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Request Portal - Version 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fc .fc-toolbar-title { font-weight: 800; color: #1e3a8a; }
        .fc-event { border-radius: 6px; padding: 2px 4px; font-weight: 600; cursor: pointer; border: none; }
        #modalRewrittenPost p { margin-bottom: 1.25rem; line-height: 1.6; }
        #modalRewrittenPost strong { font-weight: 700; color: #1e3a8a; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Structured Submission Form -->
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 h-fit">
            <div class="mb-8">
                <h2 class="text-2xl font-extrabold text-blue-900 leading-tight">Marketing Brief</h2>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Structured Input Engine v4.0</p>
            </div>
            
            <form id="requestForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Staff Name</label>
                        <input type="text" id="staffName" required class="w-full bg-slate-50 border rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Date Needed</label>
                        <input type="date" id="requestDate" required class="w-full bg-slate-50 border rounded-xl p-2.5 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Facility</label>
                    <select id="facility" required class="w-full bg-slate-50 border rounded-xl p-2.5 outline-none transition-all">
                        <option value="" disabled selected>Select centre...</option>
                        <option value="Clarence Regional Aquatic Centre">Clarence Regional (CRAC)</option>
                        <option value="Yamba Community Pool">Yamba Community Pool</option>
                    </select>
                </div>

                <!-- NEW: Categorized Dropdown for AI Alignment -->
                <div>
                    <label class="block text-[10px] font-black text-blue-600 uppercase mb-1">Primary Category</label>
                    <select id="requestCategory" required class="w-full bg-blue-50 border border-blue-100 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-blue-900 transition-all">
                        <option value="" disabled selected>Choose type...</option>
                        <option value="Maintenance Closure">Maintenance / Closure</option>
                        <option value="Swim School Intensive">Swim School / Intensives</option>
                        <option value="Squad Training">Squad / Training Update</option>
                        <option value="Lane Availability">Lane Availability / Public Swim</option>
                        <option value="Community Event">Event / BBQ / Fun Day</option>
                        <option value="Staff Spotlight">Staff Spotlight / Hiring</option>
                        <option value="Health Fitness">Health & Fitness / Aqua</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Specific Topic / Detail</label>
                    <input type="text" id="requestTitle" placeholder="e.g. Pump repair on Main Pool" required class="w-full bg-slate-50 border rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Raw Message Details (Facts Only)</label>
                    <textarea id="keyMessage" rows="4" required placeholder="Paste dates, times, and specific instructions here..." class="w-full bg-slate-50 border rounded-xl p-3 outline-none resize-none transition-all"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Attach Photo</label>
                        <input type="file" id="assetUpload" accept="image/*,.pdf" class="w-full text-[10px] text-slate-500 file:mr-2 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 cursor-pointer">
                    </div>
                    <div class="flex items-center gap-2 p-2.5 bg-slate-50 rounded-xl border border-slate-200 mt-4">
                        <input type="checkbox" id="generateSign" class="w-4 h-4 rounded text-blue-600">
                        <label for="generateSign" class="text-[10px] font-bold text-slate-700">Need physical sign?</label>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all transform active:scale-95">Submit Request</button>
            </form>
            <div id="successMessage" class="hidden mt-6 bg-emerald-50 text-emerald-700 p-4 rounded-xl border border-emerald-200 text-sm font-bold text-center">Request Logged Successfully</div>
        </div>

        <!-- Calendar -->
        <div class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-xl border border-slate-100"><div id='calendar'></div></div>
    </div>

    <!-- View Modal -->
    <div id="eventModal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto flex flex-col p-6">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="modalTitle" class="text-2xl font-extrabold text-blue-900 leading-tight">-</h3>
                    <div id="modalCategoryBadge" class="mt-2 inline-block px-2 py-0.5 rounded text-[10px] font-bold text-white uppercase bg-blue-600 tracking-widest">Category</div>
                </div>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-700 transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded border grid grid-cols-2 gap-4">
                    <div><span class="block text-[10px] font-bold text-slate-400 uppercase">Staff</span><span id="modalStaffName" class="text-sm font-medium text-slate-800">-</span></div>
                    <div id="modalAssetWrapper" class="hidden text-right"><a id="modalAssetLink" target="_blank" class="text-blue-600 font-bold text-xs underline">View Asset</a></div>
                    <div class="col-span-2 border-t pt-3"><span class="block text-[10px] font-bold text-slate-400 uppercase">Message Brief</span><p id="modalKeyMessage" class="text-sm mt-1 text-slate-700 whitespace-pre-wrap"></p></div>
                </div>
                <div class="mt-4"><h4 class="text-sm font-bold text-blue-800 uppercase mb-2 border-b pb-1">Processed Copy</h4><div id="modalRewrittenPost" class="bg-blue-50 p-4 rounded border border-blue-100 text-sm text-slate-800 italic">Awaiting review...</div></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const UPLOAD_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWDWX8ioKgdeUhkuqVS0YGYdIB9ygWrtSYxVOPV01ItNhvQI4xhcPwBQBt4Y5HXwb_/exec"; 
        const firebaseConfig = {
            apiKey: "AIzaSyA-AwiFvSq3_AuDVZE5l1Pn4oAIfZTFmOM",
            authDomain: "opsf---comms-task-tracker.firebaseapp.com",
            projectId: "opsf---comms-task-tracker",
            storageBucket: "opsf---comms-task-tracker.firebasestorage.app",
            messagingSenderId: "489224390639",
            appId: "1:489224390639:web:c5da72d0dc302d8332581a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', () => {
            const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                eventClick: (info) => {
                    const p = info.event.extendedProps;
                    document.getElementById('modalTitle').innerText = info.event.title;
                    document.getElementById('modalStaffName').innerText = p.staffName;
                    document.getElementById('modalKeyMessage').innerText = p.keyMessage;
                    document.getElementById('modalCategoryBadge').innerText = p.category || 'Request';
                    
                    const asset = document.getElementById('modalAssetWrapper');
                    if(p.assetUrl) { asset.classList.remove('hidden'); document.getElementById('modalAssetLink').href = p.assetUrl; }
                    else { asset.classList.add('hidden'); }
                    
                    const rewritten = document.getElementById('modalRewrittenPost');
                    if (p.status === 'Approved' && p.rewrittenPost) { rewritten.innerHTML = p.rewrittenPost; rewritten.classList.remove('italic'); }
                    else { rewritten.innerText = "Processing draft..."; rewritten.classList.add('italic'); }
                    document.getElementById('eventModal').classList.remove('hidden');
                }
            });
            calendar.render();
            document.getElementById('closeModalBtn').onclick = () => document.getElementById('eventModal').classList.add('hidden');

            onSnapshot(collection(db, 'requests'), (snap) => {
                calendar.removeAllEvents();
                snap.forEach(doc => {
                    const d = doc.data();
                    calendar.addEvent({ id: doc.id, title: d.title, start: d.date, color: d.status === 'Approved' ? '#10b981' : '#94a3b8', extendedProps: d });
                });
            });

            document.getElementById('requestForm').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                btn.disabled = true; btn.innerText = "Sending Brief...";
                
                let assetUrl = null;
                const file = document.getElementById('assetUpload').files[0];
                if (file) {
                    const reader = new FileReader();
                    const b64 = await new Promise(res => { reader.onload = () => res(reader.result.split(',')[1]); reader.readAsDataURL(file); });
                    const uploadRes = await fetch(UPLOAD_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ filename: file.name, mimeType: file.type, base64: b64 })});
                    const json = await uploadRes.json();
                    if(json.status === 'success') assetUrl = json.url;
                }

                await addDoc(collection(db, "requests"), {
                    staffName: document.getElementById('staffName').value,
                    date: document.getElementById('requestDate').value,
                    title: document.getElementById('requestTitle').value,
                    category: document.getElementById('requestCategory').value,
                    facility: document.getElementById('facility').value,
                    keyMessage: document.getElementById('keyMessage').value,
                    generateSign: document.getElementById('generateSign').checked,
                    status: "Pending",
                    assetUrl: assetUrl,
                    timestamp: new Date()
                });

                document.getElementById('requestForm').reset();
                document.getElementById('successMessage').classList.remove('hidden');
                setTimeout(() => document.getElementById('successMessage').classList.add('hidden'), 4000);
                btn.disabled = false; btn.innerText = "Submit Request";
            };
        });
    </script>
</body>
</html>
