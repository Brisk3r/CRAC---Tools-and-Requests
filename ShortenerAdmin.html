<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Short Link Admin | CRAC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
        window.firebaseModules = { initializeApp, getAuth, signInAnonymously, getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot };
    </script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const App = () => {
            const [links, setLinks] = useState([]);
            const [slug, setSlug] = useState('');
            const [dest, setDest] = useState('');
            const [db, setDb] = useState(null);
            const [authKey, setAuthKey] = useState('');
            const [isAuth, setIsAuth] = useState(false);

            useEffect(() => {
                const init = async () => {
                    const { initializeApp, getAuth, signInAnonymously, getFirestore, collection, onSnapshot } = window.firebaseModules;
                    const firebaseConfig = {
                        apiKey: "AIzaSyA-AwiFvSq3_AuDVZE5l1Pn4oAIfZTFmOM",
                        authDomain: "opsf---comms-task-tracker.firebaseapp.com",
                        projectId: "opsf---comms-task-tracker",
                        storageBucket: "opsf---comms-task-tracker.firebasestorage.app",
                        messagingSenderId: "489224390639",
                        appId: "1:489224390639:web:54b9f2772aaef86d32581a",
                        measurementId: "G-PE0JBKHX9W"
                    };
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    await signInAnonymously(auth);
                    const database = getFirestore(app);
                    setDb(database);

                    onSnapshot(collection(database, 'shortlinks'), (snapshot) => {
                        setLinks(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                };
                init();
            }, []);

            const addLink = async () => {
                if(!slug || !dest) return;
                const cleanSlug = slug.replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
                const { doc, setDoc } = window.firebaseModules;
                await setDoc(doc(db, 'shortlinks', cleanSlug), { destination: dest, createdAt: new Date().toISOString() });
                setSlug(''); setDest('');
            };

            const removeLink = async (id) => {
                if(!window.confirm(`Delete shortlink /s/${id}?`)) return;
                const { doc, deleteDoc } = window.firebaseModules;
                await deleteDoc(doc(db, 'shortlinks', id));
            };

            if(!isAuth) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-900">
                        <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-slate-200">
                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl"><i className="ph-bold ph-link"></i></div>
                            <h1 className="text-2xl font-black text-slate-900 mb-2 uppercase tracking-tighter">URL Admin</h1>
                            <p className="text-xs font-bold text-slate-400 mb-8 uppercase tracking-widest">Enter Access Key (CRAC-LINKS)</p>
                            <input type="password" value={authKey} onChange={e=>setAuthKey(e.target.value)} className="w-full p-4 border-2 border-slate-100 rounded-xl mb-4 font-bold outline-none focus:border-blue-500 text-center" placeholder="••••••••" />
                            <button onClick={() => { if(authKey === 'CRAC-LINKS') setIsAuth(true); else alert('Invalid Access Key'); }} className="w-full bg-blue-600 text-white p-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-700 transition-all shadow-lg active:scale-95">Access Database</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-5xl mx-auto p-6 md:p-12">
                    <header className="mb-10">
                        <h1 className="text-4xl font-black text-slate-900 flex items-center gap-3 uppercase tracking-tighter"><i className="ph-bold ph-link text-blue-600"></i> Short Link Registry</h1>
                        <p className="text-sm font-bold text-slate-400 mt-2">Manage path-based redirects (e.g., brisk3r.github.io/s/feedback) using the Task Tracker API.</p>
                    </header>
                    
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-10">
                        <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Create New Link</h2>
                        <div className="flex flex-col md:flex-row gap-4 items-end">
                            <div className="flex-1 w-full">
                                <label className="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Custom Path (Slug)</label>
                                <div className="flex bg-slate-50 border-2 border-slate-100 rounded-xl overflow-hidden focus-within:border-blue-500 transition-colors">
                                    <span className="p-4 text-slate-400 font-bold bg-slate-100 border-r-2 border-slate-100 text-xs">.../s/</span>
                                    <input value={slug} onChange={e=>setSlug(e.target.value)} className="w-full p-4 bg-transparent outline-none font-bold text-slate-900" placeholder="e.g. feedback" />
                                </div>
                            </div>
                            <div className="flex-1 w-full">
                                <label className="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Destination URL</label>
                                <input value={dest} onChange={e=>setDest(e.target.value)} className="w-full p-4 border-2 border-slate-100 rounded-xl bg-slate-50 outline-none focus:border-blue-500 font-medium text-slate-900 transition-colors" placeholder="https://..." />
                            </div>
                            <button onClick={addLink} className="w-full md:w-auto bg-blue-600 text-white font-black p-4 px-8 rounded-xl hover:bg-blue-700 transition-colors uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 flex-shrink-0">Create</button>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b border-slate-200 text-[10px] uppercase font-black text-slate-400 tracking-widest">
                                <tr><th className="p-5">Short Link Path</th><th className="p-5">Destination URL</th><th className="p-5 text-right">Actions</th></tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {links.map(l => (
                                    <tr key={l.id} className="hover:bg-slate-50/50 transition-colors group">
                                        <td className="p-5">
                                            <div className="flex items-center gap-3">
                                                <div className="font-black text-blue-600 text-lg">/s/{l.id}</div>
                                                <button onClick={() => { navigator.clipboard.writeText(`https://brisk3r.github.io/CRAC---Tools-and-Requests/s/${l.id}`); alert('Link copied to clipboard!'); }} className="text-slate-400 hover:text-blue-600 transition-colors p-1 bg-slate-100 hover:bg-blue-100 rounded-md" title="Copy Link">
                                                    <i className="ph-bold ph-copy text-sm"></i>
                                                </button>
                                            </div>
                                            <div className="text-[10px] text-slate-400 font-bold mt-1">ID: {l.id}</div>
                                        </td>
                                        <td className="p-5">
                                            <a href={l.destination} target="_blank" className="text-slate-600 font-medium text-sm hover:text-blue-600 underline decoration-blue-200 underline-offset-4 flex items-center gap-2 max-w-md truncate break-all">
                                                {l.destination} <i className="ph-bold ph-arrow-up-right"></i>
                                            </a>
                                        </td>
                                        <td className="p-5 text-right">
                                            <button onClick={() => removeLink(l.id)} className="text-slate-300 hover:text-red-500 hover:bg-red-50 p-3 rounded-xl transition-all"><i className="ph-bold ph-trash text-xl"></i></button>
                                        </td>
                                    </tr>
                                ))}
                                {links.length === 0 && <tr><td colSpan="3" className="p-12 text-center text-slate-400 font-bold">No active short links. Create one above!</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="./nav.js" data-title="Link Admin" data-icon="ph-link"></script>
</body>
</html>
