<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Link Registry | CRAC Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        midnight: '#0f172a',
                        deep: '#020617',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
        window.firebaseModules = { initializeApp, getAuth, signInAnonymously, getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy, limit, getDocs };
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const App = () => {
            const [links, setLinks] = useState([]);
            const [logs, setLogs] = useState([]);
            const [slug, setSlug] = useState('');
            const [dest, setDest] = useState('');
            const [db, setDb] = useState(null);
            const [authKey, setAuthKey] = useState('');
            const [isAuth, setIsAuth] = useState(false);

            useEffect(() => {
                const init = async () => {
                    const { initializeApp, getAuth, signInAnonymously, getFirestore, collection, onSnapshot, query, orderBy, limit } = window.firebaseModules;
                    const firebaseConfig = {
                        apiKey: "AIzaSyA-AwiFvSq3_AuDVZE5l1Pn4oAIfZTFmOM",
                        authDomain: "opsf---comms-task-tracker.firebaseapp.com",
                        projectId: "opsf---comms-task-tracker",
                        storageBucket: "opsf---comms-task-tracker.firebasestorage.app",
                        messagingSenderId: "489224390639",
                        appId: "1:489224390639:web:54b9f2772aaef86d32581a",
                        measurementId: "G-PE0JBKHX9W"
                    };
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    await signInAnonymously(auth);
                    const database = getFirestore(app);
                    setDb(database);

                    onSnapshot(collection(database, 'shortlinks'), (snapshot) => {
                        setLinks(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                    // Real-time logs for recent activity
                    const q = query(collection(database, 'shortlink_logs'), orderBy('timestamp', 'desc'), limit(20));
                    onSnapshot(q, (snapshot) => {
                        setLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                };
                init();
            }, []);

            const addLink = async () => {
                if(!slug || !dest) return;
                const cleanSlug = slug.replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
                const { doc, setDoc } = window.firebaseModules;
                await setDoc(doc(db, 'shortlinks', cleanSlug), { 
                    destination: dest, 
                    createdAt: new Date().toISOString(),
                    clicks: 0 
                });
                setSlug(''); setDest('');
            };

            const removeLink = async (id) => {
                if(!window.confirm(`Delete shortlink /s/${id}?`)) return;
                const { doc, deleteDoc } = window.firebaseModules;
                await deleteDoc(doc(db, 'shortlinks', id));
            };

            const getPlatformIcon = (ua) => {
                if(!ua) return 'ph-desktop';
                if(ua.includes('iPhone') || ua.includes('iPad')) return 'ph-phone';
                if(ua.includes('Android')) return 'ph-android-logo';
                return 'ph-desktop';
            };

            const formatReferrer = (ref) => {
                if(!ref || ref === 'direct') return 'Direct / QR';
                try {
                    const url = new URL(ref);
                    return url.hostname.replace('www.', '');
                } catch(e) { return ref; }
            };

            if(!isAuth) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-900 dark:bg-slate-950 transition-colors duration-300">
                        <div className="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border border-slate-200 dark:border-slate-800">
                            <div className="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner"><i className="ph-bold ph-link"></i></div>
                            <h1 className="text-2xl font-black text-slate-900 dark:text-white mb-2 uppercase tracking-tighter">URL Admin</h1>
                            <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 mb-8 uppercase tracking-widest leading-none">Enter Access Key</p>
                            <input type="password" value={authKey} onChange={e=>setAuthKey(e.target.value)} className="w-full p-4 border-2 border-slate-200 dark:border-slate-800 dark:bg-slate-950 dark:text-white rounded-xl mb-4 font-bold outline-none focus-visible:ring-2 focus-visible:ring-cyan-500 focus:outline-none text-center transition-all" placeholder="••••••••" />
                            <button onClick={() => { if(authKey === 'CRAC-LINKS') setIsAuth(true); else alert('Invalid Access Key'); }} className="w-full bg-slate-900 hover:bg-slate-800 dark:bg-blue-600 dark:hover:bg-blue-700 text-white p-4 rounded-xl font-black uppercase tracking-widest transition-all shadow-lg active:scale-95 focus-visible:ring-2 focus-visible:ring-cyan-500 focus:outline-none">Access Database</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
                    <header className="mb-10 mt-4">
                        <h1 className="text-4xl font-black text-slate-900 dark:text-white flex items-center gap-3 uppercase tracking-tighter"><i className="ph-bold ph-link text-blue-600 dark:text-blue-400"></i> Short Link Registry</h1>
                        <p className="text-sm font-medium text-slate-500 dark:text-slate-400 mt-2">Manage path-based redirects (e.g., brisk3r.github.io/s/feedback) using the Task Tracker API.</p>
                    </header>
                    
                    <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 mb-10">
                        <h2 className="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-6">Create New Link</h2>
                        <div className="flex flex-col md:flex-row gap-4 items-end">
                            <div className="flex-1 w-full">
                                <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-450 uppercase mb-2 ml-1 tracking-widest">Custom Path (Slug)</label>
                                <div className="flex bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-cyan-500/50 transition-all">
                                    <span className="p-4 text-slate-450 dark:text-slate-500 font-bold bg-slate-100 dark:bg-slate-900 border-r-2 border-slate-200 dark:border-slate-800 text-xs">.../s/</span>
                                    <input value={slug} onChange={e=>setSlug(e.target.value)} className="w-full p-4 bg-transparent outline-none font-bold text-slate-900 dark:text-white focus:outline-none" placeholder="e.g. feedback" />
                                </div>
                            </div>
                            <div className="flex-1 w-full">
                                <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-450 uppercase mb-2 ml-1 tracking-widest">Destination URL</label>
                                <input value={dest} onChange={e=>setDest(e.target.value)} className="w-full p-4 border-2 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 outline-none focus:border-blue-500 focus-visible:ring-2 focus-visible:ring-cyan-500 focus:outline-none rounded-xl font-medium text-slate-900 dark:text-white transition-all" placeholder="https://..." />
                            </div>
                            <button onClick={addLink} className="w-full md:w-auto bg-blue-600 text-white font-black p-4 px-8 rounded-xl hover:bg-blue-700 transition-colors uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 focus-visible:ring-2 focus-visible:ring-cyan-500 focus:outline-none flex-shrink-0">Create</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2">
                            <h2 className="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4">Active Short Links</h2>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 text-[10px] uppercase font-black text-slate-400 dark:text-slate-500 tracking-widest">
                                            <tr>
                                                <th className="p-5">Short Link Path</th>
                                                <th className="p-5">Destination URL</th>
                                                <th className="p-5 text-center">Clicks</th>
                                                <th className="p-5 text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                                            {links.map(l => (
                                                <tr key={l.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-955/50 transition-colors group">
                                                    <td className="p-5">
                                                        <div className="flex items-center gap-3">
                                                            <div className="font-black text-blue-600 dark:text-blue-400 text-lg">/s/{l.id}</div>
                                                            <button onClick={() => { navigator.clipboard.writeText(`https://brisk3r.github.io/CRAC---Tools-and-Requests/s/${l.id}`); alert('Link copied to clipboard!'); }} className="text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors p-1 bg-slate-100 dark:bg-slate-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 rounded-md focus-visible:ring-2 focus-visible:ring-cyan-500 focus:outline-none" title="Copy Link">
                                                                <i className="ph-bold ph-copy text-sm"></i>
                                                            </button>
                                                        </div>
                                                        <div className="text-[10px] text-slate-400 dark:text-slate-550 font-bold mt-1">ID: {l.id}</div>
                                                    </td>
                                                    <td className="p-5">
                                                        <a href={l.destination} target="_blank" className="text-slate-600 dark:text-slate-300 font-medium text-sm hover:text-blue-600 dark:hover:text-blue-400 underline decoration-blue-200 dark:decoration-blue-900 underline-offset-4 flex items-center gap-2 max-w-xs sm:max-w-md truncate break-all focus-visible:ring-2 focus-visible:ring-cyan-500 focus:outline-none rounded-lg p-0.5">
                                                            {l.destination} <i className="ph-bold ph-arrow-up-right"></i>
                                                        </a>
                                                    </td>
                                                    <td className="p-5 text-center">
                                                        <div className="text-xl font-black text-slate-900 dark:text-white">{l.clicks || 0}</div>
                                                        {l.lastClicked && (
                                                            <div className="text-[9px] text-slate-450 dark:text-slate-500 font-black uppercase tracking-tight">
                                                                Last: {new Date(l.lastClicked.seconds * 1000).toLocaleDateString('en-AU')}
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="p-5 text-right">
                                                        <button onClick={() => removeLink(l.id)} className="text-slate-300 dark:text-slate-600 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30 p-3 rounded-xl transition-all focus-visible:ring-2 focus-visible:ring-red-500 focus:outline-none"><i className="ph-bold ph-trash text-xl"></i></button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {links.length === 0 && <tr><td colSpan="4" className="p-12 text-center text-slate-400 dark:text-slate-500 font-bold">No active short links. Create one above!</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h2 className="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4">Recent Activity</h2>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden h-fit max-h-[600px] overflow-y-auto custom-scroll">
                                <div className="divide-y divide-slate-100 dark:divide-slate-800">
                                    {logs.map(log => (
                                        <div key={log.id} className="p-4 hover:bg-slate-50 dark:hover:bg-slate-950 transition-colors">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-sm font-black text-blue-600 dark:text-blue-400">/s/{log.slug}</span>
                                                <span className="text-[10px] font-bold text-slate-400 dark:text-slate-500">{log.timestamp ? new Date(log.timestamp.seconds * 1000).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' }) : '...'}</span>
                                            </div>
                                            <div className="flex items-center gap-2 text-[10px] text-slate-500 dark:text-slate-400 font-medium truncate">
                                                <i className="ph-bold ph-arrow-bend-up-right"></i>
                                                <span>{formatReferrer(log.referrer)}</span>
                                            </div>
                                            <div className="mt-2 flex items-center gap-2">
                                                <i className={`ph-bold ${getPlatformIcon(log.userAgent)} text-slate-350 dark:text-slate-650`}></i>
                                                <span className="text-[9px] uppercase font-black tracking-widest text-slate-400 dark:text-slate-500">{log.platform || 'Unknown'}</span>
                                            </div>
                                        </div>
                                    ))}
                                    {logs.length === 0 && <div className="p-8 text-center text-slate-400 dark:text-slate-500 text-xs font-bold uppercase tracking-widest">Waiting for traffic...</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="./nav.js" data-title="Link Admin" data-icon="ph-link"></script>
</body>
</html>
