<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timesheet Calculator with Award Rates</title>
    <script src="https://cdn.tailwindcss.com?version=3.4.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Style for the active toggle button */
        .toggle-btn-active {
            background-color: #0891B2; /* cyan-600 */
            color: white;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }
        .toggle-btn-inactive {
            background-color: transparent;
            color: #374151; /* gray-700 */
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <!-- Unified Navigation injected via nav.js -->

    <!-- Main Content -->
    <main class="container mx-auto p-4 sm:p-6 lg:p-8 min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full mx-auto bg-white dark:bg-slate-900 rounded-lg shadow-md p-8 border border-transparent dark:border-slate-800">
            <h2 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-6">Calculate Payable Hours</h2>

            <div class="space-y-6">
                <!-- Day Toggle -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-slate-400 mb-2">Day of Work</label>
                    <div class="flex w-full p-1 bg-gray-200 dark:bg-slate-800 rounded-full">
                        <button id="btn-weekday" class="w-1/3 p-2 text-sm font-medium leading-5 rounded-full transition-colors duration-200 ease-in-out toggle-btn-active" onclick="setDay('weekday')">Weekday</button>
                        <button id="btn-sat" class="w-1/3 p-2 text-sm font-medium leading-5 rounded-full transition-colors duration-200 ease-in-out toggle-btn-inactive dark:text-slate-400" onclick="setDay('saturday')">Saturday</button>
                        <button id="btn-sun" class="w-1/3 p-2 text-sm font-medium leading-5 rounded-full transition-colors duration-200 ease-in-out toggle-btn-inactive dark:text-slate-400" onclick="setDay('sunday')">Sunday</button>
                        <input type="hidden" id="dayOfWeek" value="weekday">
                    </div>
                </div>

                <!-- Employment Type Toggle -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-slate-400 mb-2">Employment Type</label>
                    <div class="flex w-full p-1 bg-gray-200 dark:bg-slate-800 rounded-full">
                        <button id="btn-permanent" class="w-1/2 p-2 text-sm font-medium leading-5 rounded-full transition-colors duration-200 ease-in-out toggle-btn-active" onclick="setEmployment('permanent')">Permanent</button>
                        <button id="btn-casual" class="w-1/2 p-2 text-sm font-medium leading-5 rounded-full transition-colors duration-200 ease-in-out toggle-btn-inactive dark:text-slate-400" onclick="setEmployment('casual')">Casual</button>
                        <input type="hidden" id="employmentType" value="permanent">
                    </div>
                </div>

                <!-- Start Time Input -->
                <div>
                    <label for="startTime" class="block text-sm font-medium text-gray-700 dark:text-slate-400">Start Time</label>
                    <input type="time" id="startTime" class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white shadow-sm focus:border-cyan-500 focus:ring-cyan-500 sm:text-sm p-2">
                </div>

                <!-- End Time Input -->
                <div>
                    <label for="endTime" class="block text-sm font-medium text-gray-700 dark:text-slate-400">End Time</label>
                    <input type="time" id="endTime" class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white shadow-sm focus:border-cyan-500 focus:ring-cyan-500 sm:text-sm p-2">
                </div>

                <!-- Break Time Input -->
                <div>
                    <label for="breakMinutes" class="block text-sm font-medium text-gray-700 dark:text-slate-400">Unpaid Break (in minutes)</label>
                    <input type="number" id="breakMinutes" value="0" min="0" class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white shadow-sm focus:border-cyan-500 focus:ring-cyan-500 sm:text-sm p-2">
                </div>
            </div>

            <!-- Calculate Button -->
            <div class="mt-8">
                <button onclick="calculateHours()" class="w-full bg-cyan-600 text-white font-bold py-3 px-4 rounded-md hover:bg-cyan-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 transition-all active:scale-[0.98]">
                    Calculate
                </button>
            </div>

            <!-- Result Display -->
            <div id="result" class="mt-8 text-center hidden bg-cyan-50 dark:bg-cyan-900/20 p-4 rounded-lg border border-cyan-200 dark:border-cyan-800">
                <p id="resultDay" class="font-semibold text-gray-700 dark:text-cyan-100 mb-3 text-lg"></p>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-sm text-gray-600 dark:text-slate-400">Base Hours Worked</p>
                        <p id="baseHours" class="text-2xl font-bold text-gray-800 dark:text-white"></p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600 dark:text-slate-400">Payable Hours (with loading)</p>
                        <p id="payableHours" class="text-2xl font-bold text-cyan-700 dark:text-cyan-400"></p>
                    </div>
                </div>
                <p id="appliedLoading" class="text-xs font-semibold text-gray-600 dark:text-slate-400 mt-3"></p>
                <p class="text-[10px] text-gray-400 dark:text-slate-500 mt-2">Enter the 'Payable Hours' value into your timesheet.</p>
            </div>
             <!-- Error Display -->
            <div id="error" class="mt-6 text-center text-red-600 dark:text-red-400 font-medium hidden"></div>
        </div>
    </main>

    <script>
        const dayOfWeekInput = document.getElementById('dayOfWeek');
        const btnWeekday = document.getElementById('btn-weekday');
        const btnSat = document.getElementById('btn-sat');
        const btnSun = document.getElementById('btn-sun');

        const employmentTypeInput = document.getElementById('employmentType');
        const btnPermanent = document.getElementById('btn-permanent');
        const btnCasual = document.getElementById('btn-casual');

        function setDay(day) {
            dayOfWeekInput.value = day;
            const buttons = [btnWeekday, btnSat, btnSun];
            buttons.forEach(btn => {
                btn.classList.add('toggle-btn-inactive');
                btn.classList.remove('toggle-btn-active');
            });

            if (day === 'weekday') {
                btnWeekday.classList.add('toggle-btn-active');
                btnWeekday.classList.remove('toggle-btn-inactive');
            } else if (day === 'saturday') {
                btnSat.classList.add('toggle-btn-active');
                btnSat.classList.remove('toggle-btn-inactive');
            } else { // sunday
                btnSun.classList.add('toggle-btn-active');
                btnSun.classList.remove('toggle-btn-inactive');
            }
        }

        function setEmployment(type) {
            employmentTypeInput.value = type;
            btnPermanent.classList.remove('toggle-btn-active');
            btnPermanent.classList.add('toggle-btn-inactive', 'dark:text-slate-400');
            btnCasual.classList.remove('toggle-btn-active');
            btnCasual.classList.add('toggle-btn-inactive', 'dark:text-slate-400');

            if (type === 'permanent') {
                btnPermanent.classList.add('toggle-btn-active');
                btnPermanent.classList.remove('toggle-btn-inactive', 'dark:text-slate-400');
            } else {
                btnCasual.classList.add('toggle-btn-active');
                btnCasual.classList.remove('toggle-btn-inactive', 'dark:text-slate-400');
            }
        }

        function calculateHours() {
            const day = dayOfWeekInput.value;
            const startTimeValue = document.getElementById('startTime').value;
            const endTimeValue = document.getElementById('endTime').value;
            const breakMinutes = parseInt(document.getElementById('breakMinutes').value) || 0;
            
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const baseHoursP = document.getElementById('baseHours');
            const payableHoursP = document.getElementById('payableHours');
            const resultDayP = document.getElementById('resultDay');
            const appliedLoadingP = document.getElementById('appliedLoading');

            // Hide previous results/errors
            resultDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');

            // --- Input Validation ---
            if (!startTimeValue || !endTimeValue) {
                errorDiv.textContent = 'Please enter both a start and end time.';
                errorDiv.classList.remove('hidden');
                return;
            }

            // --- Time Calculation ---
            const startDate = new Date(`2025-01-01T${startTimeValue}`);
            const endDate = new Date(`2025-01-01T${endTimeValue}`);
            
            if (endDate < startDate) {
                endDate.setDate(endDate.getDate() + 1);
            }

            let durationMillis = endDate - startDate;
            let totalMinutes = durationMillis / 60000;
            const netMinutes = totalMinutes - breakMinutes;

            if (netMinutes < 0) {
                errorDiv.textContent = 'Break time cannot be longer than the shift duration.';
                errorDiv.classList.remove('hidden');
                return;
            }

            // --- Calculate Base Hours ---
            const baseHours = netMinutes / 60;

            // --- Apply Award Loading ---
            let loadingRate = 1.0;
            const dayType = dayOfWeekInput.value;
            const empType = employmentTypeInput.value;
            let loadingDescription = 'Ordinary hours';

            if (empType === 'casual') {
                switch (dayType) {
                    case 'weekday':
                        loadingRate = 1.25;
                        loadingDescription = 'Weekday rate (includes 25% casual loading)';
                        break;
                    case 'saturday':
                        loadingRate = 1.50;
                        loadingDescription = 'Saturday rate (25% casual loading + 25% Saturday penalty)';
                        break;
                    case 'sunday':
                        loadingRate = 1.75;
                        loadingDescription = 'Sunday rate (25% casual loading + 50% Sunday penalty)';
                        break;
                }
            } else { // permanent
                switch (dayType) {
                    case 'weekday':
                        loadingRate = 1.0;
                        loadingDescription = 'Weekday ordinary hours';
                        break;
                    case 'saturday':
                        loadingRate = 1.25;
                        loadingDescription = 'Saturday rate (25% Saturday penalty)';
                        break;
                    case 'sunday':
                        loadingRate = 1.50;
                        loadingDescription = 'Sunday rate (50% Sunday penalty)';
                        break;
                }
            }
            const payableHours = baseHours * loadingRate;

            // --- Display Result ---
            resultDayP.textContent = `Results for ${day.charAt(0).toUpperCase() + day.slice(1)} (${empType.charAt(0).toUpperCase() + empType.slice(1)})`;
            baseHoursP.textContent = baseHours.toFixed(2);
            payableHoursP.textContent = payableHours.toFixed(2);
            appliedLoadingP.textContent = `Applied multiplier: ${loadingRate.toFixed(2)}x (${loadingDescription})`;
            resultDiv.classList.remove('hidden');
        }
    </script>

    <script src="./nav.js" data-title="Timesheet Calculator" data-icon="ph-calculator" data-help="Enter your start and end times to calculate total hours and weekend penalty rates. Use the toggle buttons at the top to select the correct day of work (Weekday, Saturday, or Sunday)."></script>
</body>
</html>
