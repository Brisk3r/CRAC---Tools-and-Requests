<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swim Around Australia | Community Challenge Dashboard</title>
    
    <!-- Core Libraries -->
    <script src="https://cdn.tailwindcss.com?version=3.4.4"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;850&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif']
                    },
                    colors: {
                        ocean: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#06b6d4',
                            600: '#0891b2',
                            900: '#164e63',
                        },
                        indigoCustom: {
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        slate: {
                            750: '#1e293b',
                            850: '#0f172a',
                            950: '#020617'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Firebase Configuration Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
        
        window.firebaseModules = { initializeApp, getAuth, signInAnonymously, signInWithEmailAndPassword, createUserWithEmailAndPassword, getFirestore, collection, doc, addDoc, setDoc, getDocs, query, where, onSnapshot };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s, color 0.4s; }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 20px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.1); }
        
        /* Map Animations */
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }
        .animated-coast {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: dash 5s linear forwards;
        }

    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 flex flex-col min-h-screen">

    <!-- React Root -->
    <div id="root" class="flex-grow flex flex-col"></div>

    <!-- App Logic -->
    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        const ADJECTIVES = ['Aqua', 'Blue', 'Coastal', 'Deep', 'Emerald', 'Fast', 'Glide', 'Happy', 'Indigo', 'Joyful', 'King', 'Little', 'Mighty', 'Ocean', 'Polar', 'Quick', 'Rapid', 'Speedy', 'Tidal', 'Wave'];
        const ANIMALS = ['Dolphin', 'Frog', 'Guppy', 'Hippo', 'Jellyfish', 'Lobster', 'Marlin', 'Otter', 'Penguin', 'Seal', 'Shark', 'Turtle', 'Whale', 'Seahorse', 'Stingray'];
        const WORDS = ['swim', 'pool', 'lap', 'splash', 'dive', 'glide', 'water', 'ocean', 'wave', 'blue', 'deep', 'fast', 'cool', 'fresh', 'kick', 'stroke', 'lane', 'speed', 'tide', 'reef'];

        // Coastline points to map percentages along the Australia coast
        // 0 km: Sydney, 25,760 km: Back to Sydney
        const MILESTONES = [
            { name: "Sydney (Start)", targetKm: 0, x: 630, y: 440, desc: "The voyage begins at Sydney Harbour." },
            { name: "Brisbane", targetKm: 1000, x: 620, y: 320, desc: "Sunny Brisbane River & Gold Coast beaches." },
            { name: "Cairns", targetKm: 2960, x: 512, y: 155, desc: "Gateway to the Great Barrier Reef." },
            { name: "Darwin", targetKm: 6960, x: 310, y: 110, desc: "Tropical Top End and Darwin Harbour." },
            { name: "Broome", targetKm: 10000, x: 170, y: 190, desc: "Beautiful Cable Beach sunsets." },
            { name: "Perth", targetKm: 14200, x: 90, y: 405, desc: "Swan River and coastal Indian Ocean." },
            { name: "Adelaide", targetKm: 18800, x: 425, y: 480, desc: "St Vincent Gulf and rolling vineyards." },
            { name: "Melbourne", targetKm: 21600, x: 535, y: 520, desc: "Port Phillip Bay cultural capital." },
            { name: "Hobart", targetKm: 23200, x: 565, y: 580, desc: "Derwent River crossing in Tasmania." },
            { name: "Sydney (Finish)", targetKm: 25760, x: 630, y: 440, desc: "Home stretch back to where we started!" }
        ];

        const TOTAL_CIRCUMFERENCE = 25760; // km

        // Live osftools Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBHYN7jk5en7V19pMfag6l8kG3fSjR2zYY",
            authDomain: "osftools.firebaseapp.com",
            projectId: "osftools",
            storageBucket: "osftools.firebasestorage.app",
            messagingSenderId: "42038303082",
            appId: "1:42038303082:web:6fed53593f0e0c3d9ead13"
        };

        const MainApp = () => {
            const [usersData, setUsersData] = useState([]);
            const [lapsData, setLapsData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [theme, setTheme] = useState(localStorage.getItem('laptracker-theme') || 'light');
            const [isHelpOpen, setIsHelpOpen] = useState(false);

            // Authentication & Personal Portal States
            const [currentUser, setCurrentUser] = useState(null); // Anonymous Session user profile state
            const [portalMode, setPortalMode] = useState('cta'); // 'cta' | 'login' | 'register' | 'logged-in'
            const [toast, setToast] = useState({ show: false, message: '' });

            // Form inputs
            const [passphraseInput, setPassphraseInput] = useState('');
            const [nameInput, setNameInput] = useState('');
            const [facilityInput, setFacilityInput] = useState('CRAC');
            const [lapsInput, setLapsInput] = useState('');
            const [poolLength, setPoolLength] = useState(50);
            const [settingsExpanded, setSettingsExpanded] = useState(false);

            const pathRef = useRef(null);
            const [swimmerPos, setSwimmerPos] = useState({ x: 630, y: 440 });
            const [pathLength, setPathLength] = useState(0);

            // Toast helper
            const showToast = (message) => {
                setToast({ show: true, message });
                setTimeout(() => setToast({ show: false, message: '' }), 4000);
            };

            // Random generator helpers
            const generateRandomName = () => {
                const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
                const ani = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
                const num = Math.floor(Math.random() * 90) + 10;
                setNameInput(`${adj}${ani}${num}`);
            };

            const generateRandomPassphrase = () => {
                const w1 = WORDS[Math.floor(Math.random() * WORDS.length)];
                const w2 = WORDS[Math.floor(Math.random() * WORDS.length)];
                const num = Math.floor(Math.random() * 900) + 100;
                setPassphraseInput(`${w1}-${w2}-${num}`);
            };

            // Theme Sync Effect
            useEffect(() => {
                const doc = document.documentElement;
                if (theme === 'dark') {
                    doc.classList.add('dark');
                } else {
                    doc.classList.remove('dark');
                }
                localStorage.setItem('laptracker-theme', theme);
            }, [theme]);

            const toggleTheme = () => {
                setTheme(prev => prev === 'light' ? 'dark' : 'light');
            };

            // Calculate metrics based on live approved data
            const totals = useMemo(() => {
                let totalKm = 0;
                let cracKm = 0;
                let ycpKm = 0;
                const individualTotals = {};

                const approvedUsers = new Set(usersData.filter(u => u.isApproved).map(u => u.id));
                const userMap = {};
                usersData.forEach(u => {
                    userMap[u.id] = { name: u.publicName, facility: u.facility };
                });

                lapsData.forEach(lap => {
                    if (approvedUsers.has(lap.userId)) {
                        const count = Number(lap.count) || 0;
                        const facility = userMap[lap.userId]?.facility;
                        // Support custom pool length per log, fallback to facility default
                        const poolLengthMeters = Number(lap.poolLength) || (facility === 'YCP' ? 25 : 50);
                        const dist = count * (poolLengthMeters / 1000);

                        totalKm += dist;
                        if (facility === 'YCP') {
                            ycpKm += dist;
                        } else {
                            cracKm += dist;
                        }

                        const swimmerName = userMap[lap.userId]?.name || 'Anonymous';
                        individualTotals[swimmerName] = (individualTotals[swimmerName] || 0) + dist;
                    }
                });

                // Leaderboard sorting
                const leaderboard = Object.keys(individualTotals).map(name => ({
                    name,
                    distanceKm: individualTotals[name],
                    facility: usersData.find(u => u.publicName === name)?.facility || 'CRAC'
                })).sort((a, b) => b.distanceKm - a.distanceKm).slice(0, 10);

                return {
                    totalKm,
                    cracKm,
                    ycpKm,
                    leaderboard,
                    participantsCount: approvedUsers.size
                };
            }, [usersData, lapsData]);

            // Percentage completion
            const challengePercentage = useMemo(() => {
                if (totals.totalKm === 0) return 0;
                const pct = (totals.totalKm / TOTAL_CIRCUMFERENCE) * 100;
                return Math.min(Number(pct.toFixed(2)), 100);
            }, [totals.totalKm]);

            // Find current milestone location
            const currentMilestoneIndex = useMemo(() => {
                let currentIndex = 0;
                for (let i = 0; i < MILESTONES.length; i++) {
                    if (totals.totalKm >= MILESTONES[i].targetKm) {
                        currentIndex = i;
                    }
                }
                return currentIndex;
            }, [totals.totalKm]);

            const currentMilestone = MILESTONES[currentMilestoneIndex];
            const nextMilestone = MILESTONES[currentMilestoneIndex + 1] || MILESTONES[MILESTONES.length - 1];
            const kmToNextMilestone = useMemo(() => {
                if (currentMilestoneIndex >= MILESTONES.length - 1) return 0;
                return Math.max(0, nextMilestone.targetKm - totals.totalKm);
            }, [totals.totalKm, currentMilestoneIndex, nextMilestone]);

            // Recent approved activity feed
            const recentLogs = useMemo(() => {
                const approvedUsers = new Set(usersData.filter(u => u.isApproved).map(u => u.id));
                const userMap = {};
                usersData.forEach(u => {
                    userMap[u.id] = { name: u.publicName, facility: u.facility };
                });

                return lapsData.map(lap => {
                    if (!approvedUsers.has(lap.userId)) return null;
                    const facility = userMap[lap.userId]?.facility;
                    const poolLen = Number(lap.poolLength) || (facility === 'YCP' ? 25 : 50);
                    return {
                        id: lap.id,
                        swimmerName: userMap[lap.userId]?.name || 'Anonymous',
                        facility: facility === 'YCP' ? 'YCP (Yamba)' : 'CRAC (Grafton)',
                        laps: lap.count,
                        poolLength: poolLen,
                        distanceKm: lap.count * (poolLen / 1000),
                        date: lap.date ? new Date(lap.date).toLocaleDateString('en-AU', {day:'numeric', month:'short'}) : 'Just now',
                        timestamp: lap.date ? new Date(lap.date) : new Date()
                    };
                }).filter(Boolean).sort((a, b) => b.timestamp - a.timestamp).slice(0, 10);
            }, [lapsData, usersData]);

            // Personal lifetime totals
            const myLifetimeStats = useMemo(() => {
                if (!currentUser) return { laps: 0, km: 0 };
                const userLaps = lapsData.filter(l => l.userId === currentUser.id);
                const totalLaps = userLaps.reduce((sum, l) => sum + (Number(l.count) || 0), 0);
                const facility = currentUser.facility || 'CRAC';
                
                let totalKm = 0;
                userLaps.forEach(lap => {
                    const count = Number(lap.count) || 0;
                    const length = Number(lap.poolLength) || (facility === 'YCP' ? 25 : 50);
                    totalKm += count * (length / 1000);
                });
                
                return { laps: totalLaps, km: totalKm };
            }, [currentUser, lapsData]);

            // Sync user profile facility to poolLength defaults
            useEffect(() => {
                if (currentUser) {
                    setPoolLength(currentUser.facility === 'YCP' ? 25 : 50);
                }
            }, [currentUser]);

            // Firebase Initialization & LocalStorage Session Check
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const fm = window.firebaseModules;
                        const app = fm.initializeApp(firebaseConfig);
                        const auth = fm.getAuth(app);
                        const firestore = fm.getFirestore(app);

                        const sharedEmail = 'patron-swim@clarencevalley.gov.au';
                        const sharedPass = 'PatronSwim2026!';
                        
                        const authenticateShared = async () => {
                            try {
                                await fm.signInWithEmailAndPassword(auth, sharedEmail, sharedPass);
                            } catch (err) {
                                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                                    try {
                                        await fm.createUserWithEmailAndPassword(auth, sharedEmail, sharedPass);
                                    } catch (regErr) {
                                        console.error('Registering shared patron account failed:', regErr);
                                    }
                                } else {
                                    console.error('Authenticating shared patron account failed:', err);
                                }
                            }
                        };
                        
                        await authenticateShared();
                        const appId = 'clarence-valley-laps';

                        // Database Listeners
                        const usersRef = fm.collection(firestore, 'artifacts', appId, 'public', 'data', 'lapUsers');
                        const lapsRef = fm.collection(firestore, 'artifacts', appId, 'public', 'data', 'laps');
                        
                        const handleUsersSnapshot = (snapshot) => {
                            const users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setUsersData(users);
                            
                            const savedSessionId = localStorage.getItem('laptracker_session_id');
                            if (savedSessionId) {
                                const matchedUser = users.find(u => u.id === savedSessionId);
                                if (matchedUser) {
                                    setCurrentUser(matchedUser);
                                    setPortalMode('logged-in');
                                } else {
                                    localStorage.removeItem('laptracker_session_id');
                                }
                            }
                        };

                        const handleLapsSnapshot = (snapshot) => {
                            setLapsData(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                            setLoading(false);
                        };

                        // Subscribe with error callbacks
                        fm.onSnapshot(usersRef, handleUsersSnapshot, (err) => {
                            console.error("Users snapshot error:", err);
                            // Fallback to one-time read
                            fm.getDocs(usersRef).then(handleUsersSnapshot).catch(fetchErr => {
                                console.error("One-time users fetch failed:", fetchErr);
                                showToast("Local file protocol (file://) blocked database access. Please run a local web server (e.g. npx serve) to test locally.");
                            });
                        });

                        fm.onSnapshot(lapsRef, handleLapsSnapshot, (err) => {
                            console.error("Laps snapshot error:", err);
                            fm.getDocs(lapsRef).then(handleLapsSnapshot).catch(fetchErr => {
                                console.error("One-time laps fetch failed:", fetchErr);
                                setLoading(false);
                            });
                        });

                    } catch (err) {
                        console.error("Firebase init failed:", err);
                        setLoading(false);
                    }
                };
                initFirebase();
            }, []);

            // Profanity Filter Validation
            const isProfane = (text) => {
                const inappropriateWords = ['donkey', 'fuck', 'shit', 'cunt', 'bitch', 'asshole', 'piss', 'crap', 'bastard'];
                const cleanText = text.toLowerCase().replace(/[^a-z0-9]/g, '');
                return inappropriateWords.some(word => cleanText.includes(word));
            };

            // Anonymous Passphrase Authentication Handlers
            const handlePassphraseLogin = (e) => {
                e.preventDefault();
                const matchedUser = usersData.find(u => u.passphrase && u.passphrase.toLowerCase().trim() === passphraseInput.toLowerCase().trim());
                if (matchedUser) {
                    setCurrentUser(matchedUser);
                    localStorage.setItem('laptracker_session_id', matchedUser.id);
                    setPortalMode('logged-in');
                    showToast(`Welcome back, ${matchedUser.publicName}!`);
                    setPassphraseInput('');
                } else {
                    showToast("Passphrase not found. Check spelling and try again.");
                }
            };

            const handlePassphraseRegister = async (e) => {
                e.preventDefault();
                const trimmedName = nameInput.trim();
                const trimmedPass = passphraseInput.toLowerCase().trim();

                if (!trimmedName || !trimmedPass) {
                    showToast("Please fill in both fields.");
                    return;
                }

                if (isProfane(trimmedName)) {
                    showToast("Display name contains inappropriate language. Choose another.");
                    return;
                }

                // Check passphrase uniqueness
                const exists = usersData.some(u => u.passphrase && u.passphrase.toLowerCase().trim() === trimmedPass);
                if (exists) {
                    showToast("This passphrase is taken. Please create a unique passphrase.");
                    return;
                }

                const { getFirestore, doc, setDoc } = window.firebaseModules;
                const db = getFirestore();
                const appId = 'clarence-valley-laps';

                try {
                    // Generate random id
                    const randomId = 'ANON_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'lapUsers', randomId);
                    
                    const newUserProfile = {
                        publicName: trimmedName,
                        passphrase: trimmedPass,
                        facility: facilityInput,
                        isApproved: false, // Wait for staff approval
                        createdAt: new Date().toISOString()
                    };

                    await setDoc(userRef, newUserProfile);

                    // Auto-login registered user
                    setCurrentUser({ id: randomId, ...newUserProfile });
                    localStorage.setItem('laptracker_session_id', randomId);
                    setPortalMode('logged-in');
                    showToast("Account created successfully!");
                    setNameInput('');
                    setPassphraseInput('');
                } catch (error) {
                    console.error(error);
                    showToast("Failed to register profile.");
                }
            };

            const handleProfileUpdate = async (e) => {
                e.preventDefault();
                const trimmedName = nameInput.trim();
                const trimmedPass = passphraseInput.toLowerCase().trim();

                if (trimmedName && isProfane(trimmedName)) {
                    showToast("Display name contains inappropriate language. Choose another.");
                    return;
                }

                const { getFirestore, doc, setDoc } = window.firebaseModules;
                const db = getFirestore();
                const appId = 'clarence-valley-laps';

                try {
                    // If passphrase updated, verify uniqueness
                    if (trimmedPass && trimmedPass !== currentUser.passphrase) {
                        const exists = usersData.some(u => u.passphrase && u.passphrase.toLowerCase().trim() === trimmedPass);
                        if (exists) {
                            showToast("This passphrase is taken.");
                            return;
                        }
                    }

                    const nameChanged = trimmedName && trimmedName !== currentUser.publicName;
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'lapUsers', currentUser.id);
                    const updatedFields = {
                        publicName: trimmedName || currentUser.publicName,
                        passphrase: trimmedPass || currentUser.passphrase,
                        facility: facilityInput || currentUser.facility,
                        isApproved: nameChanged ? false : currentUser.isApproved
                    };

                    if (nameChanged) {
                        updatedFields.previousName = currentUser.publicName;
                    }

                    await setDoc(userRef, updatedFields, { merge: true });

                    // Update local React state session
                    const updatedUser = { ...currentUser, ...updatedFields };
                    setCurrentUser(updatedUser);
                    showToast("Profile settings updated!");
                    setSettingsExpanded(false);
                    setNameInput('');
                    setPassphraseInput('');
                } catch (error) {
                    showToast("Failed to update profile settings.");
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('laptracker_session_id');
                setCurrentUser(null);
                setPortalMode('cta');
                showToast("Signed out successfully.");
            };

            const handleLapSubmission = async (e) => {
                e.preventDefault();
                const count = Number(lapsInput);
                if (!count || count <= 0) return;

                const { getFirestore, collection, addDoc } = window.firebaseModules;
                const db = getFirestore();
                const appId = 'clarence-valley-laps';

                try {
                    const lapsRef = collection(db, 'artifacts', appId, 'public', 'data', 'laps');
                    await addDoc(lapsRef, {
                        userId: currentUser.id,
                        count: count,
                        date: new Date().toISOString(),
                        addedBy: currentUser.id,
                        poolLength: Number(poolLength)
                    });

                    showToast(`Successfully logged +${count} laps!`);
                    setLapsInput('');
                } catch (error) {
                    showToast("Error submitting laps.");
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Standalone Community Header */}
                    <header className="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-40 shadow-sm transition-all duration-300">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-cyan-600 text-white p-1.5 rounded-lg shadow-sm">
                                    <i className="ph-bold ph-waves text-xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-sm font-black text-slate-900 dark:text-white uppercase tracking-tight">Swim Around Australia</h1>
                                    <p className="text-[9px] text-cyan-600 font-bold dark:text-cyan-400 uppercase tracking-widest leading-none">Community Lap Challenge</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                {/* Help Button */}
                                <button onClick={() => setIsHelpOpen(true)} className="p-2 text-slate-400 hover:text-cyan-600 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all" title="How it works">
                                    <i className="ph-bold ph-info text-xl"></i>
                                </button>
                                {/* Theme Toggle */}
                                <button onClick={toggleTheme} className="p-2 text-slate-400 hover:text-amber-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all" title="Toggle Theme">
                                    <i className={`ph-bold ph-${theme === 'dark' ? 'sun' : 'moon'} text-xl`}></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8 flex-grow">
                        
                        {/* Hero Section */}
                        <section className="bg-gradient-to-r from-cyan-600 to-blue-700 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-cyan-400/20 via-transparent to-transparent"></div>
                            <div className="relative z-10 space-y-3 max-w-xl">
                                <div className="flex items-center gap-3">
                                    <span className="bg-white/20 text-xs font-black uppercase tracking-widest px-3 py-1 rounded-full">Community Challenge</span>
                                    <span className="h-1.5 w-1.5 rounded-full bg-cyan-300 animate-pulse"></span>
                                </div>
                                <h2 className="text-3xl md:text-5xl font-display font-extrabold tracking-tight">Swim Around Australia</h2>
                                <p className="text-slate-100 text-sm md:text-base leading-relaxed">
                                    Join forces with swimmers from both CRAC and YCP. Every lap you complete helps us navigate the 25,760 km coastline of Australia. Log your distance, reach new coastal towns, and help us conquer the loop!
                                </p>
                            </div>

                            {/* Large Bento Circular Progress */}

                                                                className="w-full p-2.5 text-xs border border-slate-200 dark:border-slate-800 dark:bg-slate-900 rounded-lg focus:border-cyan-500 outline-none font-bold" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Home Facility</label>
                                                            <select value={facilityInput} onChange={e => setFacilityInput(e.target.value)}
                                                                className="w-full p-2.5 text-xs border border-slate-200 dark:border-slate-800 dark:bg-slate-900 rounded-lg focus:border-cyan-500 outline-none font-bold text-slate-500">
                                                                <option value="CRAC">Clarence Regional Aquatic Centre</option>
                                                                <option value="YCP">Yamba Community Pool</option>
                                                            </select>
                                                        </div>
                                                        <button type="submit" className="w-full py-2 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-bold rounded-lg text-xs uppercase tracking-wider hover:bg-slate-300 transition-colors">
                                                            Save Changes
                                                        </button>
                                                    </form>
                                                )}
                                            </div>

                                            {/* Sign out link */}
                                            <div className="flex justify-between items-center pt-2">
                                                <div className="text-[9px] text-slate-400 font-bold">
                                                    Passphrase: <span className="font-mono bg-slate-100 dark:bg-slate-900 px-1 py-0.5 rounded select-all">{currentUser.passphrase}</span>
                                                </div>
                                                <button onClick={handleLogout} className="text-red-500 hover:text-red-600 text-xs font-black uppercase tracking-wider flex items-center gap-1">
                                                    <i className="ph-bold ph-sign-out"></i> Sign Out
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Friendly Rivalry Box */}
                                <div className="glass-card p-6 rounded-3xl shadow-sm border">
                                    <h3 className="font-extrabold text-sm text-slate-900 dark:text-white uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <i className="ph-duotone ph-trophy text-amber-500 text-lg"></i>
                                        <span>Centre Rivalry</span>
                                    </h3>

                                    <div className="space-y-4">
                                        {/* CRAC Progress */}
                                        <div className="space-y-1">
                                            <div className="flex justify-between text-xs font-black uppercase tracking-tight">
                                                <span className="text-indigo-600 dark:text-indigo-400">CRAC (Grafton)</span>
                                                <span>{totals.cracKm.toFixed(1)} km</span>
                                            </div>
                                            <div className="w-full bg-slate-200 dark:bg-slate-800 h-3 rounded-full overflow-hidden p-0.5">
                                                <div className="bg-indigo-600 h-full rounded-full transition-all duration-1000" 
                                                    style={{width: `${totals.totalKm === 0 ? 0 : (totals.cracKm / totals.totalKm) * 100}%`}}></div>
                                            </div>
                                        </div>

                                        {/* YCP Progress */}
                                        <div className="space-y-1">
                                            <div className="flex justify-between text-xs font-black uppercase tracking-tight">
                                                <span className="text-emerald-600 dark:text-emerald-400">Yamba Community Pool</span>
                                                <span>{totals.ycpKm.toFixed(1)} km</span>
                                            </div>
                                            <div className="w-full bg-slate-200 dark:bg-slate-800 h-3 rounded-full overflow-hidden p-0.5">
                                                <div className="bg-emerald-600 h-full rounded-full transition-all duration-1000" 
                                                    style={{width: `${totals.totalKm === 0 ? 0 : (totals.ycpKm / totals.totalKm) * 100}%`}}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Top Swimmers Leaderboard */}
                                <div className="glass-card p-6 rounded-3xl shadow-sm border">
                                    <h3 className="font-extrabold text-lg text-slate-900 dark:text-white uppercase tracking-tight mb-4 flex items-center justify-between">
                                        <span>Top Swimmers Leaderboard</span>
                                        <i className="ph-bold ph-medal text-xl text-amber-500"></i>
                                    </h3>
                                    
                                    <div className="space-y-2">
                                        {totals.leaderboard.length === 0 ? (
                                            <p className="text-slate-400 text-xs italic py-4 text-center">No logs recorded yet. Be the first!</p>
                                        ) : (
                                            totals.leaderboard.map((swimmer, idx) => {
                                                const placeColors = idx === 0 ? 'bg-amber-100 text-amber-700' : idx === 1 ? 'bg-slate-200 text-slate-700' : idx === 2 ? 'bg-orange-100 text-orange-700' : 'bg-slate-100 text-slate-500 dark:bg-slate-800';
                                                return (
                                                    <div key={idx} className="flex justify-between items-center p-3 bg-slate-100/40 dark:bg-slate-800/20 border border-slate-200/50 dark:border-slate-800 rounded-xl">
                                                        <div className="flex items-center gap-3">
                                                            <span className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black ${placeColors}`}>
                                                                {idx + 1}
                                                            </span>
                                                            <div>
                                                                <h4 className="font-bold text-xs">{swimmer.name}</h4>
                                                                <span className="text-[8px] text-slate-400 font-bold uppercase">{swimmer.facility.includes('YCP') ? 'YCP' : 'CRAC'}</span>
                                                            </div>
                                                        </div>
                                                        <span className="text-xs font-black text-cyan-600 dark:text-cyan-400">{swimmer.distanceKm.toFixed(2)} km</span>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Bottom Area: Recent Activity Log */}
                        <section className="glass-card p-6 rounded-3xl shadow-sm border">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <h3 className="font-extrabold text-lg text-slate-900 dark:text-white uppercase tracking-tight">Recent Log Entries</h3>
                                    <p className="text-[9px] text-slate-400 dark:text-slate-500 uppercase tracking-widest font-black leading-none mt-0.5">Community Logs (Live Feed)</p>
                                </div>
                                <span className="text-xs text-slate-400">{recentLogs.length} logs displayed</span>
                            </div>

                            {loading ? (
                                <div className="flex flex-col items-center justify-center py-12 gap-3">
                                    <i className="ph-duotone ph-spinner animate-spin text-3xl text-cyan-500"></i>
                                    <span className="text-xs text-slate-400">Fetching live feed...</span>
                                </div>
                            ) : recentLogs.length === 0 ? (
                                <p className="text-slate-400 text-xs italic py-12 text-center border border-dashed rounded-2xl">No logged sessions recorded. Log your first swim above!</p>
                            ) : (
                                <div className="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                                    <table className="min-w-full divide-y divide-slate-200 dark:divide-slate-800">
                                        <thead className="bg-slate-100/50 dark:bg-slate-900/50">
                                            <tr>
                                                <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Swimmer</th>
                                                <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Facility</th>
                                                <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Laps Logged</th>
                                                <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Distance</th>
                                                <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Date Logged</th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white dark:bg-slate-900/50 divide-y divide-slate-100 dark:divide-slate-800">
                                            {recentLogs.map((log, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-850/50 transition-colors">
                                                    <td className="px-6 py-4 whitespace-nowrap text-xs font-bold">{log.swimmerName}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap">
                                                        <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-full border ${log.facility.includes('YCP') ? 'bg-emerald-50 border-emerald-100 text-emerald-700 dark:bg-emerald-950/20 dark:border-emerald-900 dark:text-emerald-400' : 'bg-indigo-50 border-indigo-100 text-indigo-700 dark:bg-indigo-950/20 dark:border-indigo-900 dark:text-indigo-400'}`}>
                                                            {log.facility.includes('YCP') ? 'YCP' : 'CRAC'}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-xs text-slate-500">{log.laps} laps ({log.poolLength}m)</td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-xs font-black text-cyan-600 dark:text-cyan-400">{log.distanceKm.toFixed(2)} km</td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-xs text-slate-400">{log.date}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </section>
                    </main>

                    {/* Standalone Help Modal */}
                    {isHelpOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setIsHelpOpen(false)}>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md p-6 border border-slate-200 dark:border-slate-800" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-4 mb-6">
                                    <div className="bg-cyan-100 text-cyan-600 p-3 rounded-xl dark:bg-cyan-900/30">
                                        <i className="ph-bold ph-swimmer text-2xl"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-black text-slate-900 dark:text-white uppercase tracking-tighter">Lap Challenge Guide</h3>
                                        <p className="text-[10px] text-slate-500 uppercase tracking-widest font-black opacity-60">Quick Reference</p>
                                    </div>
                                </div>
                                
                                <div className="text-slate-600 dark:text-slate-400 text-xs leading-relaxed mb-6 space-y-3 font-medium">
                                    <p><strong>Goal:</strong> Collectively swim 25,760 km—the length of the Australian coastline!</p>
                                    <p><strong>How to contribute:</strong></p>
                                    <ul className="list-disc pl-4 space-y-1">
                                        <li>Register an anonymous profile choosing a display nickname and a unique login passphrase.</li>
                                        <li>Log the number of laps you completed at CRAC or YCP.</li>
                                        <li>The app automatically calculates your distance in km and adds it to the global total.</li>
                                    </ul>
                                    <p><strong>Tracking progress:</strong> Watch the swimmer icon move along the coastline path on the map as the filled blue line expands in real-time!</p>
                                </div>
                                
                                <button onClick={() => setIsHelpOpen(false)} className="w-full py-3 bg-slate-900 dark:bg-cyan-600 hover:bg-cyan-500 text-white font-black rounded-xl transition-all shadow-md uppercase tracking-wider text-xs">
                                    Got It!
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Inline toast notification */}
                    {toast.show && (
                        <div className="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white dark:bg-slate-800 px-6 py-3 rounded-xl shadow-2xl border border-slate-700 flex items-center gap-2 z-50 animate-bounce">
                            <i className="ph-bold ph-info text-cyan-400 text-lg"></i>
                            <span className="text-xs font-bold">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<MainApp />);
    </script>
</body>
</html>
