<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAC Print Studio | Clarence Regional Aquatic Centre</title>
    
    <!-- Tailwind CSS v2 -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Advanced Print Engine */
        @media print {
            @page { size: A4 landscape; margin: 5mm !important; }
            
            body, html { 
                width: 100% !important;
                height: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                background-color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                color-adjust: exact;
            }
            
            /* Explicitly hide the sidebar controls during print */
            .print-hide { display: none !important; }
            
            /* Flatten wrapper to behave like standard DOM */
            .print-wrapper-container {
                position: static !important;
                display: block !important;
                width: 100% !important;
                height: auto !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
                background: white !important;
            }

            .print-preview-area {
                display: block !important;
                height: auto !important;
                overflow: visible !important;
                background: white !important;
                padding: 0 !important;
            }

            /* Perfect A4 Page Breaks - Strict Physical Control */
            .print-page {
                width: 100% !important;
                height: 190mm !important;
                padding: 5mm 10mm !important;
                box-sizing: border-box !important;
                page-break-inside: avoid !important;
                page-break-after: always !important;
                break-after: page !important;
                box-shadow: none !important;
                margin: 0 !important;
                border: none !important;
                overflow: hidden !important;
            }
            
            /* Prevent trailing blank pages */
            .print-page:last-of-type {
                page-break-after: auto !important;
                break-after: auto !important;
            }

            /* Compress Header and Footer Spacing */
            .print-header { margin-bottom: 4px !important; padding-bottom: 2px !important; }
            .print-footer { margin-top: 4px !important; padding-bottom: 0 !important; }

            /* STRICT TABLE GRID FIX */
            table { 
                border-collapse: collapse !important; 
                width: 100% !important; 
                height: 135mm !important; /* Fixed height for the grid */
                table-layout: fixed !important; /* Force strict column widths */
            }
            
            /* Hack to make rows divide height equally and never stretch */
            tr { page-break-inside: avoid !important; page-break-after: auto !important; height: 1% !important; }
            th, td { padding: 0 !important; height: 1px !important; overflow: hidden !important; }
            
            .print-cell-wrapper {
                height: 100% !important; 
                overflow: hidden !important;
                box-sizing: border-box !important;
            }
            
            /* Ink Saver overrides */
            .ink-saver-active .bg-green-50, .ink-saver-active .bg-yellow-100, .ink-saver-active .bg-red-100 { 
                background-color: white !important; 
            }
            .ink-saver-active .text-green-700 { color: #4b5563 !important; }
            .ink-saver-active .text-yellow-800 { color: #1f2937 !important; }
            .ink-saver-active .text-red-800 { color: #111827 !important; }
            .ink-saver-active .border-red-300 { border-color: #374151 !important; border-width: 2px !important; }
            .ink-saver-active .border-yellow-400 { border-color: #9ca3af !important; border-style: dashed !important; border-width: 2px !important; }
            .ink-saver-active .border-transparent { border-color: #e5e7eb !important; border-width: 1px !important; }

            /* Ensure defaults show up if not in ink saver */
            .bg-green-50 { background-color: #f0fdf4 !important; }
            .bg-yellow-100 { background-color: #fef9c3 !important; }
            .bg-red-100 { background-color: #fee2e2 !important; }
            .bg-gray-100 { background-color: #f3f4f6 !important; }
            .bg-gray-200 { background-color: #e5e7eb !important; }
            .border-gray-200 { border-color: #e5e7eb !important; }
            .border-gray-300 { border-color: #d1d5db !important; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased">
    <div id="root"></div>

    <!-- React 18 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script type="text/babel">
        const Icons = {
            Printer: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            Filter: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
            Droplet: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>,
            LogOut: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        };

        const { useState, useEffect, useMemo } = React;

        const hexToRgba = (hex, alpha) => {
            let r = parseInt(hex.slice(1, 3), 16) || 0,
                g = parseInt(hex.slice(3, 5), 16) || 0,
                b = parseInt(hex.slice(5, 7), 16) || 0;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        const HIDDEN_ADMIN_EMAIL = "info@clarenceregionalaquaticcentre.com.au";

        const CRAC_DEFAULTS = { 
            zones: [ 
                { id: '50m Pool', children: Array.from({length: 8}, (_, i) => ({id: `Lane ${i+1}`})) }, 
                { id: 'LTS Pool', children: [] }, 
                { id: 'Splash Park', children: [] }, 
                { id: 'Multi-Purpose Room', children: [] } 
            ], 
            eventTypes: { 
                'Learn to Swim': '#3B82F6', 
                'Aqua Fitness': '#10B981', 
                'Public Swim': '#F59E0B', 
                'School Carnival': '#EF4444', 
                'Lane Hire': '#8B5CF6' 
            },
            openingHours: [ 
                {day: 'Monday', open: 5, close: 19}, {day: 'Tuesday', open: 5, close: 19}, 
                {day: 'Wednesday', open: 5, close: 19}, {day: 'Thursday', open: 5, close: 19}, 
                {day: 'Friday', open: 5, close: 19}, {day: 'Saturday', open: 7, close: 19}, 
                {day: 'Sunday', open: 8, close: 18} 
            ]
        };

        const firebaseConfig = {
            apiKey: "AIzaSyAF44-oMKqTKPcMgOuKfJJqUTJz9JYTHAg",
            authDomain: "osf---availability-roster.firebaseapp.com",
            projectId: "osf---availability-roster",
            storageBucket: "osf---availability-roster.firebasestorage.app",
            messagingSenderId: "1069751236100",
            appId: "1:1069751236100:web:2832210ad7e9ed50e86751",
            measurementId: "G-K5F1SSNK5H"
        };

        let db, auth;
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [user, setUser] = useState(null);
            const [firebaseReady, setFirebaseReady] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try { await auth.signInAnonymously(); } 
                    catch (err) { console.error("Auth Error:", err); }
                };
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u && !u.isAnonymous) { setUser(u); setIsAuthenticated(true); } 
                    else { setUser(null); setIsAuthenticated(false); }
                    setFirebaseReady(true);
                });
                initAuth();
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                await auth.signOut();
                await auth.signInAnonymously();
            };

            if (!firebaseReady) return (
                <div className="h-screen flex flex-col items-center justify-center text-gray-500" style={{gap: '1rem'}}>
                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                    <p>Connecting to Timetable Engine...</p>
                </div>
            );
            if (!isAuthenticated) return <Login />;
            return <PrintStudioApp onLogout={handleLogout} user={user} />;
        };

        const Login = () => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setError('');
                try {
                    await auth.signInWithEmailAndPassword(HIDDEN_ADMIN_EMAIL, password);
                } catch (err) {
                    if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found' || err.code === 'auth/invalid-email') {
                        setError('Incorrect password.');
                    } else {
                        setError(`Connection error: ${err.message}`);
                    }
                    setIsLoggingIn(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4 fade-in">
                    <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
                        <div className="text-center mb-8 flex flex-col items-center">
                            <div className="bg-gray-900 text-white p-3 rounded-xl mb-4"><Icons.Printer size={28} /></div>
                            <h1 className="text-2xl font-bold text-gray-900">Print Studio</h1>
                            <p className="text-gray-500 text-sm mt-1">Clarence Regional Aquatic Centre</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Access Password</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter password" autoFocus />
                            </div>
                            {error && <p className="text-red-500 text-sm bg-red-50 p-2 rounded border border-red-100">{error}</p>}
                            <button
                                type="submit"
                                disabled={isLoggingIn}
                                style={{opacity: isLoggingIn ? 0.5 : 1, cursor: isLoggingIn ? 'not-allowed' : 'pointer'}}
                                className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-sm"
                            >
                                {isLoggingIn ? 'Verifying...' : 'Access Print Studio'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const PrintStudioApp = ({ onLogout, user }) => {
            const [events, setEvents] = useState([]);
            const [settings, setSettings] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            // Print State
            const [weekOffset, setWeekOffset] = useState(0);
            const [printTypeFilter, setPrintTypeFilter] = useState('all');
            const [inkSaver, setInkSaver] = useState(false);
            const [selectedZones, setSelectedZones] = useState([]);
            const [customStartHour, setCustomStartHour] = useState(''); 
            const [customEndHour, setCustomEndHour] = useState('');
            const [publicHolidays, setPublicHolidays] = useState([]);

            const paths = useMemo(() => ({ events: 'calendar_events', settings: 'calendar_settings' }), []);

            useEffect(() => {
                if (!db || !user) return;
                let settingsLoaded = false, eventsLoaded = false;
                const checkLoading = () => { if (settingsLoaded && eventsLoaded) setIsLoading(false); };

                const unsubSettings = db.collection(paths.settings).doc('main_config').onSnapshot(doc => {
                    const data = doc.exists ? doc.data() : CRAC_DEFAULTS;
                    setSettings(data);
                    
                    if (!window.__zonesInitialized) {
                        setSelectedZones(data.zones.map(z => z.id));
                        window.__zonesInitialized = true;
                    }

                    settingsLoaded = true; checkLoading();
                });

                const unsubEvents = db.collection(paths.events).onSnapshot(snapshot => {
                    const fetched = snapshot.docs.map(doc => {
                        const d = doc.data();
                        return { id: doc.id, ...d,
                            startDateTime: d.startDateTime?.toDate ? d.startDateTime.toDate() : new Date(d.startDateTime),
                            endDateTime: d.endDateTime?.toDate ? d.endDateTime.toDate() : new Date(d.endDateTime) };
                    });
                    fetched.sort((a,b) => a.startDateTime - b.startDateTime);
                    setEvents(fetched);
                    eventsLoaded = true; checkLoading();
                });

                return () => { unsubSettings(); unsubEvents(); };
            }, [paths, user]);

            const handleZoneToggle = (id) => {
                if (selectedZones.includes(id)) {
                    setSelectedZones(selectedZones.filter(z => z !== id));
                } else {
                    setSelectedZones([...selectedZones, id]);
                }
            };

            const toggleHoliday = (dateStr) => {
                setPublicHolidays(prev => prev.includes(dateStr) ? prev.filter(d => d !== dateStr) : [...prev, dateStr]);
            };

            const { startOfWeek, endOfWeek, daysInWeek } = useMemo(() => {
                const now = new Date();
                now.setDate(now.getDate() + (weekOffset * 7));
                
                const currentDay = now.getDay() === 0 ? 7 : now.getDay();
                const start = new Date(now);
                start.setDate(now.getDate() - currentDay + 1);
                start.setHours(0,0,0,0);
                
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                end.setHours(23,59,59,999);

                const days = [];
                for(let i=0; i<7; i++) {
                    const d = new Date(start);
                    d.setDate(start.getDate() + i);
                    days.push(d);
                }

                return { startOfWeek: start, endOfWeek: end, daysInWeek: days };
            }, [weekOffset]);

            const weekEvents = useMemo(() => {
                const expanded = [];
                events.forEach(event => {
                    if (printTypeFilter !== 'all' && event.type !== printTypeFilter) return;

                    if (event.recurrence && event.recurrence.days) {
                        let current = new Date(event.startDateTime); 
                        current.setHours(0,0,0,0);
                        const endRecur = event.recurrence.endDate.toDate ? event.recurrence.endDate.toDate() : new Date(event.recurrence.endDate);
                        const effectiveEnd = new Date(Math.min(endRecur.getTime(), endOfWeek.getTime()));
                        
                        if (current < startOfWeek) current = new Date(startOfWeek);
                        const startTime = { h: event.startDateTime.getHours(), m: event.startDateTime.getMinutes() };
                        
                        let duration = event.endDateTime.getTime() - event.startDateTime.getTime();
                        if (duration > 24 * 60 * 60 * 1000) {
                            const hDiff = event.endDateTime.getHours() - event.startDateTime.getHours();
                            const mDiff = event.endDateTime.getMinutes() - event.startDateTime.getMinutes();
                            duration = (hDiff * 60 + mDiff) * 60000;
                            if (duration < 0) duration += 24 * 60 * 60 * 1000;
                        }
                        
                        while(current <= effectiveEnd) {
                            const dayName = current.toLocaleDateString('en-US', { weekday: 'long' });
                            if (event.recurrence.days.includes(dayName)) {
                                const s = new Date(current); s.setHours(startTime.h, startTime.m, 0, 0);
                                expanded.push({ ...event, startDateTime: s, endDateTime: new Date(s.getTime() + duration) });
                            }
                            current.setDate(current.getDate() + 1);
                        }
                    } else {
                        if (event.endDateTime >= startOfWeek && event.startDateTime <= endOfWeek) {
                            const start = new Date(event.startDateTime);
                            let end = new Date(event.endDateTime);
                            if (end.getTime() - start.getTime() > 24 * 60 * 60 * 1000) {
                                end = new Date(start);
                                end.setHours(event.endDateTime.getHours(), event.endDateTime.getMinutes());
                                if (end < start) end.setDate(end.getDate() + 1);
                            }
                            expanded.push({ ...event, startDateTime: start, endDateTime: end });
                        }
                    }
                });
                return expanded;
            }, [events, startOfWeek, endOfWeek, printTypeFilter]);

            const childToParentMap = useMemo(() => {
                const map = {};
                if (settings && settings.zones) {
                    settings.zones.forEach(z => {
                        z.children?.forEach(c => {
                            if (!map[c.id]) map[c.id] = z.id;
                        });
                    });
                }
                return map;
            }, [settings]);

            const displayHours = useMemo(() => {
                let minOpen = 5; 
                let maxClose = 19;
                
                if (settings && settings.openingHours?.length > 0) {
                    minOpen = Math.min(...settings.openingHours.map(h => h.open));
                    maxClose = Math.max(...settings.openingHours.map(h => h.close));
                }

                if (customStartHour !== '') minOpen = parseInt(customStartHour);
                if (customEndHour !== '') maxClose = parseInt(customEndHour);

                if (maxClose <= minOpen) maxClose = minOpen + 1;

                const hrs = [];
                for(let i = minOpen; i < maxClose; i++) hrs.push(i);
                return hrs;
            }, [settings, customStartHour, customEndHour]);

            if (isLoading || !settings) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center text-gray-500 bg-gray-50">
                        <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mb-4"></div>
                        <p>Loading Timetable Data...</p>
                    </div>
                );
            }

            const zonesToPrint = settings.zones.filter(z => selectedZones.includes(z.id));

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-gray-100 fade-in print-wrapper-container">
                    
                    {/* LEFT SIDEBAR: Print Controls */}
                    <div className="w-full md:w-80 bg-gray-900 text-gray-200 flex flex-col flex-shrink-0 print-hide h-screen overflow-y-auto shadow-2xl z-20">
                        <div className="p-5 border-b border-gray-700 flex justify-between items-center bg-gray-950 sticky top-0 z-30">
                            <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                <Icons.Printer size={20} /> Print Studio
                            </h2>
                            <button onClick={onLogout} title="Logout" className="p-1.5 text-gray-400 hover:text-white hover:bg-gray-800 rounded transition-colors">
                                <Icons.LogOut size={20} />
                            </button>
                        </div>

                        <div className="p-5 space-y-8 flex-1">
                            {/* Date Selection */}
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Select Week</label>
                                <div className="flex bg-gray-800 rounded-lg p-1 border border-gray-700">
                                    <button onClick={() => setWeekOffset(o => o - 1)} className="px-3 py-2 hover:bg-gray-700 rounded text-sm transition-colors flex-1 text-center">&larr;</button>
                                    <div className="px-3 py-2 text-sm font-semibold border-l border-r border-gray-700 text-white flex flex-col items-center justify-center text-center leading-tight" style={{minWidth: '120px'}}>
                                        <span>{startOfWeek.toLocaleDateString('en-AU', { month: 'short', day: 'numeric' })}</span>
                                        <span className="text-xs text-gray-400 font-normal">to {endOfWeek.toLocaleDateString('en-AU', { month: 'short', day: 'numeric' })}</span>
                                    </div>
                                    <button onClick={() => setWeekOffset(o => o + 1)} className="px-3 py-2 hover:bg-gray-700 rounded text-sm transition-colors flex-1 text-center">&rarr;</button>
                                </div>
                                {weekOffset !== 0 && (
                                    <button onClick={() => setWeekOffset(0)} className="w-full mt-2 py-1.5 text-xs font-medium bg-blue-600/20 text-blue-400 rounded hover:bg-blue-600/30 transition-colors">Return to Current Week</button>
                                )}
                            </div>

                            {/* Zone Selection */}
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Pools / Zones to Print</label>
                                <div className="space-y-2 bg-gray-800 p-3 rounded-lg border border-gray-700">
                                    {settings.zones.map(z => (
                                        <label key={z.id} className="flex items-center gap-3 cursor-pointer group">
                                            <input type="checkbox" checked={selectedZones.includes(z.id)} onChange={() => handleZoneToggle(z.id)} className="w-4 h-4 rounded border-gray-600 text-blue-600 focus:ring-blue-500 bg-gray-700" />
                                            <span className="text-sm font-medium group-hover:text-white transition-colors">{z.id}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Filters & Options */}
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Program Filter</label>
                                    <select value={printTypeFilter} onChange={e => setPrintTypeFilter(e.target.value)} className="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-white outline-none focus:border-blue-500">
                                        <option value="all">Show Complete Availability</option>
                                        {Object.keys(settings.eventTypes).map(t => <option key={t} value={t}>Only show: {t}</option>)}
                                    </select>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Start Hour</label>
                                        <select value={customStartHour} onChange={e => setCustomStartHour(e.target.value)} className="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-white outline-none focus:border-blue-500">
                                            <option value="">Auto</option>
                                            {Array.from({length: 24}, (_, i) => <option key={i} value={i}>{i}:00</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">End Hour</label>
                                        <select value={customEndHour} onChange={e => setCustomEndHour(e.target.value)} className="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm text-white outline-none focus:border-blue-500">
                                            <option value="">Auto</option>
                                            {Array.from({length: 24}, (_, i) => <option key={i} value={i}>{i}:00</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* Public Holidays */}
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Mark Public Holidays</label>
                                <div className="space-y-2 bg-gray-800 p-3 rounded-lg border border-gray-700">
                                    {daysInWeek.map(day => {
                                        const dateStr = day.toISOString().split('T')[0];
                                        return (
                                            <label key={dateStr} className="flex items-center justify-between cursor-pointer group">
                                                <span className="text-sm font-medium text-gray-300 group-hover:text-white transition-colors">{day.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' })}</span>
                                                <input type="checkbox" checked={publicHolidays.includes(dateStr)} onChange={() => toggleHoliday(dateStr)} className="w-4 h-4 rounded border-gray-600 text-blue-600 focus:ring-blue-500 bg-gray-700" />
                                            </label>
                                        );
                                    })}
                                </div>
                            </div>

                            <label className="flex items-center gap-3 p-3 bg-gray-800 border border-gray-700 rounded-lg cursor-pointer hover:bg-gray-700/80 transition-colors">
                                <input type="checkbox" checked={inkSaver} onChange={e => setInkSaver(e.target.checked)} className="w-5 h-5 rounded border-gray-500 text-blue-600 focus:ring-blue-500 bg-gray-900" />
                                <div>
                                    <div className="text-sm font-bold text-white flex items-center gap-1"><Icons.Droplet size={14} /> Ink Saver Mode</div>
                                    <div className="text-xs text-gray-400 mt-0.5">Removes heavy background colours</div>
                                </div>
                            </label>
                        </div>

                        <div className="p-5 bg-gray-950 border-t border-gray-700 sticky bottom-0 z-30">
                            <button onClick={() => window.print()} className="w-full flex justify-center items-center gap-2 bg-white text-gray-900 py-3 rounded-lg font-bold hover:bg-gray-200 transition-colors shadow-lg">
                                <Icons.Printer size={20} /> Send to Printer
                            </button>
                        </div>
                    </div>

                    {/* RIGHT AREA: Live Print Preview */}
                    <div className={`flex-1 h-screen overflow-y-auto p-4 md:p-8 print-preview-area ${inkSaver ? 'ink-saver-active' : ''}`}>
                        
                        {zonesToPrint.length === 0 && (
                            <div className="flex flex-col items-center justify-center text-gray-400 mt-20 print-hide">
                                <Icons.Filter size={48} className="mb-4 opacity-50" />
                                <p>No zones selected for printing.</p>
                            </div>
                        )}

                        {zonesToPrint.map((zone, idx) => (
                            <div key={zone.id} 
                                 className={`print-page bg-white shadow-xl mx-auto border border-gray-200 mb-12`}
                                 style={{ width: '287mm', height: '190mm', padding: '5mm 15mm', boxSizing: 'border-box', overflow: 'hidden' }}
                            >
                                <div className="print-header mb-3 flex justify-between items-end border-b-2 border-gray-800 pb-3">
                                    {/* Left Column: Stacked Title and Dates */}
                                    <div>
                                        <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight leading-none">
                                            Clarence Regional Aquatic Centre
                                        </h1>
                                        <h2 className="text-2xl font-bold text-gray-700 mt-1 leading-none">
                                            {zone.id} {printTypeFilter === 'all' ? 'Availability' : `- ${printTypeFilter}`}
                                        </h2>
                                        <p className="text-gray-500 font-medium mt-2 text-base leading-none">
                                            Week of {startOfWeek.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                                        </p>
                                    </div>
                                    
                                    {/* Right Column: QR Code above Legend */}
                                    <div className="flex flex-col items-end gap-3">
                                        <div className="flex items-center gap-3 p-1 rounded-lg">
                                            <div className="text-right pl-1">
                                                <p className="font-bold text-gray-900 leading-none text-xs">Live Availability</p>
                                                <p className="text-blue-600 font-semibold text-[10px] mt-1">clarence.nsw.gov.au/crac</p>
                                            </div>
                                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent('https://www.clarence.nsw.gov.au/crac#zone-availability')}&color=111827`} alt="QR Code" className="w-10 h-10 rounded-md" />
                                        </div>
                                        
                                        <div className="flex items-center gap-5">
                                            <div className="flex items-center gap-1.5">
                                                <span className={`w-4 h-4 rounded border block ${inkSaver ? 'bg-white border-gray-300' : 'bg-green-50 border-green-300'}`}></span> 
                                                <span className="text-xs font-bold text-gray-700 uppercase tracking-wide">Free</span>
                                            </div>
                                            <div className="flex items-center gap-1.5">
                                                <span className={`w-4 h-4 rounded border block ${inkSaver ? 'bg-white border-gray-400 border-dashed border-2' : 'bg-yellow-100 border-yellow-400'}`}></span> 
                                                <span className="text-xs font-bold text-gray-700 uppercase tracking-wide">Partial</span>
                                            </div>
                                            <div className="flex items-center gap-1.5">
                                                <span className={`w-4 h-4 rounded border block ${inkSaver ? 'bg-white border-gray-800 border-2' : 'bg-red-100 border-red-300'}`}></span> 
                                                <span className="text-xs font-bold text-gray-700 uppercase tracking-wide">Booked</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="border border-gray-400 rounded-lg overflow-hidden">
                                    <table className="w-full text-sm text-left border-collapse bg-white table-fixed">
                                        <thead className="bg-gray-100 text-gray-700 uppercase font-bold text-xs border-b border-gray-400">
                                            <tr>
                                                <th className="border-r border-gray-400 w-16 sm:w-20 text-center bg-gray-200 p-0 h-[1px]">
                                                    <div className="w-full h-full flex flex-col items-center justify-center p-1">Time</div>
                                                </th>
                                                {daysInWeek.map(day => {
                                                    const dateStr = day.toISOString().split('T')[0];
                                                    const isHoliday = publicHolidays.includes(dateStr);
                                                    return (
                                                        <th key={day.toISOString()} className={`border-r border-gray-400 text-center p-0 h-[1px] ${isHoliday ? 'bg-orange-50' : ''}`} style={{width: '12%'}}>
                                                            <div className="w-full h-full flex flex-col items-center justify-center p-1 py-1.5">
                                                                <div className={`font-extrabold ${isHoliday ? 'text-orange-600' : 'text-gray-900'} text-xs leading-tight`}>
                                                                    {day.toLocaleDateString('en-US', { weekday: 'short' })}
                                                                    {isHoliday && <span className="block text-[8px] uppercase tracking-tighter text-orange-500 mt-0.5">Holiday</span>}
                                                                </div>
                                                                <div className={`font-semibold ${isHoliday ? 'text-orange-500' : 'text-gray-500'} text-xs mt-0.5 leading-tight`}>
                                                                    {day.toLocaleDateString('en-US', { day: 'numeric', month: 'short' })}
                                                                </div>
                                                            </div>
                                                        </th>
                                                    );
                                                })}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {displayHours.map((hour, rowIdx) => (
                                                <tr key={hour} className={`border-b ${rowIdx === displayHours.length - 1 ? 'border-none' : 'border-gray-300'}`}>
                                                    <td className="border-r border-gray-400 font-bold text-gray-700 text-center bg-gray-50 p-0 h-[1px]">
                                                        <div className="w-full h-full flex flex-col items-center justify-center text-xs">
                                                            {hour === 12 ? '12 PM' : hour > 12 ? `${hour-12} PM` : `${hour} AM`}
                                                        </div>
                                                    </td>
                                                    {daysInWeek.map(day => {
                                                        const dateStr = day.toISOString().split('T')[0];
                                                        const isHoliday = publicHolidays.includes(dateStr);
                                                        const isSunday = day.getDay() === 0;
                                                        const isSaturday = day.getDay() === 6;

                                                        let isOpen = true;
                                                        if (isHoliday || isSunday) {
                                                            if (hour < 8 || hour >= 18) isOpen = false;
                                                        } else if (isSaturday) {
                                                            if (hour < 7 || hour >= 19) isOpen = false;
                                                        } else {
                                                            if (hour < 5 || hour >= 19) isOpen = false; 
                                                        }

                                                        if (!isOpen) {
                                                            return (
                                                                <td key={day.toISOString()} className="border-r border-gray-300 bg-gray-100 p-0 h-[1px]">
                                                                    <div className="p-[2px] w-full h-full box-border">
                                                                        <div className="print-cell-wrapper w-full h-full flex items-center justify-center rounded bg-gray-200/50 border border-gray-200 text-gray-400 font-semibold text-xs">
                                                                            Closed
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                            );
                                                        }

                                                        const cellStart = new Date(day); cellStart.setHours(hour, 0, 0, 0);
                                                        const cellEnd = new Date(day); cellEnd.setHours(hour + 1, 0, 0, 0);
                                                        
                                                        const cellEvents = weekEvents.filter(e => {
                                                            const overlapsTime = e.startDateTime < cellEnd && e.endDateTime > cellStart;
                                                            if(!overlapsTime) return false;
                                                            
                                                            const eZones = Array.isArray(e.zone) ? e.zone : [e.zone];
                                                            if (eZones.includes(zone.id)) return true;
                                                            
                                                            if (zone.children && zone.children.length > 0) {
                                                                return eZones.some(z => {
                                                                    if (z.startsWith(zone.id + ' - ')) return true;
                                                                    if (zone.children.some(c => c.id === z)) {
                                                                        if (eZones.includes(zone.id)) return true; 
                                                                        if (childToParentMap[z] === zone.id) return true; 
                                                                    }
                                                                    return false;
                                                                });
                                                            }
                                                            return false;
                                                        });

                                                        let isFullyBooked = false;
                                                        let bookedLanes = new Set();
                                                        let mainEventTitle = "";

                                                        cellEvents.forEach(e => {
                                                            const eZones = Array.isArray(e.zone) ? e.zone : [e.zone];
                                                            if (eZones.includes(zone.id)) {
                                                                isFullyBooked = true;
                                                                if(!mainEventTitle) { mainEventTitle = e.title; }
                                                            } else {
                                                                eZones.forEach(z => {
                                                                    if(zone.children?.some(c => c.id === z || z === `${zone.id} - ${c.id}`)) {
                                                                        bookedLanes.add(z);
                                                                    }
                                                                });
                                                            }
                                                        });

                                                        const totalChildren = zone.children?.length || 0;
                                                        if (totalChildren > 0 && bookedLanes.size >= totalChildren) {
                                                            isFullyBooked = true;
                                                        }

                                                        let bgClass = "bg-green-50";
                                                        let borderClass = "border-transparent"; 
                                                        let textContent = <span className="text-green-700 font-semibold tracking-wide">Free</span>;

                                                        if (isFullyBooked) {
                                                            bgClass = "bg-red-100";
                                                            borderClass = "border-red-300";
                                                            textContent = (
                                                                <div className="flex flex-col items-center justify-center text-center">
                                                                    <span className="text-red-900 font-bold leading-tight px-1" style={{ display: '-webkit-box', WebkitLineClamp: '2', WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{mainEventTitle || 'Fully Booked'}</span>
                                                                </div>
                                                            );
                                                        } else if (totalChildren > 0 && bookedLanes.size > 0) {
                                                            bgClass = "bg-yellow-100";
                                                            borderClass = "border-yellow-400";
                                                            textContent = (
                                                                <div className="flex flex-col items-center justify-center text-center leading-tight">
                                                                    <span className="text-yellow-900 font-extrabold">{totalChildren - bookedLanes.size} Lanes</span>
                                                                    <span className="text-yellow-800 text-[10px] uppercase font-bold tracking-wider mt-0.5">Available</span>
                                                                </div>
                                                            );
                                                        } else if (cellEvents.length > 0) {
                                                            bgClass = "bg-yellow-100";
                                                            borderClass = "border-yellow-400";
                                                            textContent = (
                                                                <div className="flex flex-col items-center justify-center text-center">
                                                                    <span className="text-yellow-900 font-bold leading-tight px-1" style={{ display: '-webkit-box', WebkitLineClamp: '2', WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{cellEvents[0].title}</span>
                                                                </div>
                                                            );
                                                        }

                                                        return (
                                                            <td key={day.toISOString()} className="border-r border-gray-300 p-0 h-[1px]">
                                                                <div className="p-[2px] w-full h-full box-border">
                                                                    <div className={`print-cell-wrapper w-full h-full flex flex-col items-center justify-center rounded border ${borderClass} ${bgClass} text-xs leading-tight`}>
                                                                        {textContent}
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="print-footer mt-2 pt-1 border-t border-gray-200">
                                    <div className="text-gray-500 font-bold tracking-wide w-full text-center text-xs">
                                        *All times subject to change
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
