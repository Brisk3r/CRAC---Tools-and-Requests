<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAC Print Studio | Clarence Regional Aquatic Centre</title>
    
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        crac: {
                            blue: '#004593',
                            cyan: '#06b6d4',
                            navy: '#0f172a'
                        }
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Aquatic Wave Background for Sidebar */
        .sidebar-aquatic {
            background-color: #0f172a;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='20' viewBox='0 0 100 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M21.184 20c.357-.13.72-.264 1.088-.402l1.768-.661C33.64 15.347 39.647 13 50 13c10.354 0 16.36 2.347 25.96 5.937l1.768.661c.369.138.731.272 1.088.402H21.184z' fill='%231e293b' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        /* Advanced Print Engine */
        @media print {
            @page { size: A4 landscape; margin: 0mm !important; }
            
            body, html { 
                width: 100% !important;
                height: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                background-color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                color-adjust: exact;
            }
            
            #gen-web-nav, #gen-web-nav-spacer { display: none !important; }

            /* Explicitly hide the sidebar controls during print */
            .print-hide { display: none !important; }
            
            /* Flatten wrapper to behave like standard DOM */
            .print-wrapper-container {
                position: static !important;
                display: block !important;
                width: 100% !important;
                height: auto !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
                background: white !important;
            }

            .print-preview-area {
                display: block !important;
                height: auto !important;
                overflow: visible !important;
                background: white !important;
                padding: 0 !important;
            }

            /* Perfect A4 Page Breaks - Strict Physical Control */
            .print-page {
                width: 297mm !important;
                height: 210mm !important;
                padding: 10mm 15mm !important;
                box-sizing: border-box !important;
                page-break-inside: avoid !important;
                page-break-after: always !important;
                break-after: page !important;
                box-shadow: none !important;
                margin: 0 !important;
                border: none !important;
                overflow: hidden !important;
                background: white !important;
            }
            
            /* Prevent trailing blank pages */
            .print-page:last-of-type {
                page-break-after: auto !important;
                break-after: auto !important;
            }

            /* Compress Header and Footer Spacing */
            .print-header { margin-bottom: 8px !important; padding-bottom: 4px !important; }
            .print-footer { margin-top: 8px !important; padding-bottom: 0 !important; }

            /* STRICT TABLE GRID FIX */
            table { 
                border-collapse: collapse !important; 
                width: 100% !important; 
                height: 145mm !important; /* Fixed height for the grid */
                table-layout: fixed !important; /* Force strict column widths */
            }
            
            /* Hack to make rows divide height equally and never stretch */
            tr { page-break-inside: avoid !important; page-break-after: auto !important; height: 1% !important; }
            th, td { padding: 0 !important; height: 1px !important; overflow: hidden !important; }
            
            .print-cell-wrapper {
                height: 100% !important; 
                overflow: hidden !important;
                box-sizing: border-box !important;
            }
            
            /* Ink Saver overrides */
            .ink-saver-active .bg-green-50, .ink-saver-active .bg-yellow-100, .ink-saver-active .bg-red-100 { 
                background-color: white !important; 
            }
            .ink-saver-active .text-green-700 { color: #4b5563 !important; }
            .ink-saver-active .text-yellow-800 { color: #1f2937 !important; }
            .ink-saver-active .text-red-800 { color: #111827 !important; }
            .ink-saver-active .border-red-300 { border-color: #374151 !important; border-width: 2px !important; }
            .ink-saver-active .border-yellow-400 { border-color: #9ca3af !important; border-style: dashed !important; border-width: 2px !important; }
            .ink-saver-active .border-transparent { border-color: #e5e7eb !important; border-width: 1px !important; }

            /* Ensure defaults show up if not in ink saver */
            .bg-green-50 { background-color: #f0fdf4 !important; }
            .bg-yellow-100 { background-color: #fef9c3 !important; }
            .bg-red-100 { background-color: #fee2e2 !important; }
            .bg-gray-100 { background-color: #f3f4f6 !important; }
            .bg-gray-200 { background-color: #e5e7eb !important; }
            .border-gray-200 { border-color: #e5e7eb !important; }
            .border-gray-300 { border-color: #d1d5db !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-outfit">
    <div id="root"></div>

    <!-- React 18 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.5/babel.min.js"></script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script src="seasonLogic.js"></script>
    <script type="text/babel">
        const Icons = {
            Printer: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            Filter: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
            Droplet: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>,
            LogOut: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
            Waves: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>
        };

        const { useState, useEffect, useMemo } = React;

        const hexToRgba = (hex, alpha) => {
            let r = parseInt(hex.slice(1, 3), 16) || 0,
                g = parseInt(hex.slice(3, 5), 16) || 0,
                b = parseInt(hex.slice(5, 7), 16) || 0;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        const HIDDEN_ADMIN_EMAIL = "info@clarenceregionalaquaticcentre.com.au";

        const CRAC_DEFAULTS = { 
            zones: [ 
                { id: '50m Pool', children: Array.from({length: 8}, (_, i) => ({id: `Lane ${i+1}`})) }, 
                { id: 'LTS Pool', children: [] }, 
                { id: 'Splash Park', children: [] }, 
                { id: 'Multi-Purpose Room', children: [] } 
            ], 
            eventTypes: { 
                'Learn to Swim': '#3B82F6', 
                'Aqua Fitness': '#10B981', 
                'Public Swim': '#F59E0B', 
                'School Carnival': '#EF4444', 
                'Lane Hire': '#8B5CF6' 
            },
            openingHours: [ 
                {day: 'Monday', open: 5, close: 19}, {day: 'Tuesday', open: 5, close: 19}, 
                {day: 'Wednesday', open: 5, close: 19}, {day: 'Thursday', open: 5, close: 19}, 
                {day: 'Friday', open: 5, close: 19}, {day: 'Saturday', open: 7, close: 19}, 
                {day: 'Sunday', open: 8, close: 18} 
            ]
        };

        const firebaseConfig = {
            apiKey: "AIzaSyAF44-oMKqTKPcMgOuKfJJqUTJz9JYTHAg",
            authDomain: "osf---availability-roster.firebaseapp.com",
            projectId: "osf---availability-roster",
            storageBucket: "osf---availability-roster.firebasestorage.app",
            messagingSenderId: "1069751236100",
            appId: "1:1069751236100:web:2832210ad7e9ed50e86751",
            measurementId: "G-K5F1SSNK5H"
        };

        let db, auth;
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [user, setUser] = useState(null);
            const [firebaseReady, setFirebaseReady] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try { await auth.signInAnonymously(); } 
                    catch (err) { console.error("Auth Error:", err); }
                };
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u && !u.isAnonymous) { setUser(u); setIsAuthenticated(true); } 
                    else { setUser(null); setIsAuthenticated(false); }
                    setFirebaseReady(true);
                });
                initAuth();
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                await auth.signOut();
                await auth.signInAnonymously();
            };

            if (!firebaseReady) return (
                <div className="h-screen flex flex-col items-center justify-center text-slate-400 bg-slate-900" style={{gap: '1.5rem'}}>
                    <div className="animate-spin rounded-full h-10 w-10 border-4 border-cyan-500/20 border-t-cyan-500"></div>
                    <p className="font-bold uppercase tracking-widest text-xs">Initialising Studio...</p>
                </div>
            );
            if (!isAuthenticated) return <Login />;
            return <PrintStudioApp onLogout={handleLogout} user={user} />;
        };

        const Login = () => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setError('');
                try {
                    await auth.signInWithEmailAndPassword(HIDDEN_ADMIN_EMAIL, password);
                } catch (err) {
                    if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found' || err.code === 'auth/invalid-email') {
                        setError('Incorrect password.');
                    } else {
                        setError(`Connection error: ${err.message}`);
                    }
                    setIsLoggingIn(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4 fade-in sidebar-aquatic">
                    <div className="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-200">
                        <div className="text-center mb-8 flex flex-col items-center">
                            <div className="bg-cyan-600 text-white p-4 rounded-2xl mb-6 shadow-lg shadow-cyan-500/20"><Icons.Printer size={32} /></div>
                            <h1 className="text-3xl font-black text-slate-900 uppercase tracking-tighter">Print Studio</h1>
                            <p className="text-cyan-600 font-bold text-[10px] mt-2 uppercase tracking-widest">Clarence Regional Aquatic Centre</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Access Key</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-cyan-500 outline-none transition-all font-bold text-slate-900 placeholder-slate-300" placeholder="••••••••" autoFocus />
                            </div>
                            {error && <p className="text-red-600 text-[10px] font-bold bg-red-50 p-3 rounded-xl border border-red-100 uppercase tracking-tight">{error}</p>}
                            <button
                                type="submit"
                                disabled={isLoggingIn}
                                className={`w-full bg-slate-900 text-white p-4 rounded-2xl font-black uppercase tracking-widest hover:bg-cyan-600 transition-all shadow-xl active:scale-95 ${isLoggingIn ? 'opacity-50 cursor-not-allowed' : ''}`}
                            >
                                {isLoggingIn ? 'Verifying...' : 'Launch Studio'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const PrintStudioApp = ({ onLogout, user }) => {
            const [events, setEvents] = useState([]);
            const [settings, setSettings] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            // Print State
            const [weekOffset, setWeekOffset] = useState(0);
            const [printTypeFilter, setPrintTypeFilter] = useState('all');
            const [inkSaver, setInkSaver] = useState(false);
            const [selectedZones, setSelectedZones] = useState([]);
            const [customStartHour, setCustomStartHour] = useState(''); 
            const [customEndHour, setCustomEndHour] = useState('');
            const [publicHolidays, setPublicHolidays] = useState([]);

            const paths = useMemo(() => ({ events: 'calendar_events', settings: 'calendar_settings' }), []);

            useEffect(() => {
                if (!db || !user) return;
                let settingsLoaded = false, eventsLoaded = false;
                const checkLoading = () => { if (settingsLoaded && eventsLoaded) setIsLoading(false); };

                const unsubSettings = db.collection(paths.settings).doc('main_config').onSnapshot(doc => {
                    const data = doc.exists ? doc.data() : CRAC_DEFAULTS;
                    setSettings(data);
                    
                    if (!window.__zonesInitialized) {
                        setSelectedZones(data.zones.map(z => z.id));
                        window.__zonesInitialized = true;
                    }

                    settingsLoaded = true; checkLoading();
                });

                const unsubEvents = db.collection(paths.events).onSnapshot(snapshot => {
                    const fetched = snapshot.docs.map(doc => {
                        const d = doc.data();
                        return { id: doc.id, ...d,
                            startDateTime: d.startDateTime?.toDate ? d.startDateTime.toDate() : new Date(d.startDateTime),
                            endDateTime: d.endDateTime?.toDate ? d.endDateTime.toDate() : new Date(d.endDateTime) };
                    });
                    fetched.sort((a,b) => a.startDateTime - b.startDateTime);
                    setEvents(fetched);
                    eventsLoaded = true; checkLoading();
                });

                return () => { unsubSettings(); unsubEvents(); };
            }, [paths, user]);

            const handleZoneToggle = (id) => {
                if (selectedZones.includes(id)) {
                    setSelectedZones(selectedZones.filter(z => z !== id));
                } else {
                    setSelectedZones([...selectedZones, id]);
                }
            };

            const toggleHoliday = (dateStr) => {
                setPublicHolidays(prev => prev.includes(dateStr) ? prev.filter(d => d !== dateStr) : [...prev, dateStr]);
            };

            const { startOfWeek, endOfWeek, daysInWeek } = useMemo(() => {
                const now = new Date();
                now.setDate(now.getDate() + (weekOffset * 7));
                
                const currentDay = now.getDay() === 0 ? 7 : now.getDay();
                const start = new Date(now);
                start.setDate(now.getDate() - currentDay + 1);
                start.setHours(0,0,0,0);
                
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                end.setHours(23,59,59,999);

                const days = [];
                for(let i=0; i<7; i++) {
                    const d = new Date(start);
                    d.setDate(start.getDate() + i);
                    days.push(d);
                }

                return { startOfWeek: start, endOfWeek: end, daysInWeek: days };
            }, [weekOffset]);

            const weekEvents = useMemo(() => {
                const expanded = [];
                events.forEach(event => {
                    if (printTypeFilter !== 'all' && event.type !== printTypeFilter) return;

                    if (event.recurrence && event.recurrence.days) {
                        let current = new Date(event.startDateTime); 
                        current.setHours(0,0,0,0);
                        const endRecur = event.recurrence.endDate.toDate ? event.recurrence.endDate.toDate() : new Date(event.recurrence.endDate);
                        const effectiveEnd = new Date(Math.min(endRecur.getTime(), endOfWeek.getTime()));
                        
                        if (current < startOfWeek) current = new Date(startOfWeek);
                        const startTime = { h: event.startDateTime.getHours(), m: event.startDateTime.getMinutes() };
                        
                        let duration = event.endDateTime.getTime() - event.startDateTime.getTime();
                        if (duration > 24 * 60 * 60 * 1000) {
                            const hDiff = event.endDateTime.getHours() - event.startDateTime.getHours();
                            const mDiff = event.endDateTime.getMinutes() - event.startDateTime.getMinutes();
                            duration = (hDiff * 60 + mDiff) * 60000;
                            if (duration < 0) duration += 24 * 60 * 60 * 1000;
                        }
                        
                        while(current <= effectiveEnd) {
                            const dayName = current.toLocaleDateString('en-US', { weekday: 'long' });
                            if (event.recurrence.days.includes(dayName)) {
                                const s = new Date(current); s.setHours(startTime.h, startTime.m, 0, 0);
                                expanded.push({ ...event, startDateTime: s, endDateTime: new Date(s.getTime() + duration) });
                            }
                            current.setDate(current.getDate() + 1);
                        }
                    } else {
                        if (event.endDateTime >= startOfWeek && event.startDateTime <= endOfWeek) {
                            const start = new Date(event.startDateTime);
                            let end = new Date(event.endDateTime);
                            if (end.getTime() - start.getTime() > 24 * 60 * 60 * 1000) {
                                end = new Date(start);
                                end.setHours(event.endDateTime.getHours(), event.endDateTime.getMinutes());
                                if (end < start) end.setDate(end.getDate() + 1);
                            }
                            expanded.push({ ...event, startDateTime: start, endDateTime: end });
                        }
                    }
                });
                return expanded;
            }, [events, startOfWeek, endOfWeek, printTypeFilter]);

            const childToParentMap = useMemo(() => {
                const map = {};
                if (settings && settings.zones) {
                    settings.zones.forEach(z => {
                        z.children?.forEach(c => {
                            if (!map[c.id]) map[c.id] = z.id;
                        });
                    });
                }
                return map;
            }, [settings]);

            const displayHours = useMemo(() => {
                let minOpen = 5; 
                let maxClose = 19;
                
                if (window.CRAC_SEASON_LOGIC) {
                    const limits = window.CRAC_SEASON_LOGIC.getDisplayHoursLimits(startOfWeek);
                    minOpen = limits.min; maxClose = limits.max;
                } else if (settings && settings.openingHours?.length > 0) {
                    minOpen = Math.min(...settings.openingHours.map(h => h.open));
                    maxClose = Math.max(...settings.openingHours.map(h => h.close));
                }

                if (customStartHour !== '') minOpen = parseInt(customStartHour);
                if (customEndHour !== '') maxClose = parseInt(customEndHour);

                if (maxClose <= minOpen) maxClose = minOpen + 1;

                const hrs = [];
                for(let i = minOpen; i < maxClose; i++) hrs.push(i);
                return hrs;
            }, [settings, customStartHour, customEndHour, startOfWeek]);

            if (isLoading || !settings) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center text-slate-400 bg-slate-900" style={{gap: '1.5rem'}}>
                        <div className="animate-spin rounded-full h-10 w-10 border-4 border-cyan-500/20 border-t-cyan-500"></div>
                        <p className="font-bold uppercase tracking-widest text-xs">Loading Timetable Data...</p>
                    </div>
                );
            }

            const zonesToPrint = settings.zones.filter(z => selectedZones.includes(z.id));

            return (
                <div className="flex flex-col md:flex-row bg-slate-50 fade-in print-wrapper-container overflow-hidden h-[calc(100vh-64px)]">
                    
                    {/* LEFT SIDEBAR: Print Controls */}
                    <div className="w-full md:w-85 sidebar-aquatic text-slate-200 flex flex-col flex-shrink-0 print-hide overflow-y-auto shadow-[10px_0_30px_rgba(0,0,0,0.1)] z-20 relative">
                        <div className="p-6 border-b border-slate-800/50 flex justify-between items-center bg-slate-950/50 backdrop-blur-md sticky top-0 z-30">
                            <h2 className="text-xl font-black text-white flex items-center gap-3 uppercase tracking-tighter">
                                <Icons.Printer className="text-cyan-500" size={24} /> Print Studio
                            </h2>
                            <button onClick={onLogout} title="Logout" className="p-2 text-slate-500 hover:text-white hover:bg-slate-800 rounded-xl transition-all">
                                <Icons.LogOut size={20} />
                            </button>
                        </div>

                        <div className="p-6 space-y-8 flex-1 custom-scroll">
                            {/* Date Selection */}
                            <div className="group">
                                <label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 group-hover:text-cyan-500 transition-colors">Target Week</label>
                                <div className="flex bg-slate-950 border-2 border-slate-800 rounded-2xl p-1 overflow-hidden">
                                    <button onClick={() => setWeekOffset(o => o - 1)} className="px-4 py-3 hover:bg-slate-800 text-slate-400 hover:text-white transition-all">&larr;</button>
                                    <div className="px-4 py-3 text-xs font-black border-l border-r border-slate-800 text-white flex flex-col items-center justify-center text-center leading-tight flex-1">
                                        <span className="uppercase">{startOfWeek.toLocaleDateString('en-AU', { month: 'short', day: 'numeric' })}</span>
                                        <span className="text-[9px] text-slate-500 font-bold uppercase tracking-tighter mt-0.5">to {endOfWeek.toLocaleDateString('en-AU', { month: 'short', day: 'numeric' })}</span>
                                    </div>
                                    <button onClick={() => setWeekOffset(o => o + 1)} className="px-4 py-3 hover:bg-slate-800 text-slate-400 hover:text-white transition-all">&rarr;</button>
                                </div>
                                {weekOffset !== 0 && (
                                    <button onClick={() => setWeekOffset(0)} className="w-full mt-3 py-2 text-[10px] font-black bg-cyan-500/10 text-cyan-400 rounded-xl hover:bg-cyan-500/20 transition-all uppercase tracking-widest">Reset to Today</button>
                                )}
                            </div>

                            {/* Zone Selection */}
                            <div>
                                <label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Include Facilities</label>
                                <div className="space-y-1.5">
                                    {settings.zones.map(z => (
                                        <label key={z.id} className={`flex items-center gap-3 p-3 rounded-2xl cursor-pointer border-2 transition-all group ${selectedZones.includes(z.id) ? 'bg-cyan-500/10 border-cyan-500/30 text-white shadow-lg shadow-cyan-500/5' : 'bg-slate-950/40 border-slate-800/50 text-slate-400 hover:border-slate-700'}`}>
                                            <input type="checkbox" checked={selectedZones.includes(z.id)} onChange={() => handleZoneToggle(z.id)} className="hidden" />
                                            <div className={`w-5 h-5 rounded-lg border-2 flex items-center justify-center transition-all ${selectedZones.includes(z.id) ? 'bg-cyan-500 border-cyan-500' : 'border-slate-700'}`}>
                                                {selectedZones.includes(z.id) && <svg className="text-white w-3 h-3" fill="none" stroke="currentColor" strokeWidth="4" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                                            </div>
                                            <span className="text-xs font-black uppercase tracking-tight">{z.id}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Filters & Options */}
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Template Filter</label>
                                    <select value={printTypeFilter} onChange={e => setPrintTypeFilter(e.target.value)} className="w-full p-4 bg-slate-950 border-2 border-slate-800 rounded-2xl text-xs font-black text-white outline-none focus:border-cyan-500 transition-all uppercase tracking-widest">
                                        <option value="all">Full Operations View</option>
                                        {Object.keys(settings.eventTypes).map(t => <option key={t} value={t}>Only: {t}</option>)}
                                    </select>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 text-center">Start</label>
                                        <select value={customStartHour} onChange={e => setCustomStartHour(e.target.value)} className="w-full p-3 bg-slate-950 border-2 border-slate-800 rounded-2xl text-[10px] font-black text-white text-center">
                                            <option value="">AUTO</option>
                                            {Array.from({length: 24}, (_, i) => <option key={i} value={i}>{i}:00</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 text-center">End</label>
                                        <select value={customEndHour} onChange={e => setCustomEndHour(e.target.value)} className="w-full p-3 bg-slate-950 border-2 border-slate-800 rounded-2xl text-[10px] font-black text-white text-center">
                                            <option value="">AUTO</option>
                                            {Array.from({length: 24}, (_, i) => <option key={i} value={i}>{i}:00</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* Public Holidays */}
                            <div>
                                <label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Mark Holidays</label>
                                <div className="grid grid-cols-1 gap-2">
                                    {daysInWeek.map(day => {
                                        const dateStr = day.toISOString().split('T')[0];
                                        return (
                                            <button key={dateStr} onClick={() => toggleHoliday(dateStr)} className={`flex items-center justify-between p-3 rounded-xl border-2 transition-all ${publicHolidays.includes(dateStr) ? 'bg-orange-500/10 border-orange-500/50 text-orange-400' : 'bg-slate-950/20 border-slate-800/30 text-slate-500 hover:border-slate-700'}`}>
                                                <span className="text-[10px] font-black uppercase tracking-widest">{day.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' })}</span>
                                                <div className={`w-3 h-3 rounded-full border-2 ${publicHolidays.includes(dateStr) ? 'bg-orange-500 border-orange-500' : 'border-slate-800'}`}></div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <label className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer border-2 transition-all ${inkSaver ? 'bg-white text-slate-900 border-white shadow-xl' : 'bg-slate-950/40 border-slate-800/50 text-slate-400 hover:border-slate-700'}`}>
                                <input type="checkbox" checked={inkSaver} onChange={e => setInkSaver(e.target.checked)} className="hidden" />
                                <div className={`w-6 h-6 rounded-lg flex items-center justify-center ${inkSaver ? 'bg-slate-900 text-white' : 'bg-slate-800 text-slate-500'}`}>
                                    <Icons.Droplet size={14} />
                                </div>
                                <div className="flex-1">
                                    <div className="text-[10px] font-black uppercase tracking-widest">Ink Saver</div>
                                    <div className={`text-[9px] font-bold ${inkSaver ? 'text-slate-500' : 'text-slate-600'}`}>Strict Black & White</div>
                                </div>
                            </label>
                        </div>

                        <div className="p-6 bg-slate-950/80 backdrop-blur-xl border-t border-slate-800/50 sticky bottom-0 z-30">
                            <button onClick={() => window.print()} className="w-full flex justify-center items-center gap-3 bg-cyan-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-cyan-500 transition-all shadow-xl shadow-cyan-500/20 active:scale-95 group">
                                <Icons.Printer size={20} className="group-hover:rotate-12 transition-transform" /> Send to Printer
                            </button>
                        </div>
                    </div>

                    {/* RIGHT AREA: Live Print Preview */}
                    <div className={`flex-1 overflow-y-auto p-8 md:p-12 print-preview-area custom-scroll bg-slate-200/50 relative ${inkSaver ? 'ink-saver-active' : ''}`}>
                        
                        {/* WYSIWYG Guide */}
                        <div className="max-w-[287mm] mx-auto mb-6 flex items-center justify-between text-slate-400 print-hide px-4">
                            <div className="flex items-center gap-2">
                                <Icons.Waves className="text-slate-300" size={18} />
                                <span className="text-[10px] font-black uppercase tracking-widest">A4 Landscape Canvas</span>
                            </div>
                            <span className="text-[10px] font-black uppercase tracking-widest opacity-50">Studio Preview (Exact Output)</span>
                        </div>

                        {zonesToPrint.length === 0 && (
                            <div className="flex flex-col items-center justify-center text-slate-300 mt-40 print-hide animate-pulse">
                                <Icons.Filter size={80} className="mb-6 opacity-20" />
                                <p className="font-black uppercase tracking-widest text-xs">Select a zone to begin</p>
                            </div>
                        )}

                        {zonesToPrint.map((zone, idx) => (
                            <div key={zone.id} 
                                 className={`print-page bg-white shadow-2xl mx-auto mb-12 relative fade-in`}
                                 style={{ width: '297mm', height: '210mm', padding: '10mm 15mm', boxSizing: 'border-box', overflow: 'hidden' }}
                            >
                                {/* Brand Swoop Placeholder (Lolly Style) */}
                                <div className="absolute -bottom-10 -left-10 w-40 h-40 bg-slate-100 rounded-full opacity-50 print-hide"></div>

                                <div className="print-header mb-6 flex justify-between items-end border-b-[3px] border-slate-900 pb-5 relative z-10">
                                    <div>
                                        <h1 className="text-3xl font-black text-slate-900 tracking-tighter leading-none uppercase">
                                            Clarence Regional Aquatic Centre
                                        </h1>
                                        <div className="flex items-center gap-3 mt-3">
                                            <h2 className="text-xl font-bold text-cyan-600 uppercase tracking-widest leading-none bg-cyan-50 px-3 py-1.5 rounded-lg border border-cyan-100">
                                                {zone.id}
                                            </h2>
                                            <div className="h-4 w-[2px] bg-slate-200"></div>
                                            <p className="text-slate-500 font-black uppercase tracking-tighter text-sm leading-none">
                                                {printTypeFilter === 'all' ? 'Full Availability' : printTypeFilter}
                                            </p>
                                        </div>
                                        <p className="text-slate-400 font-bold mt-4 text-[10px] uppercase tracking-[0.2em] leading-none">
                                            WEEK COMMENCING {startOfWeek.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' })}
                                        </p>
                                    </div>
                                    
                                    <div className="flex flex-col items-end gap-4">
                                        <div className="flex items-center gap-4 p-2 bg-slate-50 rounded-2xl border border-slate-100">
                                            <div className="text-right">
                                                <p className="font-black text-slate-900 uppercase tracking-tighter text-[10px]">Live Digital View</p>
                                                <p className="text-cyan-600 font-bold text-[8px] mt-0.5 tracking-widest">CLARENCE.NSW.GOV.AU/CRAC</p>
                                            </div>
                                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent('https://www.clarence.nsw.gov.au/crac#zone-availability')}&color=0f172a`} alt="QR" className="w-10 h-10 rounded-lg grayscale hover:grayscale-0 transition-all" />
                                        </div>
                                        
                                        <div className="flex items-center gap-6">
                                            <div className="flex items-center gap-2">
                                                <span className={`w-3.5 h-3.5 rounded-full block shadow-sm ${inkSaver ? 'bg-white border-2 border-slate-300' : 'bg-green-400'}`}></span> 
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Free</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={`w-3.5 h-3.5 rounded-full block shadow-sm ${inkSaver ? 'bg-white border-2 border-slate-400 border-dashed' : 'bg-amber-400'}`}></span> 
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Part</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={`w-3.5 h-3.5 rounded-full block shadow-sm ${inkSaver ? 'bg-slate-900 border-2 border-slate-900' : 'bg-red-500'}`}></span> 
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Full</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="border-2 border-slate-900 rounded-[2rem] overflow-hidden shadow-2xl relative z-10">
                                    <table className="w-full text-sm text-left border-collapse bg-white table-fixed">
                                        <thead className="bg-slate-900 text-white uppercase font-black text-[10px] tracking-widest">
                                            <tr>
                                                <th className="w-20 text-center bg-slate-950 p-0 h-[1px] border-r border-slate-800">
                                                    <div className="w-full h-full flex flex-col items-center justify-center p-2">Time</div>
                                                </th>
                                                {daysInWeek.map(day => {
                                                    const dateStr = day.toISOString().split('T')[0];
                                                    const isHoliday = publicHolidays.includes(dateStr);
                                                    return (
                                                        <th key={day.toISOString()} className={`text-center p-0 h-[1px] border-r border-slate-800 last:border-r-0 ${isHoliday ? 'bg-orange-500/20' : ''}`} style={{width: '12%'}}>
                                                            <div className="w-full h-full flex flex-col items-center justify-center p-2 py-3">
                                                                <div className={`font-black ${isHoliday ? 'text-orange-400' : 'text-white'} text-xs leading-none`}>
                                                                    {day.toLocaleDateString('en-US', { weekday: 'short' })}
                                                                </div>
                                                                <div className={`font-bold ${isHoliday ? 'text-orange-500/60' : 'text-slate-500'} text-[9px] mt-1 opacity-80 leading-none`}>
                                                                    {day.toLocaleDateString('en-US', { day: 'numeric', month: 'short' })}
                                                                </div>
                                                            </div>
                                                        </th>
                                                    );
                                                })}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {displayHours.map((hour, rowIdx) => (
                                                <tr key={hour} className={`border-b-2 ${rowIdx === displayHours.length - 1 ? 'border-none' : 'border-slate-100'}`}>
                                                    <td className="font-black text-slate-400 text-center bg-slate-50 p-0 h-[1px] border-r-2 border-slate-100">
                                                        <div className="w-full h-full flex flex-col items-center justify-center text-[10px] uppercase tracking-tighter">
                                                            {hour === 12 ? '12 PM' : hour > 12 ? `${hour-12} PM` : `${hour} AM`}
                                                        </div>
                                                    </td>
                                                    {daysInWeek.map(day => {
                                                        const dateStr = day.toISOString().split('T')[0];
                                                        const isHoliday = publicHolidays.includes(dateStr);
                                                        const isSunday = day.getDay() === 0;
                                                        const isSaturday = day.getDay() === 6;

                                                        let isOpen = true;
                                                        if (window.CRAC_SEASON_LOGIC) {
                                                            const status = window.CRAC_SEASON_LOGIC.getOperatingStatus(day, zone.id);
                                                            if (!status.open || hour < Math.floor(status.openHour) || hour >= Math.ceil(status.closeHour)) isOpen = false;
                                                        } else {
                                                            if (isHoliday || isSunday) {
                                                                if (hour < 8 || hour >= 18) isOpen = false;
                                                            } else if (isSaturday) {
                                                                if (hour < 7 || hour >= 19) isOpen = false;
                                                            } else {
                                                                if (hour < 5 || hour >= 19) isOpen = false; 
                                                            }
                                                        }

                                                        if (!isOpen) {
                                                            return (
                                                                <td key={day.toISOString()} className="bg-slate-50/50 p-0 h-[1px] border-r-2 border-slate-50 last:border-r-0">
                                                                    <div className="p-1 w-full h-full box-border">
                                                                        <div className="print-cell-wrapper w-full h-full flex items-center justify-center rounded-xl bg-slate-100/30 text-slate-300 font-black text-[9px] uppercase tracking-widest border border-slate-100">
                                                                            Closed
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                            );
                                                        }

                                                        const cellStart = new Date(day); cellStart.setHours(hour, 0, 0, 0);
                                                        const cellEnd = new Date(day); cellEnd.setHours(hour + 1, 0, 0, 0);
                                                        
                                                        const cellEvents = weekEvents.filter(e => {
                                                            const overlapsTime = e.startDateTime < cellEnd && e.endDateTime > cellStart;
                                                            if(!overlapsTime) return false;
                                                            
                                                            const eZones = Array.isArray(e.zone) ? e.zone : [e.zone];
                                                            if (eZones.includes(zone.id)) return true;
                                                            
                                                            if (zone.children && zone.children.length > 0) {
                                                                return eZones.some(z => {
                                                                    if (z.startsWith(zone.id + ' - ')) return true;
                                                                    if (zone.children.some(c => c.id === z)) {
                                                                        if (eZones.includes(zone.id)) return true; 
                                                                        if (childToParentMap[z] === zone.id) return true; 
                                                                    }
                                                                    return false;
                                                                });
                                                            }
                                                            return false;
                                                        });

                                                        let isFullyBooked = false;
                                                        let bookedLanes = new Set();
                                                        let mainEventTitle = "";

                                                        cellEvents.forEach(e => {
                                                            const eZones = Array.isArray(e.zone) ? e.zone : [e.zone];
                                                            if (eZones.includes(zone.id)) {
                                                                isFullyBooked = true;
                                                                if(!mainEventTitle) { mainEventTitle = e.title; }
                                                            } else {
                                                                eZones.forEach(z => {
                                                                    if(zone.children?.some(c => c.id === z || z === `${zone.id} - ${c.id}`)) {
                                                                        bookedLanes.add(z);
                                                                    }
                                                                });
                                                            }
                                                        });

                                                        const totalChildren = zone.children?.length || 0;
                                                        if (totalChildren > 0 && bookedLanes.size >= totalChildren) {
                                                            isFullyBooked = true;
                                                        }

                                                        let bgClass = "bg-green-50";
                                                        let borderClass = "border-green-100"; 
                                                        let textContent = <span className="text-green-700 font-black uppercase tracking-widest text-[9px]">Free</span>;

                                                        if (isFullyBooked) {
                                                            bgClass = "bg-red-50";
                                                            borderClass = "border-red-200";
                                                            textContent = (
                                                                <div className="flex flex-col items-center justify-center text-center">
                                                                    <span className="text-red-900 font-black leading-tight px-1 uppercase text-[8px]" style={{ display: '-webkit-box', WebkitLineClamp: '2', WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{mainEventTitle || 'Fully Booked'}</span>
                                                                </div>
                                                            );
                                                        } else if (totalChildren > 0 && bookedLanes.size > 0) {
                                                            bgClass = "bg-amber-50";
                                                            borderClass = "border-amber-200";
                                                            textContent = (
                                                                <div className="flex flex-col items-center justify-center text-center leading-tight">
                                                                    <span className="text-amber-900 font-black uppercase text-[9px] tracking-tighter">{totalChildren - bookedLanes.size} Available</span>
                                                                    <span className="text-amber-700/60 text-[7px] uppercase font-black tracking-[0.2em] mt-0.5">{zone.id === 'Program Pool' ? 'Zones' : 'Lanes'}</span>
                                                                </div>
                                                            );
                                                        } else if (cellEvents.length > 0) {
                                                            bgClass = "bg-amber-50";
                                                            borderClass = "border-amber-200";
                                                            textContent = (
                                                                <div className="flex flex-col items-center justify-center text-center">
                                                                    <span className="text-amber-900 font-black leading-tight px-1 uppercase text-[8px]" style={{ display: '-webkit-box', WebkitLineClamp: '2', WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{cellEvents[0].title}</span>
                                                                </div>
                                                            );
                                                        }

                                                        return (
                                                            <td key={day.toISOString()} className="p-0 h-[1px] border-r-2 border-slate-100 last:border-r-0">
                                                                <div className="p-1 w-full h-full box-border">
                                                                    <div className={`print-cell-wrapper w-full h-full flex flex-col items-center justify-center rounded-xl border ${borderClass} ${bgClass} leading-tight shadow-sm`}>
                                                                        {textContent}
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="print-footer mt-5 pt-4 border-t-2 border-slate-100 flex justify-between items-center relative z-10">
                                    <div className="text-slate-400 font-black tracking-widest uppercase text-[9px]">
                                        *All times subject to change • Verified against Master Calendar
                                    </div>
                                    <div className="text-cyan-600 font-black tracking-[0.3em] uppercase text-[9px]">
                                        
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="../nav.js" data-title="Print Studio" data-icon="ph-printer" data-help="Generate high-resolution, printable lane charts and centre schedules. This tool pulls data from the official calendars and formats it specifically for A3 or A4 paper, ensuring staff have clear physical copies of the day's bookings on the pool deck."></script>
</body>
</html>
