<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAC Zone Availability</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and Firebase Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .custom-scrollbar { scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
        .wave-path { transform-origin: center; }
        .wave-path:nth-child(1) { animation: wavePulse 1.5s infinite ease-in-out 0s; }
        .wave-path:nth-child(2) { animation: wavePulse 1.5s infinite ease-in-out 0.2s; }
        .wave-path:nth-child(3) { animation: wavePulse 1.5s infinite ease-in-out 0.4s; }
        @keyframes wavePulse { 0%, 100% { opacity: 0.4; transform: scaleY(0.8); } 50% { opacity: 1; transform: scaleY(1.2); } }

        @media print {
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-full-height { height: auto !important; max-height: none !important; overflow: visible !important; }
            .print-full-width { width: 100% !important; max-width: none !important; grid-column: span 12 !important; }
            .print-break-inside-avoid { page-break-inside: avoid; break-inside: avoid; }
            ::-webkit-scrollbar { display: none; }
            .shadow-sm, .border { box-shadow: none !important; border-color: #e2e8f0 !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <div id="root"></div>

    <script src="seasonLogic.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- TRACKING UTILITY ---
        const SESSION_ID = Math.random().toString(36).substring(2, 15);
        const trackEvent = async (action, label = null, data = {}) => {
            if (!db) return;
            try {
                await db.collection('calendar_logs').add({
                    sessionId: SESSION_ID,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    action: action,
                    label: label,
                    data: data,
                    referrer: document.referrer || "direct",
                    userAgent: navigator.userAgent,
                    url: window.location.href
                });
            } catch (e) {
                console.warn("Tracking failed:", e);
            }
        };

        // --- HELPER: TIMEZONE HANDLING ---
        const getGraftonDate = () => {
            const now = new Date();
            const graftonString = now.toLocaleString("en-US", {timeZone: "Australia/Sydney"});
            return new Date(graftonString);
        };

        // --- ICONS COMPONENT ---
        const Icons = {
            ChevronLeft: ({ size = 20 }) => <i className={`ph ph-caret-left`} style={{ fontSize: size }}></i>,
            ChevronRight: ({ size = 20 }) => <i className={`ph ph-caret-right`} style={{ fontSize: size }}></i>,
            Calendar: ({ size = 20 }) => <i className={`ph ph-calendar-blank`} style={{ fontSize: size }}></i>,
            CalendarBlank: ({ size = 20, className = "" }) => <i className={`ph ph-calendar-blank ${className}`} style={{ fontSize: size }}></i>,
            Clock: ({ size = 20 }) => <i className={`ph ph-clock`} style={{ fontSize: size }}></i>,
            MapPin: ({ size = 20 }) => <i className={`ph ph-map-pin`} style={{ fontSize: size }}></i>,
            Waves: ({ size = 20 }) => <i className={`ph ph-waves`} style={{ fontSize: size }}></i>,
            CheckCircle: ({ size = 20, className = "" }) => <i className={`ph ph-check-circle ${className}`} style={{ fontSize: size }}></i>,
            Check: ({ size = 20, className = "" }) => <i className={`ph ph-check ${className}`} style={{ fontSize: size }}></i>,
            X: ({ size = 20 }) => <i className={`ph ph-x`} style={{ fontSize: size }}></i>,
            AlertCircle: ({ size = 20, className="" }) => <i className={`ph ph-warning-circle ${className}`} style={{ fontSize: size }}></i>,
            LockKey: ({ size = 20, className="" }) => <i className={`ph ph-lock-key ${className}`} style={{ fontSize: size }}></i>
        };

        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAF44-oMKqTKPcMgOuKfJJqUTJz9JYTHAg",
            authDomain: "osf---availability-roster.firebaseapp.com",
            projectId: "osf---availability-roster",
            storageBucket: "osf---availability-roster.firebasestorage.app",
            messagingSenderId: "1069751236100",
            appId: "1:1069751236100:web:2832210ad7e9ed50e86751",
            measurementId: "G-K5F1SSNK5H"
        };

        let db, auth;
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (e) {
            console.error("Firebase Initialization Error:", e);
        }

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [events, setEvents] = useState([]);
            const [settings, setSettings] = useState(null); 
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            
            const [currentMonth, setCurrentMonth] = useState(getGraftonDate());
            const [selectedDay, setSelectedDay] = useState(getGraftonDate());
            
            const [selectedEvent, setSelectedEvent] = useState(null);
            const [zoneFilter, setZoneFilter] = useState('All Zones');
            const [viewMode, setViewMode] = useState(window.innerWidth < 1024 ? 'day' : 'week'); 

            // Responsive Layout State
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            useEffect(() => {
                const handleResize = () => {
                    const mobile = window.innerWidth < 768;
                    setIsMobile(mobile);
                    setViewMode(prev => {
                        if (mobile && prev === 'week') return 'day';
                        if (!mobile && prev === 'day') return 'week';
                        return prev;
                    });
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const isFirstRender = useRef(true);

            const activeZoneId = useMemo(() => {
                if (zoneFilter === 'All Zones') return 'All Zones';
                if (settings) {
                    const found = settings.zones.find(z => z.id === zoneFilter || z.children?.some(c => c.id === zoneFilter));
                    if (found) return found.id;
                }
                return settings?.zones?.[0]?.id || '50m Pool';
            }, [zoneFilter, settings]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                        trackEvent('PAGE_LOAD');
                    } catch (err) {
                        console.error("Auth Error:", err);
                        setError("Connection lost.");
                        setIsLoading(false);
                    }
                };
                initAuth();
                return auth.onAuthStateChanged(u => setUser(u));
            }, []);

            useEffect(() => {
                if (!db) return;
                const unsub = db.collection('calendar_settings').doc('main_config')
                    .onSnapshot(doc => { if (doc.exists) setSettings(doc.data()); }, err => console.error(err));
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const unsub = db.collection('calendar_events').onSnapshot(snapshot => {
                    const fetched = snapshot.docs.map(doc => {
                        const data = doc.data();
                        return {
                            id: doc.id,
                            ...data,
                            startDateTime: data.startDateTime?.toDate ? data.startDateTime.toDate() : new Date(data.startDateTime),
                            endDateTime: data.endDateTime?.toDate ? data.endDateTime.toDate() : new Date(data.endDateTime),
                            recurrence: data.recurrence ? {
                                ...data.recurrence,
                                endDate: data.recurrence.endDate?.toDate ? data.recurrence.endDate.toDate() : new Date(data.recurrence.endDate)
                            } : null
                        };
                    });
                    setEvents(fetched);
                    setIsLoading(false);
                }, err => { console.error(err); setIsLoading(false); });
                return () => unsub();
            }, [user]);

            const expandedEvents = useMemo(() => {
                const all = [];
                events.forEach(event => {
                    if (event.recurrence && event.recurrence.days && event.recurrence.endDate) {
                        let current = new Date(event.startDateTime); current.setHours(0,0,0,0);
                        const end = new Date(event.recurrence.endDate);
                        const startH = event.startDateTime.getHours(), startM = event.startDateTime.getMinutes();
                        const dur = event.endDateTime.getTime() - event.startDateTime.getTime();
                        while(current <= end) {
                            if (event.recurrence.days.includes(current.toLocaleDateString('en-US', { weekday: 'long' }))) {
                                const s = new Date(current); s.setHours(startH, startM, 0, 0);
                                all.push({ ...event, id: `${event.id}-${current.toISOString()}`, startDateTime: s, endDateTime: new Date(s.getTime() + dur) });
                            }
                            current.setDate(current.getDate() + 1);
                        }
                    } else all.push(event);
                });
                return all;
            }, [events]);

            const filteredEvents = useMemo(() => {
                if (zoneFilter === 'All Zones') return expandedEvents;
                const relevantIds = [zoneFilter];
                const p = settings.zones.find(z => z.id === zoneFilter);
                if (p?.children) p.children.forEach(c => relevantIds.push(c.id));
                return expandedEvents.filter(e => {
                    const eZones = Array.isArray(e.zone) ? e.zone : [e.zone];
                    return eZones.some(z => relevantIds.includes(z));
                });
            }, [expandedEvents, zoneFilter, settings]);

            const eventsByDate = useMemo(() => {
                const acc = {};
                filteredEvents.forEach(e => {
                    const k = e.startDateTime.toDateString();
                    if(!acc[k]) acc[k] = []; acc[k].push(e);
                });
                return acc;
            }, [filteredEvents]);

            const selectedDayEvents = useMemo(() => eventsByDate[selectedDay.toDateString()] || [], [eventsByDate, selectedDay]);

            const zoneForecast = useMemo(() => {
                if (!settings?.zones) return [];
                const dayEvents = expandedEvents.filter(e => e.startDateTime.toDateString() === selectedDay.toDateString());
                const nowTs = new Date().getTime();
                const isToday = selectedDay.toDateString() === getGraftonDate().toDateString();

                return settings.zones.map(zone => {
                    const totalCap = zone.children?.length || 1;
                    const relevantEvents = dayEvents.filter(e => {
                        const eZones = Array.isArray(e.zone) ? e.zone : [e.zone];
                        return eZones.some(z => z === zone.id || zone.children?.some(c => c.id === z));
                    });

                    let maxUsed = 0, currentUsed = 0;
                    if (isToday) {
                        currentUsed = relevantEvents.filter(e => e.startDateTime.getTime() <= nowTs && e.endDateTime.getTime() > nowTs).length;
                    }
                    const timePoints = new Set();
                    relevantEvents.forEach(e => { timePoints.add(e.startDateTime.getTime()); timePoints.add(e.endDateTime.getTime()); });
                    const sorted = Array.from(timePoints).sort((a,b) => a-b);
                    for (let i = 0; i < sorted.length - 1; i++) {
                        const mid = (sorted[i] + sorted[i+1]) / 2;
                        const count = relevantEvents.filter(e => e.startDateTime.getTime() <= mid && e.endDateTime.getTime() > mid).length;
                        if (count > maxUsed) maxUsed = count;
                    }

                    const free = totalCap - (isToday ? currentUsed : maxUsed);
                    let status = 'Good';
                    if (free === 0) status = 'Full';
                    else if (free < totalCap * 0.5) status = 'Limited';

                    return { name: zone.id, free, total: totalCap, status, isToday };
                });
            }, [expandedEvents, settings, selectedDay]);

            if (isLoading || !settings) return (
                <div className="flex items-center justify-center h-[400px] flex-col text-slate-400">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500 mb-4">
                        <path className="wave-path" d="M2 6c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path className="wave-path" d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path className="wave-path" d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                    </svg>
                    <p className="text-xs font-black uppercase tracking-widest animate-pulse">Syncing Facility Data...</p>
                </div>
            );

            return (
                <div className="p-3 max-w-7xl mx-auto text-slate-800">
                    {/* Integrated Hub Command Strip - Balanced for Readability */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 mb-4 flex flex-col md:flex-row items-center gap-4 no-print">
                        <div className="flex items-center gap-3 border-r border-slate-100 pr-4 mr-1">
                            <div className="flex bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => setViewMode('month')} className={`px-4 py-1.5 rounded-md text-xs font-black uppercase tracking-tight transition-all ${viewMode === 'month' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Month</button>
                                {isMobile ? (
                                    <button onClick={() => setViewMode('day')} className={`px-4 py-1.5 rounded-md text-xs font-black uppercase tracking-tight transition-all ${viewMode === 'day' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Day</button>
                                ) : (
                                    <button onClick={() => setViewMode('week')} className={`px-4 py-1.5 rounded-md text-xs font-black uppercase tracking-tight transition-all ${viewMode === 'week' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Week</button>
                                )}
                            </div>
                        </div>

                        <div className="flex items-center gap-3 bg-slate-50 px-3 py-2 rounded-lg border border-slate-100">
                            <button onClick={() => {
                                if(viewMode === 'month') { const d = new Date(currentMonth); d.setMonth(d.getMonth()-1); setCurrentMonth(d); }
                                else if(viewMode === 'day') { const d = new Date(selectedDay); d.setDate(d.getDate()-1); setSelectedDay(d); }
                                else { const d = new Date(selectedDay); d.setDate(d.getDate()-7); setSelectedDay(d); }
                            }} className="p-1 text-slate-400 hover:text-blue-600 transition-colors"><Icons.ChevronLeft size={18} /></button>
                            <div className="flex flex-col items-center justify-center min-w-[140px]">
                                <span className="text-[13px] font-black uppercase tracking-tight text-slate-900 leading-tight">
                                    {viewMode === 'month' ? currentMonth.toLocaleString('default', { month: 'long', year: 'numeric' }) : `${selectedDay.getDate()} ${selectedDay.toLocaleString('default', { month: 'short' })}`}
                                </span>
                                {window.CRAC_SEASON_LOGIC && (
                                    <span className={`text-[9px] font-bold uppercase tracking-widest mt-0.5 ${window.CRAC_SEASON_LOGIC.getSeason(selectedDay) === 'REGULAR' ? 'text-green-600' : 'text-blue-500'}`}>
                                        {window.CRAC_SEASON_LOGIC.getSeason(selectedDay) === 'REGULAR' ? 'Regular Season' : 'Off-Peak Season'}
                                    </span>
                                )}
                            </div>
                            <button onClick={() => {
                                if(viewMode === 'month') { const d = new Date(currentMonth); d.setMonth(d.getMonth()+1); setCurrentMonth(d); }
                                else if(viewMode === 'day') { const d = new Date(selectedDay); d.setDate(d.getDate()+1); setSelectedDay(d); }
                                else { const d = new Date(selectedDay); d.setDate(d.getDate()+7); setSelectedDay(d); }
                            }} className="p-1 text-slate-400 hover:text-blue-600 transition-colors"><Icons.ChevronRight size={18} /></button>
                        </div>

                        {/* Interactive Status Pills (Tabs) - More Informative */}
                        <div className="flex flex-wrap items-center gap-2 flex-grow justify-center md:justify-start">
                            {zoneForecast.filter(z => z.name.toLowerCase().includes('pool')).map(z => {
                                const isActive = zoneFilter === z.name;
                                const unit = z.name.toLowerCase().includes('program') ? 'Zones' : 'Lanes';
                                const colors = { 
                                    Good: 'bg-green-50 text-green-800 border-green-200', 
                                    Limited: 'bg-amber-50 text-amber-800 border-amber-200', 
                                    Full: 'bg-red-50 text-red-800 border-red-200' 
                                };
                                return (
                                    <button 
                                        key={z.name} 
                                        onClick={() => setZoneFilter(prev => prev === z.name ? 'All Zones' : z.name)}
                                        className={`px-4 py-2 rounded-xl border-2 flex items-center gap-3 transition-all active:scale-95 ${isActive ? 'bg-blue-600 text-white border-blue-600 shadow-md ring-4 ring-blue-100' : colors[z.status] + ' hover:bg-white'}`}
                                    >
                                        <div className="flex items-center justify-center">
                                            {isActive ? (
                                                <div className="bg-white/20 p-1 rounded-full"><Icons.Check size={12} className="text-white" /></div>
                                            ) : (
                                                <div className={`w-2.5 h-2.5 rounded-full shadow-sm ${
                                                    z.status === 'Good' ? 'bg-green-500' :
                                                    z.status === 'Limited' ? 'bg-amber-500' :
                                                    'bg-red-500'
                                                }`}></div>
                                            )}
                                        </div>
                                        <div className="flex flex-col items-start leading-none text-left">
                                            <span className="text-[11px] font-black uppercase tracking-tight">{z.name}</span>
                                            <span className={`text-[10px] font-bold mt-0.5 ${isActive ? 'text-blue-100' : 'text-slate-500'}`}>{z.free} {unit} Free</span>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    <div className="flex flex-col lg:grid lg:grid-cols-12 lg:gap-4 h-[600px] lg:h-[650px] print-full-height">
                        <div className="lg:col-span-8 overflow-hidden h-full flex flex-col print-full-width print-full-height">
                            {viewMode === 'month' ? (
                                <div className="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 overflow-y-auto overflow-x-auto"><CalendarPanel currentMonth={currentMonth} eventsByDate={eventsByDate} selectedDay={selectedDay} onDayClick={(day) => { setSelectedDay(day); if (isMobile) setViewMode('day'); }} /></div>
                            ) : viewMode === 'day' ? (
                                <div className="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                    <DailyAgendaPanel selectedDay={selectedDay} events={selectedDayEvents} onEventClick={setSelectedEvent} eventTypes={settings.eventTypes} activeZoneId={activeZoneId} />
                                </div>
                            ) : (
                                <div className="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col"><WeekView selectedDay={selectedDay} eventsByDate={eventsByDate} onDayClick={setSelectedDay} settings={settings} expandedEvents={expandedEvents} activeZoneId={activeZoneId} /></div>
                            )}
                        </div>
                        {!isMobile && (
                            <div className="lg:col-span-4 h-full no-print">
                                <DailyAgendaPanel selectedDay={selectedDay} events={selectedDayEvents} onEventClick={setSelectedEvent} eventTypes={settings.eventTypes} activeZoneId={activeZoneId} />
                            </div>
                        )}
                    </div>

                    {selectedEvent && <EventModal event={selectedEvent} onClose={() => setSelectedEvent(null)} eventTypes={settings.eventTypes} />}
                </div>
            );
        };

        // --- SUB-COMPONENTS ---

        const WeekView = ({ selectedDay, eventsByDate, onDayClick, settings, expandedEvents, activeZoneId }) => {
            const daysInWeek = useMemo(() => {
                const days = []; const start = new Date(selectedDay); const day = start.getDay() === 0 ? 7 : start.getDay();
                start.setDate(start.getDate() - day + 1);
                for (let i = 0; i < 7; i++) { const d = new Date(start); d.setDate(start.getDate() + i); days.push(d); }
                return days;
            }, [selectedDay]);

            const displayHours = useMemo(() => {
                let min = 6, max = 19;
                if (window.CRAC_SEASON_LOGIC) {
                    const limits = window.CRAC_SEASON_LOGIC.getDisplayHoursLimits(selectedDay);
                    min = limits.min; max = limits.max;
                } else if (settings?.openingHours?.length > 0) {
                    min = Math.min(...settings.openingHours.map(h => h.open));
                    max = Math.max(...settings.openingHours.map(h => h.close));
                }
                const hrs = []; for(let i = min; i < max; i++) hrs.push(i); return hrs;
            }, [settings, selectedDay]);

            const isAllZones = activeZoneId === 'All Zones';
            const zone = isAllZones ? settings.zones[0] : settings.zones.find(z => z.id === activeZoneId) || settings.zones[0];
            const unitName = zone.id.toLowerCase().includes('program') ? 'Zones' : 'Lanes';

            const getAbbr = (id) => {
                const lower = id.toLowerCase();
                if (lower.includes('50m')) return '50M';
                if (lower.includes('program')) return 'PRG';
                if (lower.includes('25m')) return '25M';
                return id.substring(0, 3).toUpperCase();
            };

            return (
                <>
                    <div className="bg-slate-900 text-white p-3 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-1.5 rounded-lg"><Icons.Waves size={16} /></div>
                            <span className="text-xs font-black uppercase tracking-widest">{isAllZones ? 'Facility' : zone.id} Weekly Schedule</span>
                        </div>
                        <div className="flex gap-4 pr-2">
                            <div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-green-500"></div><span className="text-[10px] font-black uppercase text-slate-400">Free</span></div>
                            <div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-amber-500"></div><span className="text-[10px] font-black uppercase text-slate-400">Part</span></div>
                            <div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-red-500"></div><span className="text-[10px] font-black uppercase text-slate-400">Full</span></div>
                        </div>
                    </div>
                    <div className="overflow-y-auto overflow-x-auto custom-scrollbar flex-grow bg-white snap-x snap-mandatory">
                        <table className="w-full text-left border-collapse table-fixed min-w-[800px] md:min-w-0 w-full">
                            <thead className="bg-slate-50 border-b border-slate-200 sticky top-0 z-20 text-slate-800">
                                <tr>
                                    <th className="w-20 p-0 align-top text-center border-r border-slate-100">
                                        <div className="p-3 pb-2 text-[10px] font-black uppercase text-slate-400">Time</div>
                                    </th>
                                    {daysInWeek.map(day => (
                                        <th key={day.toISOString()} className={`p-0 align-top text-center border-r border-slate-100 last:border-r-0 ${day.toDateString() === new Date().toDateString() ? 'bg-blue-50/50' : ''}`}>
                                            <div className="p-3 pb-2">
                                                <div className="text-[10px] font-black uppercase text-slate-400 leading-none mb-1">{day.toLocaleDateString('en-AU', { weekday: 'short' })}</div>
                                                <div className="text-[11px] font-black text-slate-900">{day.getDate()} {day.toLocaleDateString('en-AU', { month: 'short' })}</div>
                                            </div>
                                            {isAllZones && (
                                                <div className="flex flex-row w-full px-1 pb-1 pt-0 gap-0.5 border-t border-slate-100/50 mt-auto">
                                                    {settings.zones.filter(z => !z.id.toLowerCase().includes('slide')).map(z => {
                                                        const shortName = z.id.replace(/ pool/i, '').replace('50m', '50M');
                                                        return (
                                                            <div key={z.id} className="flex-1 text-[8px] font-black text-slate-400/80 uppercase truncate pt-1" title={z.id}>
                                                                {shortName.substring(0, 3)}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {displayHours.map((hour, hourIndex) => (
                                    <tr key={hour} className="group">
                                        <td className="p-2 text-center bg-slate-50/50 border-r border-slate-100 text-[10px] font-bold text-slate-400">{hour === 12 ? '12 PM' : hour > 12 ? `${hour-12} PM` : `${hour} AM`}</td>
                                        {daysInWeek.map(day => {
                                            const cellStart = new Date(day); cellStart.setHours(hour, 0, 0, 0);
                                            const cellEnd = new Date(day); cellEnd.setHours(hour + 1, 0, 0, 0);
                                            
                                            if (isAllZones) {
                                                let facDayClosed = false;
                                                let facHourClosed = false;
                                                let facReason = 'Closed';
                                                if (window.CRAC_SEASON_LOGIC) {
                                                    const status = window.CRAC_SEASON_LOGIC.getOperatingStatus(day, 'all');
                                                    if (!status.open) { facDayClosed = true; facReason = status.reason || 'Closed'; }
                                                    else if (hour < Math.floor(status.openHour) || hour >= Math.ceil(status.closeHour)) facHourClosed = true;
                                                }
                                                
                                                if (facDayClosed) {
                                                    if (hourIndex === 0) {
                                                        return (
                                                            <td key={day.toISOString()} rowSpan={displayHours.length} className="p-2 border-r border-slate-50 bg-slate-50/30 align-middle">
                                                                <div className="flex flex-col items-center justify-center text-center h-full min-h-[200px]">
                                                                    <Icons.LockKey size={24} className="mb-2 text-slate-300" />
                                                                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest leading-relaxed break-words">{facReason}</span>
                                                                </div>
                                                            </td>
                                                        );
                                                    }
                                                    return null;
                                                }

                                                if (facHourClosed) {
                                                    return <td key={day.toISOString()} className="p-1 border-r border-slate-50 bg-slate-50/30"><div className="h-7 flex items-center justify-center text-[9px] font-black uppercase text-slate-300 tracking-widest">Closed</div></td>;
                                                }
                                                
                                                return (
                                                    <td key={day.toISOString()} onClick={() => onDayClick(day)} className="p-1 border-r border-slate-50 cursor-pointer hover:bg-slate-50 transition-all">
                                                        <div className="flex flex-row gap-0.5 h-full min-h-[28px] w-full">
                                                            {settings.zones.filter(z => !z.id.toLowerCase().includes('slide')).map(z => {
                                                                let zOpen = true;
                                                                if (window.CRAC_SEASON_LOGIC) {
                                                                    const st = window.CRAC_SEASON_LOGIC.getOperatingStatus(day, z.id);
                                                                    if (!st.open || hour < Math.floor(st.openHour) || hour >= Math.ceil(st.closeHour)) zOpen = false;
                                                                } else {
                                                                    const isSun = day.getDay() === 0, isSat = day.getDay() === 6;
                                                                    if (isSun && (hour < 8 || hour >= 18)) zOpen = false;
                                                                    else if (isSat && (hour < 7 || hour >= 19)) zOpen = false;
                                                                    else if (hour < 5 || hour >= 19) zOpen = false;
                                                                }
                                                                
                                                                if (!zOpen) {
                                                                    return <div key={z.id} title={`${z.id} - Closed`} className="flex-1 flex items-center justify-center rounded bg-slate-100/80 text-slate-400 text-[10px] font-black tracking-widest uppercase overflow-hidden"><span>-</span></div>;
                                                                }
                                                                
                                                                const cEvents = expandedEvents.filter(e => (e.startDateTime < cellEnd && e.endDateTime > cellStart) && (Array.isArray(e.zone) ? e.zone : [e.zone]).some(ez => ez === z.id || z.children?.some(c => c.id === ez)));
                                                                let bUnits = new Set();
                                                                cEvents.forEach(e => {
                                                                    const eZones = Array.isArray(e.zone) ? e.zone : [e.zone];
                                                                    if (eZones.includes(z.id)) z.children?.forEach(c => bUnits.add(c.id));
                                                                    else eZones.forEach(ez => { if(z.children?.some(c => c.id === ez)) bUnits.add(ez); });
                                                                });
                                                                
                                                                const tCap = z.children?.length || 1;
                                                                const freeCount = tCap - bUnits.size;
                                                                
                                                                let bgc = "bg-green-100 text-green-700";
                                                                let lbl = freeCount.toString();
                                                                if (bUnits.size >= tCap) {
                                                                    bgc = "bg-red-500 text-white shadow-inner";
                                                                    lbl = "0";
                                                                } else if (bUnits.size > 0 || cEvents.length > 0) {
                                                                    bgc = "bg-amber-100 text-amber-800";
                                                                }
                                                                
                                                                return <div key={z.id} title={`${z.id} - ${lbl} Free`} className={`flex-1 flex items-center justify-center rounded text-[11px] font-black uppercase overflow-hidden transition-all hover:opacity-80 ${bgc}`}><span>{lbl}</span></div>;
                                                            })}
                                                        </div>
                                                    </td>
                                                );
                                            }

                                            // Default single zone logic
                                            let open = true;
                                            let dayClosed = false;
                                            let dayReason = 'Closed';
                                            
                                            if (window.CRAC_SEASON_LOGIC) {
                                                const status = window.CRAC_SEASON_LOGIC.getOperatingStatus(day, zone.id);
                                                if (!status.open) {
                                                    dayClosed = true;
                                                    open = false;
                                                    dayReason = status.reason || 'Closed';
                                                } else if (hour < Math.floor(status.openHour) || hour >= Math.ceil(status.closeHour)) {
                                                    open = false;
                                                }
                                            } else {
                                                const isSun = day.getDay() === 0, isSat = day.getDay() === 6;
                                                if (isSun && (hour < 8 || hour >= 18)) open = false;
                                                else if (isSat && (hour < 7 || hour >= 19)) open = false;
                                                else if (hour < 5 || hour >= 19) open = false;
                                            }

                                            if (dayClosed) {
                                                if (hourIndex === 0) {
                                                    return (
                                                        <td key={day.toISOString()} rowSpan={displayHours.length} className="p-2 border-r border-slate-50 bg-slate-50/30 align-middle">
                                                            <div className="flex flex-col items-center justify-center text-center h-full min-h-[200px]">
                                                                <Icons.LockKey size={24} className="mb-2 text-slate-300" />
                                                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest leading-relaxed break-words">{dayReason}</span>
                                                            </div>
                                                        </td>
                                                    );
                                                }
                                                return null;
                                            }

                                            if (!open) return <td key={day.toISOString()} className="p-1 border-r border-slate-50 bg-slate-50/30"><div className="h-7 flex items-center justify-center text-[9px] font-black uppercase text-slate-300 tracking-widest">Closed</div></td>;
 
                                            const cellEvents = expandedEvents.filter(e => (e.startDateTime < cellEnd && e.endDateTime > cellStart) && (Array.isArray(e.zone) ? e.zone : [e.zone]).some(z => z === zone.id || zone.children?.some(c => c.id === z)));
                                            let bookedUnits = new Set();
                                            cellEvents.forEach(e => {
                                                const eZones = Array.isArray(e.zone) ? e.zone : [e.zone];
                                                if (eZones.includes(zone.id)) zone.children?.forEach(c => bookedUnits.add(c.id));
                                                else eZones.forEach(z => { if(zone.children?.some(c => c.id === z)) bookedUnits.add(z); });
                                            });
                                            
                                            const totalCap = zone.children?.length || 1;
                                            
                                            // Compute booked duration to check for partial booking when totalCap === 1
                                            const intervals = cellEvents.map(e => ({
                                                start: Math.max(e.startDateTime.getTime(), cellStart.getTime()),
                                                end: Math.min(e.endDateTime.getTime(), cellEnd.getTime())
                                            })).sort((a, b) => a.start - b.start);

                                            const merged = [];
                                            if (intervals.length > 0) {
                                                let current = intervals[0];
                                                for (let i = 1; i < intervals.length; i++) {
                                                    const next = intervals[i];
                                                    if (next.start <= current.end) {
                                                        current.end = Math.max(current.end, next.end);
                                                    } else {
                                                        merged.push(current);
                                                        current = next;
                                                    }
                                                }
                                                merged.push(current);
                                            }
                                            const totalBookedMs = merged.reduce((sum, interval) => sum + (interval.end - interval.start), 0);

                                            const isFull = totalCap === 1 
                                                ? totalBookedMs >= 3600000 
                                                : bookedUnits.size >= totalCap;

                                            let bg = "bg-green-500/10 text-green-700 border-green-200/50"; 
                                            let label = "Free";

                                            if (isFull) { 
                                                bg = "bg-red-500 text-white border-red-600 shadow-sm"; 
                                                label = "Full"; 
                                            } else if (bookedUnits.size > 0 || cellEvents.length > 0) { 
                                                bg = "bg-amber-500/10 text-amber-800 border-amber-200/50"; 
                                                if (totalCap === 1) {
                                                    label = "Limited";
                                                } else {
                                                    const freeCount = totalCap - bookedUnits.size;
                                                    const isProgram = zone.id.toLowerCase().includes('program');
                                                    if (freeCount === 1) {
                                                        label = isProgram ? "1 Zone" : "1 Lane";
                                                    } else {
                                                        label = isProgram ? `${freeCount} Zones` : `${freeCount} Lanes`;
                                                    }
                                                }
                                            }
                                            
                                            return (
                                                <td key={day.toISOString()} onClick={() => onDayClick(day)} className="p-1 border-r border-slate-50 cursor-pointer hover:bg-slate-50 transition-all">
                                                    <div className={`h-7 rounded-lg border flex flex-col items-center justify-center transition-all ${bg}`}><span className="text-[10px] font-black uppercase tracking-tighter">{label}</span></div>
                                                </td>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </>
            );
        };

        const CalendarPanel = React.memo(({ currentMonth, eventsByDate, onDayClick, selectedDay }) => {
            const days = useMemo(() => {
                const start = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
                const end = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
                const startDate = new Date(start); startDate.setDate(start.getDate() - start.getDay());
                const endDate = new Date(end); endDate.setDate(end.getDate() + (6 - end.getDay()));
                const arr = []; let d = new Date(startDate);
                while(d <= endDate) { arr.push(new Date(d)); d.setDate(d.getDate() + 1); }
                return arr;
            }, [currentMonth]);

            return (
                <div className="grid grid-cols-7 border-collapse h-full min-w-[500px] md:min-w-0">
                    {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (<div key={day} className="py-3 text-center text-xs font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-slate-50/50">{day}</div>))}
                    {days.map(day => {
                        const isSelected = day.toDateString() === selectedDay.toDateString(), isCurrentMonth = day.getMonth() === currentMonth.getMonth(), isToday = day.toDateString() === new Date().toDateString();
                        const dayEvents = eventsByDate[day.toDateString()] || [], hasEvents = dayEvents.length > 0;
                        return (
                            <div key={day.toISOString()} onClick={() => onDayClick(day)} className={`min-h-[100px] bg-white hover:bg-blue-50/30 cursor-pointer p-2 flex flex-col justify-between border-r border-b border-slate-50 transition-colors ${!isCurrentMonth ? 'bg-slate-50/30' : ''} ${isSelected ? 'bg-blue-50 ring-2 ring-inset ring-blue-500 z-10 relative shadow-sm' : ''}`}>
                                <span className={`text-[13px] font-black w-8 h-8 flex items-center justify-center rounded-full ${isToday ? 'bg-blue-600 text-white' : isCurrentMonth ? 'text-slate-800' : 'text-slate-300'}`}>{day.getDate()}</span>
                                <div className="mt-1 flex flex-wrap gap-1">{dayEvents.slice(0, 4).map((_, i) => <div key={i} className="w-2 h-2 rounded-full bg-blue-400 font-bold opacity-60"></div>)}{dayEvents.length > 4 && <span className="text-[10px] text-slate-400">+</span>}</div>
                            </div>
                        );
                    })}
                </div>
            );
        });

        const DailyAgendaPanel = ({ selectedDay, events, onEventClick, eventTypes, activeZoneId }) => {
            const sorted = [...events].sort((a,b) => a.startDateTime - b.startDateTime);
            
            const formatTime = (dt) => dt.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            
            const truncateText = (text, maxLength = 80) => {
                if (!text) return "";
                return text.length > maxLength ? text.substring(0, maxLength) + "..." : text;
            };

            const status = window.CRAC_SEASON_LOGIC?.getOperatingStatus(selectedDay, activeZoneId);
            const isClosed = status && !status.open;

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden h-full text-slate-800">
                    <div className="p-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between text-slate-800">
                        <div className="flex items-center gap-3 text-slate-800">
                            <div className="bg-blue-100 text-blue-600 p-1.5 rounded-lg text-slate-800">
                                <Icons.Calendar size={18} />
                            </div>
                            <span className="text-xs font-black uppercase tracking-widest text-slate-900 text-slate-800">Daily Agenda</span>
                        </div>
                        <span className="text-xs font-black bg-slate-200 text-slate-600 px-2.5 py-0.5 rounded-full text-slate-800">{events.length}</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 custom-scrollbar bg-white text-slate-800">
                        {isClosed ? (
                            <div className="h-full flex flex-col items-center justify-center py-12 text-slate-400">
                                <Icons.LockKey size={48} className="mb-4 text-slate-200" />
                                <p className="text-sm font-bold uppercase tracking-widest text-slate-400 text-center">{status.reason || 'Closed'}</p>
                            </div>
                        ) : sorted.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-center p-8 opacity-30 text-slate-800">
                                <Icons.CheckCircle size={48} className="text-slate-300" />
                                <p className="text-xs font-black uppercase tracking-[0.2em] mt-4 text-slate-800">Clear Schedule</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {sorted.map(event => {
                                    const timeRange = `${formatTime(event.startDateTime)} – ${formatTime(event.endDateTime)}`;
                                    const zonesList = Array.isArray(event.zone) ? event.zone.join(', ') : event.zone;
                                    
                                    return (
                                        <div key={event.id} onClick={() => onEventClick(event)} className="group p-3 rounded-xl border border-slate-100 hover:border-blue-200 hover:shadow-md transition-all cursor-pointer bg-white text-slate-800">
                                            <div className="flex items-start gap-3 text-slate-800">
                                                <div className="w-1.5 self-stretch rounded-full flex-shrink-0 text-slate-800" style={{ backgroundColor: eventTypes[event.type] || '#9CA3AF' }}></div>
                                                <div className="flex-1 min-w-0 text-slate-800">
                                                    <div className="flex flex-wrap items-center justify-between gap-1 mb-1">
                                                        <span className="inline-block px-2 py-0.5 text-[9px] font-black rounded uppercase tracking-wider" style={{ backgroundColor: (eventTypes[event.type] || '#6B7280') + '25', color: eventTypes[event.type] || '#6B7280' }}>
                                                            {event.type}
                                                        </span>
                                                    </div>
                                                    <p className="font-black text-slate-800 truncate group-hover:text-blue-600 transition-colors text-xs uppercase tracking-tight leading-tight text-slate-800">{event.title}</p>
                                                    
                                                    <div className="flex items-center gap-2 text-[11px] font-bold text-slate-400 text-slate-800 mt-2">
                                                        <Icons.Clock size={12} />
                                                        <span>{timeRange}</span>
                                                    </div>
                                                    
                                                    {zonesList && (
                                                        <div className="flex items-center gap-1.5 text-[10px] font-bold text-slate-400 text-slate-800 mt-1">
                                                            <Icons.MapPin size={11} />
                                                            <span className="truncate">{zonesList}</span>
                                                        </div>
                                                    )}
                                                    
                                                    {event.description && (
                                                        <p className="text-[11px] text-slate-500 mt-1.5 leading-relaxed italic border-t border-slate-50 pt-1 text-slate-800">
                                                            {truncateText(event.description, 80)}
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const EventModal = ({ event, onClose, eventTypes }) => {
            if (!event) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 fade-in" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden text-slate-800" onClick={e => e.stopPropagation()}>
                        <div className="p-6 text-slate-800">
                            <div className="flex justify-between items-start mb-6 text-slate-800"><div><span className="inline-block px-3 py-1 text-[10px] font-black rounded-full uppercase tracking-[0.2em] mb-3" style={{ backgroundColor: (eventTypes[event.type] || '#6b7280') + '25', color: eventTypes[event.type] || '#6b7280' }}>{event.type}</span><h3 className="text-xl font-black text-slate-900 leading-tight uppercase tracking-tight">{event.title}</h3></div><button onClick={onClose} className="text-slate-300 hover:text-slate-600 transition-colors"><Icons.X size={24} /></button></div>
                            <div className="space-y-4">
                                <div className="flex items-start gap-4"><div className="bg-slate-50 p-2 rounded-lg text-slate-400"><Icons.Clock size={20} /></div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Time Range</p><p className="font-black text-slate-800 text-sm">{event.startDateTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} — {event.endDateTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p></div></div>
                                <div className="flex items-start gap-4"><div className="bg-slate-50 p-2 rounded-lg text-slate-400"><Icons.MapPin size={20} /></div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Assigned Zones</p><div className="flex flex-wrap gap-1 mt-1">{Array.isArray(event.zone) ? event.zone.map(z => <span key={z} className="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-xs font-black border border-slate-200 uppercase tracking-tighter">{z}</span>) : <span className="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-xs font-black border border-slate-200 uppercase tracking-tighter">{event.zone}</span>}</div></div></div>
                                {event.description && <div className="flex items-start gap-4"><div className="bg-slate-50 p-2 rounded-lg text-slate-400"><Icons.Info size={20} /></div><div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Schedule Notes</p><p className="text-slate-600 text-xs leading-relaxed font-medium">{event.description}</p></div></div>}
                            </div>
                        </div>
                        <div className="bg-slate-50 px-6 py-4 border-t border-slate-100 text-right"><button onClick={onClose} className="px-6 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-black uppercase tracking-widest text-slate-600 hover:bg-slate-100 transition-all active:scale-95 shadow-sm">Dismiss</button></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
