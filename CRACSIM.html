<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Simulator | Blue Lagoon Release</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?version=3.4.4"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.0"></script>
    <!-- p5.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        midnight: '#0f172a',
                        deep: '#020617',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        #canvas-container canvas { border-radius: 0 0 16px 16px; width: 100% !important; height: auto !important; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 20px; }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .sim-animate { animation: slideIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen p-4 md:p-8 dark:bg-deep dark:text-white flex flex-col items-center">

    <!-- Unified Navigation handled by nav.js -->

    <div id="simulation-wrapper" class="w-full max-w-5xl bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:bg-midnight dark:border-slate-800 sim-animate">
        
        <!-- Header & Top Stats -->
        <div class="p-6 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-monitor-play text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight uppercase">Interactive Pool Simulator</h1>
                    <p id="time-display" class="text-xs font-bold text-blue-500 uppercase tracking-widest">Loading Time...</p>
                </div>
            </div>

            <div class="flex gap-3 overflow-x-auto w-full md:w-auto pb-2 md:pb-0 custom-scroll">
                <div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm min-w-[120px]">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Visitors</p>
                    <div class="flex items-center gap-2">
                        <i class="ph-bold ph-users text-blue-500"></i>
                        <span id="visitor-count" class="font-bold text-lg leading-none">0</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm min-w-[120px]">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Daily Profit</p>
                    <div class="flex items-center gap-2">
                        <i class="ph-bold ph-currency-circle-dollar text-emerald-500"></i>
                        <span id="profit-display" class="font-bold text-lg leading-none">$0</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm min-w-[120px]">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Canteen</p>
                    <div class="flex items-center gap-2">
                        <i class="ph-bold ph-cookie text-orange-500"></i>
                        <span id="canteen-display" class="font-bold text-lg leading-none">$0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Manager's Control Deck -->
        <div class="p-4 bg-white dark:bg-midnight grid grid-cols-2 md:grid-cols-4 gap-3">
            <button id="launch-carnival-btn" class="flex items-center justify-center gap-2 p-3 bg-orange-50 text-orange-600 rounded-xl border border-orange-100 hover:bg-orange-600 hover:text-white transition-all font-bold text-sm">
                <i class="ph-bold ph-confetti"></i> Carnival
            </button>
            <button id="start-program-btn" class="flex items-center justify-center gap-2 p-3 bg-purple-50 text-purple-600 rounded-xl border border-purple-100 hover:bg-purple-600 hover:text-white transition-all font-bold text-sm">
                <i class="ph-bold ph-swimmer"></i> Aqua Pro
            </button>
            <button id="weather-toggle-btn" class="flex items-center justify-center gap-2 p-3 bg-blue-50 text-blue-600 rounded-xl border border-blue-100 hover:bg-blue-600 hover:text-white transition-all font-bold text-sm">
                <i id="weather-icon" class="ph-bold ph-sun"></i> Weather
            </button>
            <div class="flex flex-col justify-center px-3 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800">
                <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Sim Speed</p>
                <input type="range" id="sim-speed" min="1" max="5" value="1" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>
        </div>

        <!-- Main Simulation Display -->
        <div id="canvas-container" class="relative bg-slate-900 leading-none min-h-[400px]">
            <!-- Carnival Alert -->
            <div id="carnival-alert" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-orange-600 text-white px-8 py-4 rounded-2xl font-black text-2xl shadow-2xl z-50 animate-pulse border-4 border-white/20">
                CARNIVAL ACTIVE!
            </div>
        </div>

        <!-- Weekly Summary Footer -->
        <div class="p-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 flex justify-center gap-8 text-[10px] font-black uppercase tracking-widest text-slate-400">
            <div class="flex items-center gap-2">Weekly Net: <span id="weekly-profit" class="text-emerald-500">$0</span></div>
            <div class="flex items-center gap-2">Weekly Gross: <span id="weekly-gross" class="text-blue-500">$0</span></div>
            <div class="flex items-center gap-2">Weekly Cost: <span id="weekly-cost" class="text-red-500">$0</span></div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let visitors = [];
        let dailyGrossRevenue = 0;
        let dailyTotalOpCost = 0;
        let dailyCanteenItems = 0;
        let weeklyGrossRevenue = 0;
        let weeklyTotalOpCost = 0;
        let particles = [];
        let isRaining = false;
        let simSpeed = 1;

        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        const OPERATING_HOURS = [
            { day: "Mon", open: 5.5, close: 19 }, { day: "Tue", open: 5.5, close: 19 },
            { day: "Wed", open: 5.5, close: 19 }, { day: "Thu", open: 5.5, close: 19 },
            { day: "Fri", open: 5.5, close: 19 }, { day: "Sat", open: 7,   close: 19 },
            { day: "Sun", open: 8,   close: 18 }
        ];

        let simTime = { month: 0, day: 0, hour: 6 };
        let framesPerHour = 60;
        let carnivalTimer = 0;

        const HOURLY_COSTS = { fiftyMeter: 50, twentyFiveMeter: 40, programPool: 30 };
        const revenueMap = { casual: 15, lts: 20, lap: 12, carnival: 8, program: 25 };
        const colors = { blue: '#00A9E0', orange: '#F7A823', red: '#F05A28', green: '#A8D151', purple: '#8F3F97', grey: '#4B5563' };

        let zones = {};
        let nightColor, dayColor, sunsetColor, sunriseColor;

        // --- p5.js Core ---
        function setup() {
            let canvas = createCanvas(800, 500);
            canvas.parent('canvas-container');
            
            nightColor = color(15, 23, 42);
            dayColor = color(186, 230, 253);
            sunriseColor = color(253, 186, 116);
            sunsetColor = color(249, 115, 22);

            zones = {
                fiftyMeter: { x: 50, y: 150, w: 700, h: 200, label: "50m Olympic Pool", color: '#0ea5e9' },
                twentyFiveMeter: { x: 50, y: 50, w: 350, h: 80, label: "25m Indoor Pool", color: '#0284c7' },
                programPool: { x: 420, y: 50, w: 330, h: 80, label: "Program Pool", color: '#0369a1' }
            };
            
            // Listeners
            document.getElementById('launch-carnival-btn').onclick = () => {
                if(carnivalTimer <= 0) { 
                    carnivalTimer = 4; 
                    for(let i=0; i<80; i++) visitors.push(new Visitor('carnival'));
                    showToast('carnival-alert');
                }
            };
            document.getElementById('start-program-btn').onclick = () => {
                for(let i=0; i<15; i++) visitors.push(new Visitor('program'));
            };
            document.getElementById('weather-toggle-btn').onclick = () => {
                isRaining = !isRaining;
                document.getElementById('weather-icon').className = isRaining ? 'ph-bold ph-cloud-rain' : 'ph-bold ph-sun';
            };
            document.getElementById('sim-speed').oninput = (e) => { simSpeed = parseInt(e.target.value); };
        }

        function draw() {
            for(let s=0; s < simSpeed; s++) {
                updateSim();
            }
            renderSim();
            updateUI();
        }

        function updateSim() {
            if (frameCount % framesPerHour === 0) {
                simTime.hour++;
                // Hourly Costs
                if(isCentreOpen()) {
                    Object.keys(zones).forEach(z => dailyTotalOpCost += (HOURLY_COSTS[z]/framesPerHour));
                }

                // Day Cycle
                if (simTime.hour >= OPERATING_HOURS[simTime.day].close) {
                    weeklyGrossRevenue += dailyGrossRevenue;
                    weeklyTotalOpCost += dailyTotalOpCost;
                    dailyGrossRevenue = 0; dailyTotalOpCost = 0;
                    visitors = []; particles = [];
                    simTime.day = (simTime.day + 1) % 7;
                    simTime.hour = Math.floor(OPERATING_HOURS[simTime.day].open);
                }
            }

            if (isCentreOpen()) {
                if (frameCount % 30 === 0) spawnVisitors();
                visitors.forEach((v, i) => {
                    v.update();
                    if (v.isDone()) visitors.splice(i, 1);
                });
            }

            particles.forEach((p, i) => {
                p.update();
                if (p.isDead()) particles.splice(i, 1);
            });

            if (isRaining && frameCount % 2 === 0) {
                particles.push(new Particle(random(width), 0, color(186, 230, 253, 100), 1, 10));
            }
        }

        function renderSim() {
            // Lighting
            const hour = simTime.hour;
            let bgColor = nightColor;
            if (hour >= 5 && hour < 8) bgColor = lerpColor(nightColor, dayColor, map(hour, 5, 8, 0, 1));
            else if (hour >= 8 && hour < 17) bgColor = dayColor;
            else if (hour >= 17 && hour < 19) bgColor = lerpColor(dayColor, nightColor, map(hour, 17, 19, 0, 1));
            background(bgColor);

            // Zones
            for (const key in zones) {
                const z = zones[key];
                fill(red(color(z.color)), green(color(z.color)), blue(color(z.color)), 40);
                stroke(z.color);
                strokeWeight(2);
                rect(z.x, z.y, z.w, z.h, 12);
                
                // Ripples
                if(frameCount % 60 === 0 && random() < 0.2) {
                    particles.push(new Particle(random(z.x, z.x+z.w), random(z.y, z.y+z.h), color(255,255,255,40), 0, 0));
                }
            }

            visitors.forEach(v => v.display());
            particles.forEach(p => p.display());

            if (!isCentreOpen()) {
                fill(0, 180); rect(0, 0, width, height);
                fill(255); textAlign(CENTER, CENTER); textSize(40); textStyle(BOLD);
                text("FACILITY CLOSED", width/2, height/2);
            }
        }

        function spawnVisitors() {
            if(visitors.length > 150) return;
            const hour = simTime.hour;
            let count = isRaining ? 1 : 3;
            if(hour < 9 || hour > 17) count = 5; // Peak lap times
            for(let i=0; i<count; i++) {
                const type = hour < 9 ? 'lap' : (random() < 0.3 ? 'lts' : 'casual');
                visitors.push(new Visitor(type));
            }
        }

        function isCentreOpen() {
            const h = OPERATING_HOURS[simTime.day];
            return simTime.hour >= h.open && simTime.hour < h.close;
        }

        function updateUI() {
            document.getElementById('time-display').innerText = `${dayNames[simTime.day]}, ${simTime.hour}:00 - ${getSeason()}`;
            document.getElementById('visitor-count').innerText = visitors.length;
            document.getElementById('profit-display').innerText = `$${(dailyGrossRevenue - dailyTotalOpCost).toFixed(0)}`;
            document.getElementById('canteen-display').innerText = `$${(dailyCanteenItems * 4.5).toFixed(0)}`;
            
            document.getElementById('weekly-profit').innerText = `$${(weeklyGrossRevenue - weeklyTotalOpCost).toFixed(0)}`;
            document.getElementById('weekly-gross').innerText = `$${weeklyGrossRevenue.toFixed(0)}`;
            document.getElementById('weekly-cost').innerText = `$${weeklyTotalOpCost.toFixed(0)}`;
        }

        function getSeason() {
            const m = simTime.month;
            if (m >= 5 && m <= 7) return "Winter";
            return "Summer";
        }

        function showToast(id) {
            const el = document.getElementById(id);
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        // --- Helper Classes ---
        class Visitor {
            constructor(type) {
                this.type = type;
                this.color = color(colors[type === 'lap' ? 'grey' : (type === 'lts' ? 'green' : (type === 'carnival' ? 'orange' : 'blue'))]);
                this.lane = null;

                // Zone & Lane Assignment
                if (type === 'carnival' || type === 'lap') {
                    this.zone = zones.fiftyMeter;
                    this.lane = floor(random(8));
                } else if (type === 'lts') {
                    this.zone = zones.programPool;
                } else {
                    this.zone = zones.twentyFiveMeter;
                    this.lane = floor(random(8));
                }

                if (this.lane !== null) {
                    // Horizontal Lane Start
                    const laneH = this.zone.h / 8;
                    const laneY = this.zone.y + (laneH * this.lane) + (laneH / 2);
                    this.pos = createVector(random(this.zone.x + 10, this.zone.x + this.zone.w - 10), laneY);
                    this.vel = createVector(random([-1, 1]) * random(0.5, 1.5), 0);
                } else {
                    // Free-form Start
                    this.pos = createVector(random(this.zone.x + 20, this.zone.x + this.zone.w - 20), random(this.zone.y + 20, this.zone.y + this.zone.h - 20));
                    this.vel = p5.Vector.random2D().mult(random(0.5, 1.5));
                }

                this.lifespan = random(120, 400);
                dailyGrossRevenue += revenueMap[type] || 10;
            }

            update() {
                if (this.lane !== null) {
                    // Restricted to Horizontal Lane
                    this.pos.x += this.vel.x;
                    if(this.pos.x < this.zone.x + 10 || this.pos.x > this.zone.x + this.zone.w - 10) this.vel.x *= -1;
                } else {
                    // Free-form Movement
                    this.pos.add(this.vel);
                    if(this.pos.x < this.zone.x + 5 || this.pos.x > this.zone.x + this.zone.w - 5) this.vel.x *= -1;
                    if(this.pos.y < this.zone.y + 5 || this.pos.y > this.zone.y + this.zone.h - 5) this.vel.y *= -1;
                }
                this.lifespan--;
            }

            display() {
                noStroke(); fill(this.color);
                ellipse(this.pos.x, this.pos.y, 8);
            }
            isDone() { return this.lifespan <= 0; }
        }

        class Particle {
            constructor(x, y, c, vx, vy) {
                this.pos = createVector(x, y);
                this.vel = createVector(vx || random(-1, 1), vy || random(-1, 1));
                this.lifespan = 60;
                this.color = c;
            }
            update() { this.pos.add(this.vel); this.lifespan--; }
            display() {
                noStroke(); 
                let a = map(this.lifespan, 60, 0, 150, 0);
                fill(red(this.color), green(this.color), blue(this.color), a);
                ellipse(this.pos.x, this.pos.y, map(this.lifespan, 60, 0, 2, 20));
            }
            isDead() { return this.lifespan <= 0; }
        }
    </script>

    <script src="./nav.js" data-title="Pool Simulator" data-icon="ph-monitor-play" data-help="Interactive simulation of facility operations. Use the Manager's Control Deck to test different scenarios like carnivals or rain. Track daily and weekly profits to optimise facility efficiency."></script>
</body>
</html>
