<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swim Around Australia | Community Challenge</title>
    
    <!-- Core Libraries -->
    <script src="https://cdn.tailwindcss.com?version=3.4.4"></script>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;850&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif']
                    },
                    colors: {
                        ocean: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#06b6d4',
                            600: '#0891b2',
                            900: '#164e63',
                        },
                        indigoCustom: {
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        slate: {
                            750: '#1e293b',
                            850: '#0f172a',
                            950: '#020617'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Firebase Configuration Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
        
        window.firebaseModules = { initializeApp, getAuth, signInAnonymously, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, serverTimestamp };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s, color 0.4s; }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.1); border-radius: 20px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.1); }
        
        /* Map Animations */
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }
        .animated-coast {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: dash 5s linear forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 flex flex-col min-h-screen">

    <!-- React Root -->
    <div id="root" class="flex-grow flex flex-col"></div>

    <!-- App Logic -->
    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        // Coastline points to map percentages along the Australia coast
        // 0 km: Sydney, 25,760 km: Back to Sydney
        const MILESTONES = [
            { name: "Sydney (Start)", targetKm: 0, x: 630, y: 440, desc: "The voyage begins at Sydney Harbour." },
            { name: "Brisbane", targetKm: 1000, x: 620, y: 320, desc: "Sunny Brisbane River & Gold Coast beaches." },
            { name: "Cairns", targetKm: 2960, x: 512, y: 155, desc: "Gateway to the Great Barrier Reef." },
            { name: "Darwin", targetKm: 6960, x: 310, y: 110, desc: "Tropical Top End and Darwin Harbour." },
            { name: "Broome", targetKm: 10000, x: 170, y: 190, desc: "Beautiful Cable Beach sunsets." },
            { name: "Perth", targetKm: 14200, x: 90, y: 405, desc: "Swan River and coastal Indian Ocean." },
            { name: "Adelaide", targetKm: 18800, x: 425, y: 480, desc: "St Vincent Gulf and rolling vineyards." },
            { name: "Melbourne", targetKm: 21600, x: 535, y: 520, desc: "Port Phillip Bay cultural capital." },
            { name: "Hobart", targetKm: 23200, x: 565, y: 580, desc: "Derwent River crossing in Tasmania." },
            { name: "Sydney (Finish)", targetKm: 25760, x: 630, y: 440, desc: "Home stretch back to where we started!" }
        ];

        const TOTAL_CIRCUMFERENCE = 25760; // km

        // Firebase configurations from tasktracker
        const firebaseConfig = {
            apiKey: "AIzaSyA-AwiFvSq3_AuDVZE5l1Pn4oAIfZTFmOM",
            authDomain: "opsf---comms-task-tracker.firebaseapp.com",
            projectId: "opsf---comms-task-tracker",
            storageBucket: "opsf---comms-task-tracker.firebasestorage.app",
            messagingSenderId: "489224390639",
            appId: "1:489224390639:web:54b9f2772aaef86d32581a"
        };

        const MainApp = () => {
            const [logs, setLogs] = useState([]);
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            
            // Form State
            const [swimmerName, setSwimmerName] = useState('');
            const [facility, setFacility] = useState('Clarence Regional Aquatic Centre');
            const [poolLength, setPoolLength] = useState('50');
            const [laps, setLaps] = useState('');
            const [dateSwum, setDateSwum] = useState(new Date().toISOString().split('T')[0]);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const pathRef = useRef(null);
            const [swimmerPos, setSwimmerPos] = useState({ x: 630, y: 440 });
            const [pathLength, setPathLength] = useState(0);

            // Calculate metrics
            const totals = useMemo(() => {
                let totalKm = 0;
                let cracKm = 0;
                let ycpKm = 0;
                const individualTotals = {};
                
                logs.forEach(log => {
                    const dist = Number(log.distanceKm) || 0;
                    totalKm += dist;
                    if (log.facility === 'Clarence Regional Aquatic Centre') {
                        cracKm += dist;
                    } else {
                        ycpKm += dist;
                    }

                    const name = log.swimmerName || 'Anonymous';
                    individualTotals[name] = (individualTotals[name] || 0) + dist;
                });

                // Leaderboard sorting
                const leaderboard = Object.keys(individualTotals).map(name => ({
                    name,
                    distanceKm: individualTotals[name],
                    facility: logs.find(l => l.swimmerName === name)?.facility || 'CRAC'
                })).sort((a, b) => b.distanceKm - a.distanceKm).slice(0, 10);

                return {
                    totalKm,
                    cracKm,
                    ycpKm,
                    leaderboard,
                    participantsCount: Object.keys(individualTotals).length
                };
            }, [logs]);

            // Percentage completion
            const challengePercentage = useMemo(() => {
                if (totals.totalKm === 0) return 0;
                const pct = (totals.totalKm / TOTAL_CIRCUMFERENCE) * 100;
                return Math.min(Number(pct.toFixed(2)), 100);
            }, [totals.totalKm]);

            // Find current milestone location
            const currentMilestoneIndex = useMemo(() => {
                let currentIndex = 0;
                for (let i = 0; i < MILESTONES.length; i++) {
                    if (totals.totalKm >= MILESTONES[i].targetKm) {
                        currentIndex = i;
                    }
                }
                return currentIndex;
            }, [totals.totalKm]);

            const currentMilestone = MILESTONES[currentMilestoneIndex];
            const nextMilestone = MILESTONES[currentMilestoneIndex + 1] || MILESTONES[MILESTONES.length - 1];
            const kmToNextMilestone = useMemo(() => {
                if (currentMilestoneIndex >= MILESTONES.length - 1) return 0;
                return Math.max(0, nextMilestone.targetKm - totals.totalKm);
            }, [totals.totalKm, currentMilestoneIndex, nextMilestone]);

            // Calculate auto pool distance
            const calculatedKm = useMemo(() => {
                const lapCount = Number(laps) || 0;
                const len = Number(poolLength) || 0;
                return Number(((lapCount * len) / 1000).toFixed(2));
            }, [laps, poolLength]);

            // Firebase Initialization
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const { initializeApp, getAuth, signInAnonymously, getFirestore, collection, onSnapshot } = window.firebaseModules;
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        setDb(firestore);

                        signInAnonymously(auth).then(cred => {
                            setUser(cred.user);
                            
                            // Setup Realtime Database Listener
                            const colRef = collection(firestore, "lap_tracker_logs");
                            onSnapshot(colRef, (snapshot) => {
                                const list = [];
                                snapshot.forEach(doc => {
                                    list.push({ id: doc.id, ...doc.data() });
                                });
                                // Sort by date/timestamp descending
                                list.sort((a, b) => {
                                    const timeA = a.timestamp?.seconds || 0;
                                    const timeB = b.timestamp?.seconds || 0;
                                    return timeB - timeA;
                                });
                                setLogs(list);
                                setLoading(false);
                            });
                        });
                    } catch (err) {
                        console.error("Firebase init failed:", err);
                        setLoading(false);
                    }
                };
                initFirebase();
            }, []);

            // Handle SVG Coast Path Length calculation & Swimmer Marker position updates
            useEffect(() => {
                if (pathRef.current) {
                    const length = pathRef.current.getTotalLength();
                    setPathLength(length);

                    const targetDistance = (challengePercentage / 100) * length;
                    const point = pathRef.current.getPointAtLength(targetDistance);
                    setSwimmerPos({ x: point.x, y: point.y });
                }
            }, [challengePercentage, logs]);

            // Form Submit handler
            const handleLogSubmit = async (e) => {
                e.preventDefault();
                if (!swimmerName.trim() || !laps || isSubmitting) return;

                setIsSubmitting(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.firebaseModules;
                    await addDoc(collection(db, "lap_tracker_logs"), {
                        swimmerName: swimmerName.trim(),
                        facility,
                        poolLength: Number(poolLength),
                        laps: Number(laps),
                        distanceKm: calculatedKm,
                        date: dateSwum,
                        timestamp: serverTimestamp()
                    });

                    // Clear inputs
                    setSwimmerName('');
                    setLaps('');
                } catch (err) {
                    console.error("Error logging laps:", err);
                } finally {
                    setIsSubmitting(false);
                }
            };

            // Delete handler (simple admin delete)
            const handleLogDelete = async (id) => {
                if (!confirm("Are you sure you want to delete this log entry?")) return;
                try {
                    const { doc, deleteDoc } = window.firebaseModules;
                    await deleteDoc(doc(db, "lap_tracker_logs", id));
                } catch (err) {
                    console.error("Delete failed:", err);
                }
            };

            return (
                <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8 flex-grow">
                    
                    {/* Hero Section */}
                    <section className="bg-gradient-to-r from-cyan-600 to-blue-700 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-cyan-400/20 via-transparent to-transparent"></div>
                        <div className="relative z-10 space-y-3 max-w-xl">
                            <div className="flex items-center gap-3">
                                <span className="bg-white/20 text-xs font-black uppercase tracking-widest px-3 py-1 rounded-full">Community Challenge</span>
                                <span className="h-1.5 w-1.5 rounded-full bg-cyan-300 animate-pulse"></span>
                            </div>
                            <h2 className="text-3xl md:text-5xl font-display font-extrabold tracking-tight">Swim Around Australia</h2>
                            <p className="text-slate-100 text-sm md:text-base leading-relaxed">
                                Join forces with swimmers from both CRAC and YCP. Every lap you complete helps us navigate the 25,760 km coastline of Australia. Log your distance, reach new coastal towns, and help us conquer the loop!
                            </p>
                        </div>

                        {/* Large Bento Circular Progress */}
                        <div className="relative z-10 w-40 h-40 bg-white/10 backdrop-blur-md rounded-full border border-white/20 flex flex-col items-center justify-center p-4">
                            <svg className="absolute inset-0 transform -rotate-90" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="42" stroke="rgba(255,255,255,0.1)" strokeWidth="6" fill="transparent" />
                                <circle cx="50" cy="50" r="42" stroke="#22d3ee" strokeWidth="6" fill="transparent"
                                    strokeDasharray="264" strokeDashoffset={264 - (264 * challengePercentage) / 100}
                                    className="transition-all duration-1000" />
                            </svg>
                            <span className="text-3xl font-display font-black leading-none">{challengePercentage}%</span>
                            <span className="text-[10px] font-black uppercase tracking-widest opacity-80 mt-1">Completed</span>
                            <span className="text-[9px] font-mono mt-1 opacity-60">{(totals.totalKm).toLocaleString()} km</span>
                        </div>
                    </section>

                    {/* Dashboard metrics grid */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="glass-card p-5 rounded-2xl shadow-sm border flex flex-col justify-between">
                            <span className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Total Swum</span>
                            <div className="mt-2 flex items-baseline gap-1">
                                <span className="text-2xl md:text-3xl font-display font-black">{(totals.totalKm).toLocaleString()}</span>
                                <span className="text-xs text-slate-500">km</span>
                            </div>
                            <span className="text-[9px] text-cyan-600 dark:text-cyan-400 font-bold uppercase mt-2">Target: 25,760 km</span>
                        </div>
                        <div className="glass-card p-5 rounded-2xl shadow-sm border flex flex-col justify-between">
                            <span className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Current Port</span>
                            <div className="mt-2 text-lg md:text-xl font-bold truncate">
                                {currentMilestone.name}
                            </div>
                            <span className="text-[9px] text-slate-400 uppercase mt-2">{currentMilestone.desc}</span>
                        </div>
                        <div className="glass-card p-5 rounded-2xl shadow-sm border flex flex-col justify-between">
                            <span className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Next Destination</span>
                            <div className="mt-2 text-lg md:text-xl font-bold truncate text-cyan-600 dark:text-cyan-400">
                                {nextMilestone.name}
                            </div>
                            <span className="text-[9px] text-slate-500 uppercase mt-2">In {kmToNextMilestone.toLocaleString()} km</span>
                        </div>
                        <div className="glass-card p-5 rounded-2xl shadow-sm border flex flex-col justify-between">
                            <span className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Active Swimmers</span>
                            <div className="mt-2 flex items-baseline gap-1">
                                <span className="text-2xl md:text-3xl font-display font-black">{totals.participantsCount}</span>
                                <span className="text-xs text-slate-500">contributors</span>
                            </div>
                            <span className="text-[9px] text-slate-400 uppercase mt-2">Across CRAC & YCP</span>
                        </div>
                    </div>

                    {/* Main Layout Area */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">

                        {/* Map & Milestones Section (Left, 7 Columns) */}
                        <div className="lg:col-span-7 space-y-6">
                            
                            {/* Map Container */}
                            <div className="glass-card p-6 rounded-3xl shadow-sm border relative">
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h3 className="font-extrabold text-lg text-slate-900 dark:text-white uppercase tracking-tight">Challenge Voyage Map</h3>
                                        <p className="text-[9px] text-slate-400 dark:text-slate-500 uppercase tracking-widest font-black leading-none mt-0.5">Real-Time Coastal Position</p>
                                    </div>
                                    <div className="flex items-center gap-2 text-xs font-bold text-cyan-600 dark:text-cyan-400 bg-cyan-50 dark:bg-cyan-900/30 px-3 py-1 rounded-full">
                                        <i className="ph-bold ph-swimmer text-sm animate-bounce"></i>
                                        <span>Coastline Route Active</span>
                                    </div>
                                </div>

                                <div className="relative aspect-[4/3] bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-4 overflow-hidden">
                                    <svg id="map-svg" viewBox="0 0 800 600" className="w-full h-full">
                                        {/* Australia Map Stylized Grid Lines */}
                                        <line x1="0" y1="150" x2="800" y2="150" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
                                        <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
                                        <line x1="0" y1="450" x2="800" y2="450" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
                                        <line x1="200" y1="0" x2="200" y2="600" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
                                        <line x1="400" y1="0" x2="400" y2="600" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
                                        <line x1="600" y1="0" x2="600" y2="600" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />

                                        {/* Dashed background coast path */}
                                        <path id="coastline-background-path" 
                                            d="M 630 440 C 625 470, 615 500, 610 520 C 590 530, 560 540, 550 550 C 540 540, 530 535, 520 530 C 480 520, 440 500, 410 490 C 360 490, 300 480, 250 480 C 210 480, 150 470, 120 470 C 100 470, 90 470, 80 460 C 70 440, 72 420, 70 410 C 60 370, 45 340, 40 310 C 40 280, 45 270, 50 260 C 70 240, 80 230, 100 220 C 120 205, 135 200, 150 190 C 160 180, 170 175, 180 170 C 195 170, 210 170, 220 170 C 240 160, 270 135, 290 120 C 310 120, 330 115, 350 120 C 360 130, 365 140, 370 150 C 380 170, 390 190, 400 200 C 410 190, 420 170, 430 150 C 440 120, 450 100, 460 80 C 470 100, 475 120, 480 130 C 490 145, 495 155, 500 160 C 510 175, 515 185, 520 190 C 535 210, 545 220, 550 230 C 565 245, 575 255, 580 260 C 595 275, 605 285, 610 290 C 615 310, 618 320, 620 330 C 625 335, 628 338, 630 340 C 628 360, 626 380, 625 390 C 622 405, 621 415, 620 420 C 625 430, 628 440, 630 440 Z" 
                                            fill="none" stroke="rgba(255, 255, 255, 0.1)" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round" />

                                        {/* Dynamic Active Progress Coastline Path */}
                                        <path id="coastline-path" ref={pathRef}
                                            d="M 630 440 C 625 470, 615 500, 610 520 C 590 530, 560 540, 550 550 C 540 540, 530 535, 520 530 C 480 520, 440 500, 410 490 C 360 490, 300 480, 250 480 C 210 480, 150 470, 120 470 C 100 470, 90 470, 80 460 C 70 440, 72 420, 70 410 C 60 370, 45 340, 40 310 C 40 280, 45 270, 50 260 C 70 240, 80 230, 100 220 C 120 205, 135 200, 150 190 C 160 180, 170 175, 180 170 C 195 170, 210 170, 220 170 C 240 160, 270 135, 290 120 C 310 120, 330 115, 350 120 C 360 130, 365 140, 370 150 C 380 170, 390 190, 400 200 C 410 190, 420 170, 430 150 C 440 120, 450 100, 460 80 C 470 100, 475 120, 480 130 C 490 145, 495 155, 500 160 C 510 175, 515 185, 520 190 C 535 210, 545 220, 550 230 C 565 245, 575 255, 580 260 C 595 275, 605 285, 610 290 C 615 310, 618 320, 620 330 C 625 335, 628 338, 630 340 C 628 360, 626 380, 625 390 C 622 405, 621 415, 620 420 C 625 430, 628 440, 630 440 Z" 
                                            fill="none" stroke="url(#coastGradient)" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" 
                                            strokeDasharray={pathLength} strokeDashoffset={pathLength - (pathLength * challengePercentage) / 100}
                                            className="transition-all duration-1000" />

                                        {/* Coast Gradient Definition */}
                                        <defs>
                                            <linearGradient id="coastGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                                <stop offset="0%" stopColor="#06b6d4" />
                                                <stop offset="50%" stopColor="#3b82f6" />
                                                <stop offset="100%" stopColor="#10b981" />
                                            </linearGradient>
                                        </defs>

                                        {/* Milestones Dots */}
                                        {MILESTONES.map((m, idx) => {
                                            const isReached = totals.totalKm >= m.targetKm;
                                            return (
                                                <g key={idx}>
                                                    <circle cx={m.x} cy={m.y} r="5" 
                                                        fill={isReached ? "#10b981" : "#475569"} 
                                                        stroke={isReached ? "#a7f3d0" : "#1e293b"} 
                                                        strokeWidth="2.5" />
                                                    <text x={m.x} y={m.y - 10} textAnchor="middle" 
                                                        fill={isReached ? "#f8fafc" : "#94a3b8"} 
                                                        fontSize="8" fontWeight="bold" fontFamily="sans-serif">
                                                        {m.name.split(' ')[0]}
                                                    </text>
                                                </g>
                                            );
                                        })}

                                        {/* Hobart detour link line */}
                                        <line x1="535" y1="520" x2="565" y2="580" stroke="rgba(255,255,255,0.08)" strokeWidth="2" strokeDasharray="4 4" />

                                        {/* Swimmer Pulse Marker */}
                                        <g id="swimmer-group" transform={`translate(${swimmerPos.x}, ${swimmerPos.y})`}>
                                            <circle cx="0" cy="0" r="16" fill="#22d3ee" opacity="0.3" className="animate-ping" />
                                            <circle cx="0" cy="0" r="8" fill="#0891b2" stroke="#ffffff" strokeWidth="2" />
                                            <text x="0" y="4" textAnchor="middle" fontSize="10" fill="#ffffff" fontWeight="black" fontFamily="sans-serif">🏊‍♂️</text>
                                        </g>
                                    </svg>
                                </div>
                            </div>

                            {/* Milestones / Ports List */}
                            <div className="glass-card p-6 rounded-3xl shadow-sm border">
                                <h3 className="font-extrabold text-lg text-slate-900 dark:text-white uppercase tracking-tight mb-4">Voyage Milestones</h3>
                                <div className="max-h-[300px] overflow-y-auto custom-scroll space-y-3">
                                    {MILESTONES.map((m, idx) => {
                                        const isReached = totals.totalKm >= m.targetKm;
                                        const isCurrent = currentMilestoneIndex === idx;
                                        const progressPct = m.targetKm === 0 ? 100 : Math.min(100, Math.floor((totals.totalKm / m.targetKm) * 100));

                                        return (
                                            <div key={idx} className={`p-4 rounded-xl border flex items-center justify-between transition-all ${isCurrent ? 'bg-cyan-500/10 border-cyan-500 dark:bg-cyan-900/20' : 'bg-slate-100/50 border-slate-200/60 dark:bg-slate-800/40 dark:border-slate-800'}`}>
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black ${isReached ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-slate-200 text-slate-400 dark:bg-slate-700 dark:text-slate-500'}`}>
                                                        {isReached ? <i className="ph-bold ph-check"></i> : <span>{idx + 1}</span>}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-sm">{m.name}</h4>
                                                        <p className="text-[10px] text-slate-400 uppercase tracking-widest">{m.targetKm.toLocaleString()} km marker</p>
                                                    </div>
                                                </div>

                                                <div className="text-right">
                                                    {isReached ? (
                                                        <span className="text-xs font-black uppercase tracking-wider text-emerald-600 dark:text-emerald-400">🎯 Reached</span>
                                                    ) : (
                                                        <div className="space-y-1">
                                                            <span className="text-xs font-bold text-slate-500">{(m.targetKm - totals.totalKm).toLocaleString()} km left</span>
                                                            <div className="w-20 bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                                                <div className="bg-cyan-500 h-full" style={{width: `${progressPct}%`}}></div>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* Submit Laps & Stats Section (Right, 5 Columns) */}
                        <div className="lg:col-span-5 space-y-6">

                            {/* Friendly Rivalry Box */}
                            <div className="glass-card p-6 rounded-3xl shadow-sm border">
                                <h3 className="font-extrabold text-sm text-slate-900 dark:text-white uppercase tracking-wider mb-4 flex items-center gap-2">
                                    <i className="ph-duotone ph-trophy text-amber-500 text-lg"></i>
                                    <span>Centre Rivalry</span>
                                </h3>

                                <div className="space-y-4">
                                    {/* CRAC Progress */}
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-xs font-black uppercase tracking-tight">
                                            <span className="text-indigo-600 dark:text-indigo-400">CRAC (Grafton)</span>
                                            <span>{totals.cracKm.toFixed(1)} km</span>
                                        </div>
                                        <div className="w-full bg-slate-200 dark:bg-slate-800 h-3 rounded-full overflow-hidden p-0.5">
                                            <div className="bg-indigo-600 h-full rounded-full transition-all duration-1000" 
                                                style={{width: `${totals.totalKm === 0 ? 0 : (totals.cracKm / totals.totalKm) * 100}%`}}></div>
                                        </div>
                                    </div>

                                    {/* YCP Progress */}
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-xs font-black uppercase tracking-tight">
                                            <span className="text-emerald-600 dark:text-emerald-400">Yamba Community Pool</span>
                                            <span>{totals.ycpKm.toFixed(1)} km</span>
                                        </div>
                                        <div className="w-full bg-slate-200 dark:bg-slate-800 h-3 rounded-full overflow-hidden p-0.5">
                                            <div className="bg-emerald-600 h-full rounded-full transition-all duration-1000" 
                                                style={{width: `${totals.totalKm === 0 ? 0 : (totals.ycpKm / totals.totalKm) * 100}%`}}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Submit Laps Form */}
                            <div className="glass-card p-6 rounded-3xl shadow-sm border">
                                <h3 className="font-extrabold text-lg text-slate-900 dark:text-white uppercase tracking-tight mb-4">Log Laps Completed</h3>
                                
                                <form onSubmit={handleLogSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 uppercase mb-1">Swimmer Name</label>
                                        <input type="text" value={swimmerName} onChange={e => setSwimmerName(e.target.value)} required
                                            placeholder="e.g. Sarah Smith"
                                            className="w-full bg-slate-100/60 dark:bg-slate-850 border border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-cyan-500 dark:text-white transition-all text-sm" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-1">Facility</label>
                                            <select value={facility} onChange={e => setFacility(e.target.value)} required
                                                className="w-full bg-slate-100/60 dark:bg-slate-850 border border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-cyan-500 dark:text-white transition-all text-sm">
                                                <option value="Clarence Regional Aquatic Centre">CRAC (Grafton)</option>
                                                <option value="Yamba Community Pool">Yamba Pool</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-1">Pool Type</label>
                                            <select value={poolLength} onChange={e => setPoolLength(e.target.value)} required
                                                className="w-full bg-slate-100/60 dark:bg-slate-850 border border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-cyan-500 dark:text-white transition-all text-sm">
                                                <option value="50">50m Olympic Pool</option>
                                                <option value="25">25m Pool</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-1">Laps Swum</label>
                                            <input type="number" min="1" value={laps} onChange={e => setLaps(e.target.value)} required
                                                placeholder="e.g. 20"
                                                className="w-full bg-slate-100/60 dark:bg-slate-850 border border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-cyan-500 dark:text-white transition-all text-sm" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-1">Date Swum</label>
                                            <input type="date" value={dateSwum} onChange={e => setDateSwum(e.target.value)} required
                                                className="w-full bg-slate-100/60 dark:bg-slate-850 border border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-cyan-500 dark:text-white transition-all text-sm" />
                                        </div>
                                    </div>

                                    {/* Auto visual distance guide */}
                                    {laps > 0 && (
                                        <div className="p-3 bg-cyan-50 dark:bg-cyan-900/20 border border-cyan-100 dark:border-cyan-800 rounded-xl text-center">
                                            <p className="text-xs text-cyan-600 dark:text-cyan-400 font-bold uppercase tracking-wide">
                                                Calculated: <span className="text-sm font-black">{calculatedKm}</span> km contributed!
                                            </p>
                                        </div>
                                    )}

                                    <button type="submit" disabled={isSubmitting}
                                        className="w-full py-4 bg-slate-900 dark:bg-cyan-600 hover:bg-cyan-600 dark:hover:bg-cyan-500 text-white font-black rounded-xl transition-all shadow-md transform active:scale-95 text-xs uppercase tracking-wider flex items-center justify-center gap-2">
                                        {isSubmitting ? (
                                            <i className="ph-bold ph-spinner animate-spin text-sm"></i>
                                        ) : (
                                            <i className="ph-bold ph-paper-plane-tilt text-sm"></i>
                                        )}
                                        <span>Log Distance</span>
                                    </button>
                                </form>
                            </div>

                            {/* Top Swimmers Leaderboard */}
                            <div className="glass-card p-6 rounded-3xl shadow-sm border">
                                <h3 className="font-extrabold text-lg text-slate-900 dark:text-white uppercase tracking-tight mb-4 flex items-center justify-between">
                                    <span>Top Swimmers Leaderboard</span>
                                    <i className="ph-bold ph-medal text-xl text-amber-500"></i>
                                </h3>
                                
                                <div className="space-y-2">
                                    {totals.leaderboard.length === 0 ? (
                                        <p className="text-slate-400 text-xs italic py-4 text-center">No logs recorded yet. Be the first!</p>
                                    ) : (
                                        totals.leaderboard.map((swimmer, idx) => {
                                            const placeColors = idx === 0 ? 'bg-amber-100 text-amber-700' : idx === 1 ? 'bg-slate-200 text-slate-700' : idx === 2 ? 'bg-orange-100 text-orange-700' : 'bg-slate-100 text-slate-500 dark:bg-slate-800';
                                            return (
                                                <div key={idx} className="flex justify-between items-center p-3 bg-slate-100/40 dark:bg-slate-800/20 border border-slate-200/50 dark:border-slate-800 rounded-xl">
                                                    <div className="flex items-center gap-3">
                                                        <span className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black ${placeColors}`}>
                                                            {idx + 1}
                                                        </span>
                                                        <div>
                                                            <h4 className="font-bold text-xs">{swimmer.name}</h4>
                                                            <span className="text-[8px] text-slate-400 font-bold uppercase">{swimmer.facility.includes('Regional') ? 'CRAC' : 'YCP'}</span>
                                                        </div>
                                                    </div>
                                                    <span className="text-xs font-black text-cyan-600 dark:text-cyan-400">{swimmer.distanceKm.toFixed(2)} km</span>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Bottom Area: Recent Activity Log */}
                    <section className="glass-card p-6 rounded-3xl shadow-sm border">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h3 className="font-extrabold text-lg text-slate-900 dark:text-white uppercase tracking-tight">Recent Log Entries</h3>
                                <p className="text-[9px] text-slate-400 dark:text-slate-500 uppercase tracking-widest font-black leading-none mt-0.5">Community Logs (Live Feed)</p>
                            </div>
                            <span className="text-xs text-slate-400">{logs.length} logs logged</span>
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-12 gap-3">
                                <i className="ph-duotone ph-spinner animate-spin text-3xl text-cyan-500"></i>
                                <span className="text-xs text-slate-400">Fetching live feed...</span>
                            </div>
                        ) : logs.length === 0 ? (
                            <p className="text-slate-400 text-xs italic py-12 text-center border border-dashed rounded-2xl">No logged sessions recorded. Log your first swim above!</p>
                        ) : (
                            <div className="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
                                <table className="min-w-full divide-y divide-slate-200 dark:divide-slate-800">
                                    <thead className="bg-slate-100/50 dark:bg-slate-900/50">
                                        <tr>
                                            <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Swimmer</th>
                                            <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Facility</th>
                                            <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Laps Logged</th>
                                            <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Distance</th>
                                            <th className="px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest text-slate-500">Date Swum</th>
                                            <th className="px-6 py-4 text-right text-[10px] font-black uppercase tracking-widest text-slate-500">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white dark:bg-slate-900/50 divide-y divide-slate-100 dark:divide-slate-800">
                                        {logs.map((log, idx) => (
                                            <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-850/50 transition-colors">
                                                <td className="px-6 py-4 whitespace-nowrap text-xs font-bold">{log.swimmerName}</td>
                                                <td className="px-6 py-4 whitespace-nowrap">
                                                    <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-full border ${log.facility.includes('Regional') ? 'bg-indigo-50 border-indigo-100 text-indigo-700 dark:bg-indigo-950/20 dark:border-indigo-900 dark:text-indigo-400' : 'bg-emerald-50 border-emerald-100 text-emerald-700 dark:bg-emerald-950/20 dark:border-emerald-900 dark:text-emerald-400'}`}>
                                                        {log.facility.includes('Regional') ? 'CRAC' : 'YCP'}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap text-xs text-slate-500">{log.laps} laps ({log.poolLength}m)</td>
                                                <td className="px-6 py-4 whitespace-nowrap text-xs font-black text-cyan-600 dark:text-cyan-400">{log.distanceKm} km</td>
                                                <td className="px-6 py-4 whitespace-nowrap text-xs text-slate-400">{new Date(log.date).toLocaleDateString('en-AU', {day:'numeric', month:'short', year:'numeric'})}</td>
                                                <td className="px-6 py-4 whitespace-nowrap text-right text-xs">
                                                    <button onClick={() => handleLogDelete(log.id)}
                                                        className="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-950/20 rounded-lg transition-all" title="Delete Entry">
                                                        <i className="ph-bold ph-trash text-sm"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </section>

                </main>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<MainApp />);
    </script>

    <!-- Navigation Injection -->
    <script src="./nav.js" data-title="Lap Tracker" data-icon="ph-swimmer" data-help="Collaborative Swim Around Australia lap tracker for CRAC and YCP. Input your swimmer name, select pool facility and pool length, enter laps swum and date, and click 'Log Distance' to instantly sync your distance to the global challenge progress. The Australia map coastline path fill dynamically matches total community progress, and the top swimmer leaderboard updates automatically."></script>
</body>
</html>
